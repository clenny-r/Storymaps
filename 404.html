<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 | The Lost Sheep</title>
<style>
  :root{
    --panel: rgba(255,255,255,0.6);
    --ink: #3b2a17;
    --wood: #5c3a1e;
    --wood-dark: #422917;
  }

  *{ box-sizing:border-box; }

  html, body{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
    font-family: Georgia, serif;
    color:var(--ink);
    text-align:center;
    background:#050913;
  }

  body{
    animation: skyCycle 14s linear infinite;
  }

  @keyframes skyCycle{
    0%   { background:#050913; }
    8%   { background:#101a30; }
    16%  { background:#1d3052; }
    26%  { background:#5daee9; }
    38%  { background:#9ad7ff; }
    48%  { background:#f8f1d4; }
    58%  { background:#ffb05a; }
    66%  { background:#d85a4e; }
    74%  { background:#7c335f; }
    84%  { background:#121a33; }
    92%  { background:#050913; }
    100% { background:#050913; }
  }

  .scene{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    animation: sceneTone 14s linear infinite;
  }

  @keyframes sceneTone{
    0%   { filter:brightness(.18) contrast(1.14) saturate(1.05); }
    10%  { filter:brightness(.28) contrast(1.12) saturate(1.06); }
    20%  { filter:brightness(.62) contrast(1.08) saturate(1.1); }
    34%  { filter:brightness(1.18) contrast(1.04) saturate(1.18); }
    46%  { filter:brightness(1.48) contrast(1.02) saturate(1.08); }
    56%  { filter:brightness(1.22) contrast(1.04) saturate(1.16); }
    66%  { filter:brightness(.82) contrast(1.09) saturate(1.22); }
    78%  { filter:brightness(.38) contrast(1.12) saturate(1.08); }
    90%  { filter:brightness(.20) contrast(1.14) saturate(1.03); }
    100% { filter:brightness(.18) contrast(1.14) saturate(1.05); }
  }

  /* ── Stars ─────────────────────────────────────── */
  .stars{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
  }

  .star{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
    background:white;
    opacity:0;
    animation: starCycle 14s linear infinite;
  }

  @keyframes starCycle{
    0%, 44% { opacity:0; transform:scale(.8); }
    58%     { opacity:.7; }
    82%     { opacity:1; }
    100%    { opacity:0; }
  }

  /* ── Sun & Moon orbit layer ─────────────────────── */
  .sky-orbit{
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;
  }

  .celestial{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    left:-10%;
    top:75%;
    will-change:left, top, opacity;
  }

  .sun{
    background:radial-gradient(circle at 35% 35%, #fff7c0 0 18%, #ffd86b 38%, #ff9e2a 72%, rgba(255,158,42,0) 73%);
    box-shadow:0 0 30px rgba(255,200,80,.8);
    animation:sunPath 14s linear infinite;
  }

  .moon{
    background:radial-gradient(circle at 38% 35%, #fff 0 18%, #d7e0ef 45%, #95a3bd 80%);
    box-shadow:0 0 20px rgba(255,255,255,.4);
    animation:moonPath 14s linear infinite;
    animation-delay:-7s;
  }

  .moon::after{
    content:"";
    position:absolute;
    width:16px;
    height:16px;
    border-radius:50%;
    right:14px;
    top:18px;
    background:rgba(120,130,150,0.25);
  }

  @keyframes sunPath{
    0%   { left:-10%; top:75%; opacity:0; }
    8%   { opacity:1; }
    25%  { left:24%;  top:36%; }
    50%  { left:50%;  top:10%; }
    75%  { left:76%;  top:36%; }
    92%  { opacity:1; }
    100% { left:110%; top:75%; opacity:0; }
  }

  @keyframes moonPath{
    0%   { left:-10%; top:75%; opacity:0; }
    25%  { left:24%;  top:36%; opacity:.2; }
    50%  { left:50%;  top:10%; opacity:1; }
    75%  { left:76%;  top:36%; opacity:1; }
    100% { left:110%; top:75%; opacity:0; }
  }

  /* ── Hills & ground ─────────────────────────────── */
  .layers{
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;
  }

  .hill{
    position:absolute;
    width:200%;
    left:0;
    background-repeat:repeat-x;
  }

  .hill1{
    bottom:25%;
    height:18%;
    opacity:.5;
    background:
      radial-gradient(ellipse 200px 100px at 10% 100%,#6c9560 0 60%,transparent 61%) 0 100%/350px 100% repeat-x,
      linear-gradient(to top, #55774a 0%, #55774a 100%);
    animation:drift1 120s linear infinite;
  }

  .hill2{
    bottom:14%;
    height:22%;
    opacity:.8;
    background:
      radial-gradient(ellipse 260px 120px at 10% 100%,#5d874f 0 60%,transparent 61%) 0 100%/420px 100% repeat-x,
      linear-gradient(to top, #4f7344 0%, #4f7344 100%);
    animation:drift2 80s linear infinite;
  }

  .ground{
    bottom:0;
    height:16%;
    background:linear-gradient(#b99c5e,#a88848);
    animation:drift3 40s linear infinite;
    box-shadow:0 -1px 0 rgba(0,0,0,0.04) inset;
  }

  @keyframes drift1{ from{ transform:translateX(0); } to{ transform:translateX(-25%); } }
  @keyframes drift2{ from{ transform:translateX(0); } to{ transform:translateX(-35%); } }
  @keyframes drift3{ from{ transform:translateX(0); } to{ transform:translateX(-50%); } }

  /* ── Sheep ──────────────────────────────────────── */
  .sheep-wrap{
    position:absolute;
    bottom:14%;
    z-index:6;
    animation: sheepWander 22s ease-in-out infinite;
    transform-origin:center bottom;
  }

  @keyframes sheepWander{
    0%   { left:10%;  }
    15%  { left:22%;  }
    30%  { left:15%;  }
    45%  { left:38%;  }
    60%  { left:28%;  }
    75%  { left:55%;  }
    88%  { left:42%;  }
    100% { left:10%;  }
  }

  .sheep{
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    display:block;
    animation: sheepBob 0.55s ease-in-out infinite alternate;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.25));
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  @keyframes sheepBob{
    from{ transform:translateY(0) rotate(-2deg) scaleX(1); }
    to  { transform:translateY(-5px) rotate(2deg) scaleX(-1); }
  }

  /* ── Panel ──────────────────────────────────────── */
  .panel{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:8;
    background:var(--panel);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    padding:2.2rem 2.8rem 2rem;
    box-shadow:0 8px 40px rgba(0,0,0,.35), 0 0 0 1.5px rgba(255,255,255,0.3) inset;
    max-width:480px;
    width:88vw;
    pointer-events:auto;
  }

  .panel h1{
    font-size:clamp(3.5rem,14vw,7rem);
    line-height:1;
    margin:0 0 .1em;
    color:var(--wood);
    text-shadow:0 3px 0 rgba(0,0,0,.18);
    letter-spacing:-2px;
  }

  .panel .subtitle{
    font-size:clamp(1rem,3.5vw,1.4rem);
    font-style:italic;
    color:var(--wood-dark);
    margin-bottom:.5rem;
  }

  .panel .verse{
    font-size:clamp(.7rem,2vw,.9rem);
    color:#5c4020;
    margin:.5rem 0 1.2rem;
    line-height:1.5;
  }

  .btn-home{
    display:inline-block;
    background:var(--wood);
    color:#fff;
    text-decoration:none;
    border-radius:40px;
    padding:.6rem 2rem;
    font-size:clamp(.85rem,2.5vw,1rem);
    font-family:Georgia,serif;
    letter-spacing:.5px;
    transition:background .2s, transform .15s;
    box-shadow:0 4px 0 var(--wood-dark);
    cursor:pointer;
  }
  .btn-home:hover{ background:var(--wood-dark); transform:translateY(-2px); }
  .btn-home:active{ transform:translateY(1px); box-shadow:0 2px 0 var(--wood-dark); }

  /* ── Mute toggle ────────────────────────────────── */
  #muteBtn{
    position:fixed;
    bottom:18px;
    right:18px;
    z-index:20;
    background:rgba(0,0,0,.38);
    border:none;
    border-radius:50%;
    width:42px;
    height:42px;
    font-size:1.1rem;
    cursor:pointer;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .2s;
    backdrop-filter:blur(4px);
  }
  #muteBtn:hover{ background:rgba(0,0,0,.6); }
</style>
</head>
<body>

<!-- Sheep bleat audio -->
<audio id="bleatAudio" preload="auto">
  <source src="https://twcministries.net/Pages/Apps/Sound%20effects/sheep%20bleats.mp3" type="audio/mpeg">
</audio>

<div class="scene">

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Sun & Moon -->
  <div class="sky-orbit">
    <div class="celestial sun"></div>
    <div class="celestial moon"></div>
  </div>

  <!-- Hills & ground -->
  <div class="layers">
    <div class="hill hill1"></div>
    <div class="hill hill2"></div>
    <div class="hill ground"></div>
  </div>

  <!-- Wandering sheep -->
  <div class="sheep-wrap" id="sheepWrap">
    <span class="sheep" id="sheep" title="Click me!">🐑</span>
  </div>

  <!-- Main panel -->
  <div class="panel">
    <h1>404</h1>
    <p class="subtitle">One sheep has gone astray…</p>
    <p class="verse">"Suppose one of you has a hundred sheep and loses one of them — does he not leave the ninety-nine in the open country and go after the lost sheep until he finds it?" — Luke 15:4</p>
    <a class="btn-home" href="/">← Go back home</a>
  </div>

</div>

<!-- Mute button -->
<button id="muteBtn" title="Toggle sound">🔊</button>

<script>
// ── Stars ────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars');
  const cycle = 14; // seconds (matches CSS)
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + '%';
    s.style.top  = Math.random()*65  + '%';
    const delay = (Math.random() * cycle).toFixed(2);
    s.style.animationDelay = '-' + delay + 's';
    const sz = (.8 + Math.random()*2.2).toFixed(1);
    s.style.width = sz + 'px';
    s.style.height= sz + 'px';
    c.appendChild(s);
  }
})();

// ── Sheep bleat ──────────────────────────────────────
const bleat    = document.getElementById('bleatAudio');
const muteBtn  = document.getElementById('muteBtn');
const sheep    = document.getElementById('sheep');
let   muted    = false;

function tryBleat(){
  if(muted) return;
  bleat.currentTime = 0;
  bleat.play().catch(()=>{});
}

// Auto-bleat every 8-14 seconds
function scheduleBleat(){
  const delay = 8000 + Math.random() * 6000;
  setTimeout(()=>{
    tryBleat();
    scheduleBleat();
  }, delay);
}
// Delay first bleat until user has been on page a moment
setTimeout(scheduleBleat, 3500);

// Click sheep to bleat immediately
sheep.addEventListener('click', () => {
  tryBleat();
  sheep.style.transform = 'scale(1.35) rotate(-8deg)';
  setTimeout(()=>{ sheep.style.transform=''; }, 300);
});

// Mute toggle
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(muted){ bleat.pause(); bleat.currentTime=0; }
});
</script>
</body>
</html>
