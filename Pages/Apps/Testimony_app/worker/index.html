<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Testimony Log | TWC Ministries</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A1628;
  --navy-mid:#122040;
  --navy-panel:#16283A;
  --navy-card:#0E1E30;
  --navy-hover:#1B2F56;
  --gold:#C8972B;
  --gold-light:#E6B84A;
  --gold-dim:#7a5c1a;
  --gold-glow:rgba(200,151,43,.15);
  --white:#FFFFFF;
  --text:#E2E8F4;
  --text-dim:#8A9BB5;
  --border:#1E3050;
  --danger:#C0392B;
  --danger-bg:rgba(192,57,43,.12);
  --ok:#4caf50;
  --radius:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--navy);
  color:var(--text);
  font-family:'Lora', Georgia, serif;
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% -10%, rgba(200,151,43,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(18,32,64,0.9) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}
.wrapper{
  max-width:900px;
  margin:0 auto;
  padding:0 20px 80px;
  position:relative;
  z-index:1;
}
.site-header{padding:30px 0 26px;text-align:center}
.header-logo-row{
  display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px;
}
.header-logo{
  width:58px; height:58px; object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(200,151,43,0.45));
}
.header-brand-title{
  font-family:'Cinzel', serif;
  font-size:clamp(20px, 4.5vw, 30px);
  font-weight:700; color:var(--white); letter-spacing:2px; line-height:1.1; text-align:left;
}
.header-brand-sub{
  font-family:'Cinzel', serif;
  font-size:9px; letter-spacing:3.5px; color:var(--gold); text-transform:uppercase; margin-top:4px; text-align:left;
}
.gold-bar{
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin:18px 0 14px;
}
.page-title{
  font-family:'Cinzel', serif;
  font-size:clamp(14px, 2.5vw, 18px);
  color:var(--gold);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.header-verse{font-style:italic;color:var(--text-dim);font-size:13px}
.panel{
  background:var(--navy-panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:30px 34px;
  margin-bottom:22px;
  position:relative;
}
.panel::before{
  content:'';
  position:absolute; top:0; left:20px; right:20px; height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius:2px;
}
.panel-title{
  font-family:'Cinzel', serif;
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:20px;
  display:flex; align-items:center; gap:10px;
}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}
.fg{margin-bottom:18px}
label{
  display:block;
  font-family:'Cinzel', serif;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:8px;
}
input[type="text"], input[type="password"], textarea{
  width:100%;
  background:var(--navy-card);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Lora', serif;
  font-size:15px;
  padding:12px 16px;
  border-radius:var(--radius);
  outline:none;
  transition:border-color .2s, box-shadow .2s;
}
input[type="text"]:focus, input[type="password"]:focus, textarea:focus{
  border-color:var(--gold-dim);
  box-shadow:0 0 0 3px var(--gold-glow);
}
input::placeholder, textarea::placeholder{color:#253650;font-style:italic}
textarea{min-height:140px;resize:vertical;line-height:1.8}
textarea:disabled{opacity:.55;cursor:not-allowed}
.char-cnt{
  text-align:right;
  font-size:11px;
  color:var(--text-dim);
  font-family:'Cinzel', serif;
  letter-spacing:1px;
  margin-top:5px;
}
.btn{
  font-family:'Cinzel', serif;
  font-size:10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  padding:12px 24px;
  border:none;
  cursor:pointer;
  border-radius:var(--radius);
  transition:all .2s;
  display:inline-flex;
  align-items:center;
  gap:7px;
  line-height:1;
  white-space:nowrap;
}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:700}
.btn-gold:hover:not(:disabled){background:var(--gold-light);transform:translateY(-1px);box-shadow:0 5px 20px rgba(200,151,43,.3)}
.btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
.btn-outline:hover:not(:disabled){background:var(--gold-glow);border-color:var(--gold)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-ghost:hover:not(:disabled){border-color:var(--text-dim);color:var(--text)}
.btn-danger{background:transparent;border:1px solid rgba(192,57,43,.4);color:#e07060}
.btn-danger:hover:not(:disabled){background:var(--danger-bg);border-color:var(--danger)}
.btn-full{width:100%;justify-content:center}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.user-bar{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--navy-mid);
  border:1px solid var(--border);
  border-left:3px solid var(--gold);
  padding:14px 20px;
  border-radius:var(--radius);
  margin-bottom:24px;
  gap:14px;
  flex-wrap:wrap;
}
.ub-left{display:flex;align-items:center;gap:14px}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg, var(--gold-dim), var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel', serif;
  font-size:17px;color:var(--navy);font-weight:700;flex-shrink:0;
}
.ub-name{font-family:'Cinzel', serif;font-size:13px;color:var(--white);letter-spacing:1px}
.ub-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
.entries-wrap{display:flex;flex-direction:column;gap:14px}
.entry-card{
  background:var(--navy-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  animation:up .3s ease both;
  transition:border-color .2s;
}
.entry-card:hover{border-color:#253a5a}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.e-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.e-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.e-seq{
  font-family:'Cinzel', serif;
  font-size:10px; letter-spacing:2px;
  color:var(--gold);
  background:rgba(200,151,43,.1);
  border:1px solid var(--gold-dim);
  padding:3px 10px;
  border-radius:20px;
}
.e-date{font-size:12px;color:var(--text-dim);font-style:italic}
.e-divider{height:1px;background:var(--border);margin:12px 0}
.e-body{font-size:15px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word}
.empty-state{text-align:center;padding:44px 20px;color:var(--text-dim)}
.empty-icon{font-size:28px;display:block;margin-bottom:14px;opacity:.25}
.notice{
  background:rgba(200,151,43,.07);
  border:1px solid var(--gold-dim);
  border-radius:var(--radius);
  padding:14px 18px;
  font-size:13px;
  color:var(--text-dim);
  line-height:1.7;
  margin-bottom:18px;
}
.notice code{
  background:var(--navy-card);
  padding:1px 6px;
  border-radius:3px;
  font-size:12px;
  color:var(--gold);
  font-family:'Courier New', monospace;
}
.notice strong{color:var(--gold-light)}
.overlay{
  position:fixed; inset:0;
  background:rgba(10,22,40,.88);
  z-index:900;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
  animation:fi .15s ease;
}
@keyframes fi{from{opacity:0}to{opacity:1}}
.dialog{
  background:var(--navy-panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px 36px;
  max-width:520px; width:100%;
  animation:di .2s ease;
  max-height:90vh;
  overflow-y:auto;
}
@keyframes di{from{opacity:0;transform:scale(.95) translateY(-10px)}to{opacity:1;transform:none}}
.dialog-title{
  font-family:'Cinzel', serif;
  font-size:13px; letter-spacing:2px;
  margin-bottom:12px;
}
.dialog-body{color:var(--text-dim);font-size:14px;line-height:1.7;margin-bottom:22px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(110px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}
.stat-num{font-family:'Cinzel', serif;font-size:30px;color:var(--gold);display:block;line-height:1;margin-bottom:6px}
.stat-lbl{font-size:10px;color:var(--text-dim);font-family:'Cinzel', serif;letter-spacing:1.5px;text-transform:uppercase}
.admin-table{width:100%;border-collapse:collapse;font-size:14px}
.admin-table th{
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-dim);
  text-align:left;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}
.admin-table td{padding:12px 14px;border-bottom:1px solid rgba(30,48,80,.5);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(27,47,86,.3)}
.spin{
  display:inline-block;
  width:16px;height:16px;
  border:2px solid rgba(200,151,43,.3);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:s .7s linear infinite;
  vertical-align:middle;
}
@keyframes s{to{transform:rotate(360deg)}}
.loading-state{text-align:center;padding:50px 20px;color:var(--text-dim);font-style:italic;font-size:14px}
.toast{
  position:fixed; bottom:26px; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--gold); color:var(--navy);
  font-family:'Cinzel', serif; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; font-weight:700;
  padding:12px 28px; border-radius:var(--radius);
  opacity:0; transition:all .3s ease;
  z-index:999; pointer-events:none;
  box-shadow:0 6px 30px rgba(200,151,43,.35);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger);color:#fff;box-shadow:none}
.toast.ok{background:var(--ok);color:#fff;box-shadow:none}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.filter-row > *{flex:1;min-width:180px}
.status-pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  margin-left:8px;
  padding:3px 10px;
  border-radius:999px;
  font-size:10px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  border:1px solid var(--border);
  color:var(--text-dim);
}
.status-pill .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text-dim);
}
.status-pill.online{color:#9fe29f;border-color:rgba(79, 169, 79, .3)}
.status-pill.online .dot{background:#4caf50}
.status-pill.offline{color:#f4b0a7;border-color:rgba(192,57,43,.3)}
.status-pill.offline .dot{background:#e07060}
@media (max-width:580px){
  .panel{padding:22px 16px}
  .user-bar{flex-direction:column;align-items:flex-start}
  .btn-row .btn{flex:1;min-width:0;justify-content:center}
}
@media print{
  body{background:white;color:#111}
  .no-print{display:none !important}
  body::before{display:none}
  .panel{background:white;border:1px solid #ccc;break-inside:avoid}
  .panel::before{display:none}
  .entry-card{background:white;border:1px solid #ccc;break-inside:avoid}
  .e-body{color:#222}
  .e-date{color:#666}
  .user-bar{background:#f5f5f5;border:1px solid #ccc}
}
</style>
</head>
<body>
<div class="wrapper">
  <header class="site-header">
    <div class="header-logo-row">
      <img class="header-logo" src="https://www.twcministries.net/Pages/church_photos/Image1-transparent.gif" alt="TWC Logo" onerror="this.style.display='none'"/>
      <div>
        <div class="header-brand-title">TWC Ministries</div>
        <div class="header-brand-sub">Transformational Worship Centre</div>
      </div>
    </div>
    <div class="gold-bar"></div>
    <div class="page-title">Testimony Log</div>
    <div class="header-verse">
      "They triumphed over him by the blood of the Lamb and by the word of their testimony." — Rev 12:11
    </div>
  </header>

  <div id="app">
    <div class="loading-state">
      <div class="spin"></div>
      <div style="margin-top:16px;">Loading testimony records...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" style="display:none;"></div>

<script>
/* ======================================================
   CONFIG
   Backend expects these endpoints:
   GET    /api/db
   POST   /api/auth/login
   POST   /api/auth/logout
   POST   /api/entries
   DELETE /api/entries/:id
   POST   /api/admin/login
   GET    /api/admin/stats
   POST   /api/admin/export
   ====================================================== */
const CFG = {
  API_BASE: '/api',
  SITE_NAME: 'TWC Ministries',
  APP_NAME: 'Testimony Log',
  MAX_TEXT: 5000,
  MIN_TEXT: 10,
  SESSION_KEY: 'twc_sess_v4',
  CACHE_KEY: 'twc_v4_cache',
  CACHE_META_KEY: 'twc_v4_cache_meta',
  DISPLAY_OFFLINE_MSG: true
};

let STATE = {
  db: { users: {} },
  user: null,
  view: 'auth',
  accessCode: '',
  admin: false,
  adminStats: null,
  filter: ''
};

let _toastTimer;
let _busy = false;

function toast(msg, err=false, ok=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (ok ? ' ok' : '') + (err ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
}

function showDlg(html) {
  const ol = document.getElementById('overlay');
  ol.innerHTML = html;
  ol.style.display = 'flex';
}

function closeDlg() {
  const ol = document.getElementById('overlay');
  ol.style.display = 'none';
  ol.innerHTML = '';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function setBusy(id, busy, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = busy;
  btn.innerHTML = label;
}

function cSave(d) {
  try {
    localStorage.setItem(CFG.CACHE_KEY, JSON.stringify(d));
    localStorage.setItem(CFG.CACHE_META_KEY, JSON.stringify({ t: Date.now() }));
  } catch {}
}

function cLoad() {
  try {
    const raw = localStorage.getItem(CFG.CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function dbShape(raw) {
  if (!raw || typeof raw !== 'object') return { users: {} };
  if (!raw.users || typeof raw.users !== 'object') return { users: {} };
  return raw;
}

async function api(path, opts={}) {
  const r = await fetch(CFG.API_BASE + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts
  });
  if (!r.ok) {
    let msg = 'Request failed (' + r.status + ')';
    try {
      const e = await r.json();
      msg = e.error || e.message || msg;
    } catch {}
    throw new Error(msg);
  }
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('application/json')) return r.json();
  return r.text();
}

async function loadDB() {
  try {
    const data = await api('/db', { method: 'GET', headers: {} });
    STATE.db = dbShape(data);
    cSave(STATE.db);
    return true;
  } catch (e) {
    const cached = cLoad();
    STATE.db = dbShape(cached);
    if (cached) toast('Using cached data', true);
    return false;
  }
}

async function restoreSession() {
  const sess = sessionStorage.getItem(CFG.SESSION_KEY);
  if (!sess) return;
  try {
    const db = await api('/db', { method: 'GET', headers: {} });
    STATE.db = dbShape(db);
    if (sess && STATE.db.users?.[sess]) {
      STATE.user = sess;
      STATE.view = 'dash';
    }
  } catch {
    const cached = cLoad();
    STATE.db = dbShape(cached);
    if (sess && STATE.db.users?.[sess]) {
      STATE.user = sess;
      STATE.view = 'dash';
    }
  }
}

function render() {
  const app = document.getElementById('app');
  if (STATE.view === 'auth') renderAuth(app);
  else if (STATE.view === 'dash') renderDash(app);
  else if (STATE.view === 'admin') renderAdmin(app);
}

function appStatusPill() {
  const online = navigator.onLine;
  return `<span class="status-pill ${online ? 'online' : 'offline'}"><span class="dot"></span>${online ? 'Online' : 'Offline'}</span>`;
}

function renderAuth(app) {
  app.innerHTML = `
    <div class="panel">
      <div class="panel-title">
        ✦ Welcome - Sign In
        ${appStatusPill()}
      </div>

      <p style="color:var(--text-dim);font-size:14px;margin-bottom:22px;line-height:1.8;font-style:italic;">
        Enter your name and your access code to open your personal testimony record.
      </p>

      <div class="fg">
        <label for="ni">Your Name</label>
        <input type="text" id="ni" placeholder="e.g. Sister Mary Johnson" maxlength="80" autocomplete="name"/>
      </div>

      <div class="fg">
        <label for="ci">Access Code</label>
        <input type="password" id="ci" placeholder="Enter the code from church leadership" autocomplete="off"/>
      </div>

      <div class="notice">
        <strong>Note</strong><br/>
        The access code is checked by the secure backend. No token or password is stored in this page.
      </div>

      <button class="btn btn-gold btn-full" onclick="doSignIn()">Enter the Sanctuary</button>

      <div style="text-align:center;margin-top:14px;">
        <button class="btn btn-ghost" style="font-size:9px;" onclick="promptAdmin()">Admin Access</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:14px;">
      <p style="font-size:13px;color:var(--text-dim);font-style:italic;">
        "Come to me, all you who are weary and burdened, and I will give you rest." - Matthew 11:28
      </p>
    </div>
  `;
  const ni = document.getElementById('ni');
  ni.focus();
  ni.addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
  document.getElementById('ci').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
}

async function doSignIn() {
  const name = document.getElementById('ni').value.trim();
  const code = document.getElementById('ci').value.trim();

  if (!name) return toast('Please enter your name', true);
  if (!code) return toast('Please enter the access code', true);

  setBusyButton(true, 'Signing in...');

  try {
    await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ name, accessCode: code })
    });
    STATE.user = name;
    STATE.accessCode = code;
    STATE.view = 'dash';
    sessionStorage.setItem(CFG.SESSION_KEY, name);
    await loadDB();
    toast('Welcome, ' + name.split(' ')[0] + '!', false, true);
    render();
  } catch (e) {
    toast(e.message || 'Sign in failed', true);
  } finally {
    setBusyButton(false, 'Enter the Sanctuary');
  }
}

function setBusyButton(busy, label) {
  const btn = document.querySelector('.panel .btn-gold');
  if (!btn) return;
  btn.disabled = busy;
  btn.innerHTML = busy ? '<span class="spin"></span> ' + label : label;
}

function userEntries() {
  const ud = STATE.db.users?.[STATE.user] || { entries: [], created: null };
  return ud.entries || [];
}

function renderEntries(entries) {
  const filtered = STATE.filter
    ? entries.filter(e => (e.text || '').toLowerCase().includes(STATE.filter.toLowerCase()))
    : entries;

  if (!filtered.length) {
    return `<div class="empty-state"><span class="empty-icon">✦</span>No testimonies recorded yet. Share what God has done!</div>`;
  }

  return `<div class="entries-wrap">${[...filtered].reverse().map(e => `
    <div class="entry-card" id="ec-${e.id}">
      <div class="e-head">
        <div class="e-meta">
          <span class="e-seq">Entry #${e.seq}</span>
          <span class="e-date">${esc(e.date)} · ${esc(e.time)}</span>
        </div>
        <button class="btn btn-danger no-print" style="padding:5px 12px;font-size:9px;" onclick="confirmDel('${esc(e.id)}')">✕ Delete</button>
      </div>
      <div class="e-divider"></div>
      <div class="e-body">${esc(e.text)}</div>
    </div>
  `).join('')}</div>`;
}

function renderDash(app) {
  const ud = STATE.db.users?.[STATE.user] || { entries: [], created: null, lastActive: null };
  const ents = ud.entries || [];
  const cnt = ents.length;
  const init = (STATE.user || '?')[0].toUpperCase();
  const ro = !navigator.onLine && !cLoad();
  const pill = navigator.onLine ? '<span class="status-pill online"><span class="dot"></span>Online</span>' : '<span class="status-pill offline"><span class="dot"></span>Offline</span>';

  app.innerHTML = `
    <div class="user-bar no-print">
      <div class="ub-left">
        <div class="avatar">${esc(init)}</div>
        <div>
          <div class="ub-name">${esc(STATE.user)} ${pill}</div>
          <div class="ub-meta" id="ubMeta">${cnt} testimon${cnt === 1 ? 'y' : 'ies'} recorded</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline no-print" onclick="doPrint()">🖨 Print</button>
        <button class="btn btn-outline no-print" onclick="doDownload()">⤓ Download</button>
        <button class="btn btn-ghost no-print" onclick="doSignOut()">Sign Out</button>
      </div>
    </div>

    <div class="panel no-print">
      <div class="panel-title">✦ Record a New Testimony</div>
      ${ro ? `<div class="notice"><strong>Read-Only Mode</strong> - The backend is not reachable right now. You can view cached entries, but saving is disabled until the API is available.</div>` : ''}
      <div class="fg">
        <label for="et">Your Testimony</label>
        <textarea id="et" maxlength="${CFG.MAX_TEXT}" ${ro ? 'disabled' : ''} placeholder="Share what the Lord has done - a healing, a breakthrough, an answered prayer..." oninput="updateCnt(this)"></textarea>
        <div class="char-cnt"><span id="cc">0</span> / ${CFG.MAX_TEXT}</div>
      </div>
      <button class="btn btn-gold btn-full" id="subBtn" onclick="submitEntry()" ${ro ? 'disabled' : ''}>Record My Testimony</button>
    </div>

    <div class="panel">
      <div class="panel-title">✦ Testimony History</div>
      <div class="filter-row no-print">
        <input type="text" id="searchBox" placeholder="Search your entries..." value="${esc(STATE.filter)}" oninput="applyFilter(this.value)"/>
        <button class="btn btn-ghost" onclick="clearFilter()">Clear Search</button>
      </div>
      <div id="histBody">${renderEntries(ents)}</div>
    </div>

    <div style="text-align:center;margin-top:8px;">
      <p style="font-size:13px;color:var(--text-dim);font-style:italic;">
        "Give thanks to the Lord, for He is good; His love endures forever." - Psalm 107:1
      </p>
    </div>
  `;
}

function updateCnt(ta) {
  const el = document.getElementById('cc');
  if (el) el.textContent = ta.value.length;
}

function applyFilter(v) {
  STATE.filter = v || '';
  const ents = userEntries();
  const hist = document.getElementById('histBody');
  if (hist) hist.innerHTML = renderEntries(ents);
}

function clearFilter() {
  STATE.filter = '';
  render();
}

async function submitEntry() {
  const ta = document.getElementById('et');
  const text = ta.value.trim();

  if (!text || text.length < CFG.MIN_TEXT) {
    toast('Please write a bit more', true);
    return;
  }

  setBusy('subBtn', true, '<span class="spin"></span> Saving...');
  try {
    const res = await api('/entries', {
      method: 'POST',
      body: JSON.stringify({ text })
    });

    await loadDB();
    ta.value = '';
    const cc = document.getElementById('cc');
    if (cc) cc.textContent = '0';
    toast(res.message || 'Testimony recorded.', false, true);
    render();
  } catch (e) {
    toast(e.message || 'Save failed', true);
  } finally {
    setBusy('subBtn', false, 'Record My Testimony');
  }
}

function confirmDel(id) {
  showDlg(`
    <div class="dialog no-print">
      <div class="dialog-title" style="color:#e07060;">⚠ Delete This Entry?</div>
      <div class="dialog-body">This testimony will be permanently removed from your record. This cannot be undone.</div>
      <div class="btn-row">
        <button class="btn btn-danger" onclick="doDel('${esc(id)}')">Yes, Delete</button>
        <button class="btn btn-ghost" onclick="closeDlg()">Cancel</button>
      </div>
    </div>
  `);
}

async function doDel(id) {
  closeDlg();
  try {
    await api('/entries/' + encodeURIComponent(id), { method: 'DELETE', body: JSON.stringify({}) });
    await loadDB();
    toast('Entry deleted.', false, true);
    render();
  } catch (e) {
    toast(e.message || 'Delete failed', true);
  }
}

function doPrint() {
  window.print();
}

function doDownload() {
  const ud = STATE.db.users?.[STATE.user] || { entries: [] };
  const ents = ud.entries || [];
  if (!ents.length) {
    toast('No entries to download yet', true);
    return;
  }

  const lines = [
    'TWC MINISTRIES - TESTIMONY LOG',
    'Transformational Worship Centre | twcministries.net',
    '',
    'Name: ' + STATE.user,
    'Downloaded: ' + new Date().toLocaleString(),
    'Total Entries: ' + ents.length,
    '',
    '"They triumphed over him by the blood of the Lamb',
    ' and by the word of their testimony." - Revelation 12:11',
    '',
    '═'.repeat(64)
  ];

  [...ents].reverse().forEach(e => {
    lines.push('', `ENTRY #${e.seq}`, `Date: ${e.date}`, `Time: ${e.time}`, '', e.text, '', '─'.repeat(64));
  });
  lines.push('', 'To God be the glory, great things He hath done!');

  const blob = new Blob([lines.join('\n')], { type:'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TWC_Testimony_${STATE.user.replace(/[^a-z0-9]/gi,'_')}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('Downloaded!', false, true);
}

function doSignOut() {
  STATE.user = null;
  STATE.accessCode = '';
  STATE.view = 'auth';
  sessionStorage.removeItem(CFG.SESSION_KEY);
  render();
}

function promptAdmin() {
  showDlg(`
    <div class="dialog no-print">
      <div class="dialog-title" style="color:var(--gold);">Admin Access</div>
      <div class="dialog-body">Enter the admin password to view usage statistics and all testimony records.</div>
      <div class="fg" style="margin-bottom:18px;">
        <label for="ap">Password</label>
        <input type="password" id="ap" placeholder="Admin password" autocomplete="off"/>
      </div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="checkAdmin()">Enter</button>
        <button class="btn btn-ghost" onclick="closeDlg()">Cancel</button>
      </div>
    </div>
  `);
  setTimeout(() => document.getElementById('ap')?.focus(), 100);
  document.getElementById('ap')?.addEventListener('keydown', e => { if (e.key === 'Enter') checkAdmin(); });
}

async function checkAdmin() {
  const pass = document.getElementById('ap')?.value.trim();
  if (!pass) return toast('Enter the admin password', true);

  try {
    await api('/admin/login', {
      method: 'POST',
      body: JSON.stringify({ password: pass })
    });
    closeDlg();
    await loadDB();
    const stats = await api('/admin/stats', { method: 'GET', headers: {} });
    STATE.adminStats = stats;
    STATE.view = 'admin';
    render();
    toast('Admin access granted.', false, true);
  } catch (e) {
    toast(e.message || 'Incorrect password', true);
  }
}

function renderAdmin(app) {
  const users = STATE.db.users || {};
  const ul = Object.entries(users);

  const total = ul.length;
  const totalE = ul.reduce((s,[,u]) => s + (u.entries || []).length, 0);
  const month = new Date().toISOString().slice(0,7);
  const thisM = ul.reduce((s,[,u]) => s + (u.entries || []).filter(e => e.iso?.startsWith(month)).length, 0);
  const avg = total ? (totalE / total).toFixed(1) : '0';

  const rows = ul.map(([name,u]) => ({
    name,
    cnt: (u.entries || []).length,
    created: u.created ? new Date(u.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—',
    last: (u.entries || []).length ? new Date([...u.entries].reverse()[0].iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'
  })).sort((a,b) => b.cnt - a.cnt);

  app.innerHTML = `
    <div class="user-bar no-print">
      <div class="ub-left">
        <div class="avatar" style="background:linear-gradient(135deg,#6b1515,#a02020);font-size:20px;">⚙</div>
        <div>
          <div class="ub-name">Admin Dashboard</div>
          <div class="ub-meta">TWC Testimony Log - Usage Overview</div>
        </div>
      </div>
      <button class="btn btn-ghost no-print" onclick="exitAdmin()">← Exit</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><span class="stat-num">${total}</span><span class="stat-lbl">Users</span></div>
      <div class="stat-card"><span class="stat-num">${totalE}</span><span class="stat-lbl">Entries</span></div>
      <div class="stat-card"><span class="stat-num">${thisM}</span><span class="stat-lbl">This Month</span></div>
      <div class="stat-card"><span class="stat-num">${avg}</span><span class="stat-lbl">Avg / User</span></div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ All Users</div>
      ${rows.length === 0 ? '<div class="empty-state"><span class="empty-icon">✦</span>No users yet.</div>' : `
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Entries</th><th>Joined</th><th>Last Entry</th><th></th></tr></thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td style="color:var(--text);">${esc(r.name)}</td>
                  <td><span class="e-seq">${r.cnt}</span></td>
                  <td style="color:var(--text-dim);font-size:13px;">${r.created}</td>
                  <td style="color:var(--text-dim);font-size:13px;">${r.last}</td>
                  <td><button class="btn btn-ghost" style="padding:6px 12px;font-size:9px;" onclick="adminView('${esc(r.name)}')">View</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `}
    </div>

    <div class="panel">
      <div class="panel-title">✦ JSON Backup</div>
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;line-height:1.7;">
        Download or copy the complete database for backup and migration purposes.
      </p>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="dlJson()">⤓ Download JSON</button>
        <button class="btn btn-ghost" onclick="copyJson()">Copy JSON</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:8px;">
      <p style="font-size:12px;color:var(--text-dim);font-style:italic;">"And the Lord added to their number daily those who were being saved." - Acts 2:47</p>
    </div>
  `;
}

function exitAdmin() {
  STATE.view = 'auth';
  STATE.adminStats = null;
  render();
}

function adminView(name) {
  const ud = STATE.db.users?.[name] || { entries: [], created: null };
  const ents = ud.entries || [];
  const preview = ents.length
    ? [...ents].reverse().slice(0,3).map(e => `
        <div style="margin-top:12px;padding:14px 16px;background:var(--navy-card);border-radius:4px;border:1px solid var(--border);">
          <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold);margin-bottom:7px;">Entry #${e.seq} · ${esc(e.date)}</div>
          <div style="font-size:14px;color:var(--text);line-height:1.75;white-space:pre-wrap;">${esc(e.text.slice(0,300))}${e.text.length > 300 ? '...' : ''}</div>
        </div>
      `).join('')
    : '<p style="color:var(--text-dim);font-style:italic;margin-top:12px;">No entries.</p>';

  showDlg(`
    <div class="dialog" style="max-width:560px;">
      <div class="dialog-title" style="color:var(--gold);">✦ ${esc(name)}</div>
      <div class="dialog-body">
        <strong style="color:var(--text);">${ents.length}</strong> testimon${ents.length === 1 ? 'y' : 'ies'} recorded.
        Joined: ${ud.created ? new Date(ud.created).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : 'Unknown'}.
      </div>
      <div style="max-height:340px;overflow-y:auto;">${preview}</div>
      <div style="margin-top:18px;">
        <button class="btn btn-ghost btn-full" onclick="closeDlg()">Close</button>
      </div>
    </div>
  `);
}

function dlJson() {
  const blob = new Blob([JSON.stringify(STATE.db, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TWC_Testimonies_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('JSON downloaded!', false, true);
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(STATE.db, null, 2))
    .then(() => toast('Copied to clipboard!', false, true))
    .catch(() => toast('Copy failed - try Download', true));
}

window.addEventListener('online', () => {
  toast('Connection restored', false, true);
  if (STATE.user) loadDB().then(render);
});
window.addEventListener('offline', () => {
  toast('Offline mode', true);
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDlg();
});

async function boot() {
  render();
  await loadDB();
  await restoreSession();
  render();
}

boot();
</script>
</body>
</html>
