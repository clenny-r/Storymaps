<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Testimony Log | TWC Ministries</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0A1628;
  --navy-mid:#1A2A4A;
  --navy-panel:#16283A;
  --navy-card:#0E1E30;
  --navy-hover:#2A3F66;
  --red:#DC143C;
  --red-light:#FF4757;
  --red-dark:#B71C1C;
  --red-glow:rgba(220,20,60,.25);
  --blue:#1E90FF;
  --blue-light:#4DA6FF;
  --blue-dark:#0066CC;
  --blue-glow:rgba(30,144,255,.25);
  --white:#FFFFFF;
  --text:#F5F7FA;
  --text-dim:#B0C4DE;
  --border:#2E4A6B;
  --gold:#FFD700;
  --gold-light:#FFED4E;
  --gold-dim:#DAA520;
  --gold-glow:rgba(255,215,0,.2);
  --danger:#DC143C;
  --danger-bg:rgba(220,20,60,.15);
  --ok:#4ecdc4;
  --success:#5CB85C;
  --warning:#FFA500;
  --info:#1E90FF;
  --purple:#8B5CF6;
  --radius:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--navy);
  color:var(--text);
  font-family:'Lora', Georgia, serif;
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% -10%, rgba(200,151,43,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(18,32,64,0.9) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}
.wrapper{
  max-width:900px;
  margin:0 auto;
  padding:0 20px 80px;
  position:relative;
  z-index:1;
}
.site-header{padding:30px 0 26px;text-align:center}
.header-logo-row{
  display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px;
}
.header-logo{
  width:58px; height:58px; object-fit:contain;
  filter:drop-shadow(0 0 12px rgba(200,151,43,0.45));
}
.header-brand-title{
  font-family:'Cinzel', serif;
  font-size:clamp(20px, 4.5vw, 30px);
  font-weight:700; color:var(--white); letter-spacing:2px; line-height:1.1; text-align:left;
}
.header-brand-sub{
  font-family:'Cinzel', serif;
  font-size:9px; letter-spacing:3.5px; color:var(--red-light); text-transform:uppercase; margin-top:4px; text-align:left;
}
.gold-bar{
  height:1px;
  background:linear-gradient(90deg, transparent, var(--red), var(--blue), transparent);
  margin:18px 0 14px;
}
.page-title{
  font-family:'Cinzel', serif;
  font-size:clamp(14px, 2.5vw, 18px);
  color:var(--blue-light);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.header-verse{font-style:italic;color:var(--text-dim);font-size:13px}
.panel{
  background:var(--navy-panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:30px 34px;
  margin-bottom:22px;
  position:relative;
}
.panel::before{
  content:'';
  position:absolute; top:0; left:20px; right:20px; height:2px;
  background:linear-gradient(90deg, transparent, var(--red), var(--blue), transparent);
  border-radius:2px;
}
.panel-title{
  font-family:'Cinzel', serif;
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--blue-light);
  margin-bottom:20px;
  display:flex; align-items:center; gap:10px;
}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}
.fg{margin-bottom:18px}
label{
  display:block;
  font-family:'Cinzel', serif;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:8px;
}
input[type="text"], input[type="password"], textarea{
  width:100%;
  background:var(--navy-card);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Lora', serif;
  font-size:15px;
  padding:12px 16px;
  border-radius:var(--radius);
  outline:none;
  transition:border-color .2s, box-shadow .2s;
}
input[type="text"]:focus, input[type="password"]:focus, textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-glow);
}
input::placeholder, textarea::placeholder{color:#253650;font-style:italic}
textarea{min-height:140px;resize:vertical;line-height:1.8}
textarea:disabled{opacity:.55;cursor:not-allowed}
.char-cnt{
  text-align:right;
  font-size:11px;
  color:var(--text-dim);
  font-family:'Cinzel', serif;
  letter-spacing:1px;
  margin-top:5px;
}
.btn{
  font-family:'Cinzel', serif;
  font-size:10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  padding:12px 24px;
  border:none;
  cursor:pointer;
  border-radius:var(--radius);
  transition:all .2s;
  display:inline-flex;
  align-items:center;
  gap:7px;
  line-height:1;
  white-space:nowrap;
}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-gold{background:var(--blue);color:var(--white);font-weight:700}
.btn-gold:hover:not(:disabled){background:var(--blue-light);transform:translateY(-1px);box-shadow:0 5px 20px rgba(30,144,255,.4)}
.btn-outline{background:transparent;border:1px solid var(--blue);color:var(--blue-light)}
.btn-outline:hover:not(:disabled){background:var(--blue-glow);border-color:var(--blue-light)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-ghost:hover:not(:disabled){border-color:var(--blue);color:var(--blue-light)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red-light)}
.btn-danger:hover:not(:disabled){background:var(--red-glow);border-color:var(--red-light)}
.btn-full{width:100%;justify-content:center}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.user-bar{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--navy-mid);
  border:1px solid var(--border);
  border-left:3px solid var(--red);
  padding:14px 20px;
  border-radius:var(--radius);
  margin-bottom:24px;
  gap:14px;
  flex-wrap:wrap;
}
.ub-left{display:flex;align-items:center;gap:14px}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg, var(--red), var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel', serif;
  font-size:17px;color:var(--white);font-weight:700;flex-shrink:0;
}
.ub-name{font-family:'Cinzel', serif;font-size:13px;color:var(--white);letter-spacing:1px}
.ub-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
.entries-wrap{display:flex;flex-direction:column;gap:14px}
.entry-card{
  background:var(--navy-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  animation:up .3s ease both;
  transition:border-color .2s;
}
.entry-card:hover{border-color:#253a5a}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.e-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.e-meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.e-seq{
  font-family:'Cinzel', serif;
  font-size:10px; letter-spacing:2px;
  color:var(--blue-light);
  background:rgba(30,144,255,.15);
  border:1px solid var(--blue);
  padding:3px 10px;
  border-radius:20px;
}
.e-date{font-size:12px;color:var(--text-dim);font-style:italic}
.e-divider{height:1px;background:var(--border);margin:12px 0}
.e-body{font-size:15px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word}
.empty-state{text-align:center;padding:44px 20px;color:var(--text-dim)}
.empty-icon{font-size:28px;display:block;margin-bottom:14px;opacity:.25}
.notice{
  background:rgba(200,151,43,.07);
  border:1px solid var(--gold-dim);
  border-radius:var(--radius);
  padding:14px 18px;
  font-size:13px;
  color:var(--text-dim);
  line-height:1.7;
  margin-bottom:18px;
}
.notice code{
  background:var(--navy-card);
  padding:1px 6px;
  border-radius:3px;
  font-size:12px;
  color:var(--gold);
  font-family:'Courier New', monospace;
}
.notice strong{color:var(--gold-light)}
.overlay{
  position:fixed; inset:0;
  background:rgba(10,22,40,.88);
  z-index:900;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
  animation:fi .15s ease;
}
@keyframes fi{from{opacity:0}to{opacity:1}}
.dialog{
  background:var(--navy-panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px 36px;
  max-width:520px; width:100%;
  animation:di .2s ease;
  max-height:90vh;
  overflow-y:auto;
}
@keyframes di{from{opacity:0;transform:scale(.95) translateY(-10px)}to{opacity:1;transform:none}}
.dialog-title{
  font-family:'Cinzel', serif;
  font-size:13px; letter-spacing:2px;
  margin-bottom:12px;
}
.dialog-body{color:var(--text-dim);font-size:14px;line-height:1.7;margin-bottom:22px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(110px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--navy-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}
.stat-num{font-family:'Cinzel', serif;font-size:30px;color:var(--gold);display:block;line-height:1;margin-bottom:6px}
.stat-lbl{font-size:10px;color:var(--text-dim);font-family:'Cinzel', serif;letter-spacing:1.5px;text-transform:uppercase}
.admin-table{width:100%;border-collapse:collapse;font-size:14px}
.admin-table th{
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-dim);
  text-align:left;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}
.admin-table td{padding:12px 14px;border-bottom:1px solid rgba(30,48,80,.5);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(27,47,86,.3)}
.spin{
  display:inline-block;
  width:16px;height:16px;
  border:2px solid rgba(200,151,43,.3);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:s .7s linear infinite;
  vertical-align:middle;
}
@keyframes s{to{transform:rotate(360deg)}}
.loading-state{text-align:center;padding:50px 20px;color:var(--text-dim);font-style:italic;font-size:14px}
.toast{
  position:fixed; bottom:26px; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--gold); color:var(--navy);
  font-family:'Cinzel', serif; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; font-weight:700;
  padding:12px 28px; border-radius:var(--radius);
  opacity:0; transition:all .3s ease;
  z-index:999; pointer-events:none;
  box-shadow:0 6px 30px rgba(200,151,43,.35);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger);color:#fff;box-shadow:none}
.toast.ok{background:var(--ok);color:#fff;box-shadow:none}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.filter-row > *{flex:1;min-width:180px}
.status-pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  margin-left:8px;
  padding:3px 10px;
  border-radius:999px;
  font-size:10px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  border:1px solid var(--border);
  color:var(--text-dim);
}
.status-pill .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text-dim);
}
.status-pill.online{color:#9fe29f;border-color:rgba(79, 169, 79, .3)}
.status-pill.online .dot{background:#4caf50}
.status-pill.offline{color:#f4b0a7;border-color:rgba(192,57,43,.3)}
.status-pill.offline .dot{background:#e07060}
@media (max-width:580px){
  .panel{padding:22px 16px}
  .user-bar{flex-direction:column;align-items:flex-start}
  .btn-row .btn{flex:1;min-width:0;justify-content:center}
}
@media print{
  body{background:white;color:#111;font-size:12pt}
  .no-print{display:none !important}
  body::before{display:none}
  .wrapper{max-width:100%;padding:10mm}
  .panel{
    background:white;
    border:1px solid #ccc;
    page-break-inside:avoid;
    break-inside:avoid;
    margin-bottom:5mm;
    padding:5mm;
  }
  .panel::before{display:none}
  .entry-card{
    background:white;
    border:1px solid #ccc;
    page-break-inside:avoid;
    break-inside:avoid;
    margin-bottom:4mm;
    padding:4mm;
  }
  .entry-card img{
    max-width:100%;
    max-height:150mm;
    page-break-inside:avoid;
  }
  .e-body{
    color:#222;
    orphans:3;
    widows:3;
  }
  .e-date{color:#666}
  .user-bar{
    background:#f5f5f5;
    border:1px solid #ccc;
    page-break-after:avoid;
  }
  .site-header{
    page-break-after:avoid;
    margin-bottom:5mm;
  }
  .page-title{font-size:14pt}
  .header-verse{font-size:10pt}
}
</style>
</head>
<body>
<div class="wrapper">
  <header class="site-header">
    <div class="header-logo-row">
      <a href="https://twcministries.net" style="display:flex;align-items:center;text-decoration:none;cursor:pointer;">
        <img class="header-logo" src="https://www.twcministries.net/Pages/church_photos/Image1-transparent.gif" alt="TWC Logo" onerror="this.style.display='none'"/>
      </a>
      <div>
        <div class="header-brand-title">TWC Ministries</div>
        <div class="header-brand-sub">Transformational Worship Centre</div>
      </div>
    </div>
    <div class="gold-bar"></div>
    <div class="page-title">Testimony Log</div>
    <div class="header-verse">
      "They triumphed over him by the blood of the Lamb and by the word of their testimony." — Rev 12:11
    </div>
  </header>

  <div id="app">
    <div class="loading-state">
      <div class="spin"></div>
      <div style="margin-top:16px;">Loading testimony records...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" style="display:none;"></div>

<script>
/* ======================================================
   CONFIG
   Backend endpoints (Cloudflare Worker):
   GET    /api/db              - Fetch all testimonies
   POST   /api/entries         - Create new testimony entry
   DELETE /api/entries/:id     - Delete testimony entry (admin)
   POST   /admin/login         - Admin authentication
   GET    /admin/stats         - Admin statistics
   ====================================================== */
const CFG = {
  API_BASE: 'https://twc-testimony-api2.kd7bgn7q2z.workers.dev',
  SITE_NAME: 'TWC Ministries',
  APP_NAME: 'Testimony Log',
  MAX_TEXT: 5000,
  MIN_TEXT: 10,
  SESSION_KEY: 'twc_sess_v4',
  CACHE_KEY: 'twc_v4_cache',
  CACHE_META_KEY: 'twc_v4_cache_meta',
  DISPLAY_OFFLINE_MSG: true
};

let STATE = {
  db: { users: {} },
  user: null,
  view: 'auth',
  accessCode: '',
  admin: false,
  adminStats: null,
  filter: ''
};

let _toastTimer;
let _busy = false;

function toast(msg, err=false, ok=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (ok ? ' ok' : '') + (err ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
}

function showDlg(html) {
  const ol = document.getElementById('overlay');
  ol.innerHTML = html;
  ol.style.display = 'flex';
}

function closeDlg() {
  const ol = document.getElementById('overlay');
  ol.style.display = 'none';
  ol.innerHTML = '';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Escape for use in JavaScript strings (onclick attributes)
function escJS(s) {
  return String(s)
    .replace(/\\/g, '\\\\')  // Backslash
    .replace(/'/g, "\\'")    // Single quote
    .replace(/"/g, '\\"')    // Double quote
    .replace(/\n/g, '\\n')   // Newline
    .replace(/\r/g, '\\r');  // Carriage return
}

function setBusy(id, busy, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = busy;
  btn.innerHTML = label;
}

function cSave(d) {
  try {
    localStorage.setItem(CFG.CACHE_KEY, JSON.stringify(d));
    localStorage.setItem(CFG.CACHE_META_KEY, JSON.stringify({ t: Date.now() }));
  } catch {}
}

function cLoad() {
  try {
    const raw = localStorage.getItem(CFG.CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function dbShape(raw) {
  if (!raw || typeof raw !== 'object') return { users: {} };
  if (!raw.users || typeof raw.users !== 'object') return { users: {} };
  return raw;
}

async function api(path, opts={}) {
  const r = await fetch(CFG.API_BASE + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts
  });
  if (!r.ok) {
    let msg = 'Request failed (' + r.status + ')';
    try {
      const e = await r.json();
      msg = e.error || e.message || msg;
    } catch {}
    throw new Error(msg);
  }
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('application/json')) return r.json();
  return r.text();
}

async function loadDB() {
  try {
    const data = await api('/api/db', { method: 'GET', headers: {} });
    STATE.db = dbShape(data);
    cSave(STATE.db);
    return true;
  } catch (e) {
    const cached = cLoad();
    STATE.db = dbShape(cached);
    if (cached) toast('Using cached data', true);
    return false;
  }
}

async function restoreSession() {
  const sess = sessionStorage.getItem(CFG.SESSION_KEY);
  if (!sess) return;
  try {
    const db = await api('/api/db', { method: 'GET', headers: {} });
    STATE.db = dbShape(db);
    if (sess && STATE.db.users?.[sess]) {
      STATE.user = sess;
      STATE.view = 'dash';
    }
  } catch {
    const cached = cLoad();
    STATE.db = dbShape(cached);
    if (sess && STATE.db.users?.[sess]) {
      STATE.user = sess;
      STATE.view = 'dash';
    }
  }
}

function render() {
  const app = document.getElementById('app');
  if (STATE.view === 'auth') renderAuth(app);
  else if (STATE.view === 'dash') renderDash(app);
  else if (STATE.view === 'admin') renderAdmin(app);
}

function appStatusPill() {
  const online = navigator.onLine;
  return `<span class="status-pill ${online ? 'online' : 'offline'}"><span class="dot"></span>${online ? 'Online' : 'Offline'}</span>`;
}

function renderAuth(app) {
  app.innerHTML = `
    <div class="panel">
      <div class="panel-title">
        ✦ Welcome - Sign In
        ${appStatusPill()}
      </div>

      <p style="color:var(--text-dim);font-size:14px;margin-bottom:22px;line-height:1.8;font-style:italic;">
        Enter your name and your access code to open your personal testimony record.
      </p>

      <div class="notice" style="margin-bottom:22px;">
        <strong>Privacy Tip:</strong> For your security, consider using a memorable nickname or pseudonym instead of your real name. 
        For example: "Sister Joy", "Brother David", or "Thankful Heart". You'll use the same name each time you return.
      </div>

      <div class="fg">
        <label for="ni">Your Name (or Nickname)</label>
        <input type="text" id="ni" placeholder="e.g. Sister Joy, Brother David, or Faithful Servant" maxlength="80" autocomplete="off"/>
      </div>

      <div class="fg">
        <label for="ci">Access Code</label>
        <input type="password" id="ci" placeholder="Enter the code from church leadership" autocomplete="off"/>
      </div>

      <div class="notice">
        <strong>Note</strong><br/>
        The access code is checked by the secure backend. No token or password is stored in this page.
      </div>

      <button class="btn btn-gold btn-full" onclick="doSignIn()">Enter the Sanctuary</button>

      <div style="text-align:center;margin-top:14px;">
        <button class="btn btn-ghost" style="font-size:9px;" onclick="promptAdmin()">Admin Access</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:14px;">
      <p style="font-size:13px;color:var(--text-dim);font-style:italic;">
        "Come to me, all you who are weary and burdened, and I will give you rest." - Matthew 11:28
      </p>
    </div>
  `;
  const ni = document.getElementById('ni');
  ni.focus();
  ni.addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });

// Voice recording state
let mediaRecorder = null;
let audioChunks = [];
let recordedAudioBlob = null;
let recordingStartTime = 0;
let recordingTimer = null;

async function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    recordingStartTime = Date.now();
    
    mediaRecorder.ondataavailable = (event) => {
      audioChunks.push(event.data);
    };
    
    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      recordedAudioBlob = audioBlob;
      const duration = Math.round((Date.now() - recordingStartTime) / 1000);
      
      // Show preview
      document.getElementById('audioPreview').style.display = 'block';
      document.getElementById('audioDuration').textContent = `${duration} second${duration !== 1 ? 's' : ''}`;
      document.getElementById('playBtn').disabled = false;
      document.getElementById('audioStatus').textContent = '';
      
      // Stop all tracks
      stream.getTracks().forEach(track => track.stop());
    };
    
    mediaRecorder.start();
    
    // Update UI
    document.getElementById('recordBtnText').textContent = 'Stop Recording';
    document.getElementById('recordBtn').style.background = 'var(--danger)';
    document.getElementById('recordBtn').style.borderColor = 'var(--danger)';
    
    // Start timer display
    recordingTimer = setInterval(() => {
      const elapsed = Math.round((Date.now() - recordingStartTime) / 1000);
      document.getElementById('audioStatus').textContent = `Recording... ${elapsed}s / 60s`;
      
      // Auto-stop at 60 seconds
      if (elapsed >= 60) {
        stopRecording();
      }
    }, 100);
    
  } catch (err) {
    toast('Microphone access denied. Please allow microphone access to record audio.', true);
    console.error('Error accessing microphone:', err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    clearInterval(recordingTimer);
    
    // Reset UI
    document.getElementById('recordBtnText').textContent = 'Record Audio';
    document.getElementById('recordBtn').style.background = '';
    document.getElementById('recordBtn').style.borderColor = '';
  }
}

function playRecording() {
  if (recordedAudioBlob) {
    const audioUrl = URL.createObjectURL(recordedAudioBlob);
    const audio = new Audio(audioUrl);
    
    // Mobile browsers require user gesture and proper handling
    const playPromise = audio.play();
    
    if (playPromise !== undefined) {
      playPromise
        .then(() => {
          console.log('Audio playback started');
        })
        .catch(error => {
          console.error('Audio playback failed:', error);
          // Fallback: show message to user
          toast('Tap the audio controls below to play', false, true);
          
          // Create a visible audio element instead
          const existingAudio = document.querySelector('#tempAudioPlayer');
          if (existingAudio) existingAudio.remove();
          
          const audioElement = document.createElement('audio');
          audioElement.id = 'tempAudioPlayer';
          audioElement.controls = true;
          audioElement.style.cssText = 'width:100%;max-width:400px;margin-top:10px;';
          audioElement.src = audioUrl;
          
          const audioPreview = document.getElementById('audioPreview');
          if (audioPreview) {
            audioPreview.appendChild(audioElement);
          }
        });
    }
  }
}

function clearAudio() {
  recordedAudioBlob = null;
  audioChunks = [];
  document.getElementById('audioPreview').style.display = 'none';
  document.getElementById('playBtn').disabled = true;
  document.getElementById('audioStatus').textContent = '';
  
  // Remove temp audio player if it exists
  const tempAudio = document.querySelector('#tempAudioPlayer');
  if (tempAudio) tempAudio.remove();
  
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  }
}

async function submitEntry() {
  const ta = document.getElementById('et');
  const text = ta.value.trim();
  const imgInput = document.getElementById('imgUpload');

  if (!text || text.length < CFG.MIN_TEXT) {
    toast('Please write a bit more', true);
    return;
  }

  setBusy('subBtn', true, '<span class="spin"></span> Saving...');
  try {
    let imageData = null;
    let audioData = null;
    
    // Convert image to base64 if present
    if (imgInput.files && imgInput.files[0]) {
      const file = imgInput.files[0];
      imageData = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    // Convert audio to base64 if present
    if (recordedAudioBlob) {
      audioData = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(recordedAudioBlob);
      });
    }
    
    // Use device local time
    const now = new Date();
    const timestamp = {
      date: now.toLocaleDateString(),
      time: now.toLocaleTimeString(),
      iso: now.toISOString()
    };
    
    const res = await api('/api/entries', {
      method: 'POST',
      body: JSON.stringify({ 
        text, 
        name: STATE.user,
        accessCode: STATE.accessCode,
        image: imageData,
        audio: audioData,
        timestamp: timestamp
      })
    });

    await loadDB();
    ta.value = '';
    const cc = document.getElementById('cc');
    if (cc) cc.textContent = '0';
    clearImage();
    clearAudio();
    toast(res.message || 'Testimony recorded.', false, true);
    render();
  } catch (e) {
    toast(e.message || 'Save failed', true);
  } finally {
    setBusy('subBtn', false, 'Record My Testimony');
  }
}

async function sendBibleQuestion() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  
  if (!question) return;
  
  input.value = '';
  addChatMessage('user', question);
  
  const typingId = addChatMessage('assistant', '💭 Thinking...');
  
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) {
    sendBtn.disabled = true;
    sendBtn.textContent = '...';
  }
  
  try {
    const response = await fetch(`${CFG.API_BASE}/api/bible-chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        history: chatHistory
      })
    });
    
    if (!response.ok) throw new Error('AI service unavailable');
    
    const contentType = response.headers.get('content-type');
    
    // Check if response is streaming (SSE) or regular JSON
    if (contentType?.includes('text/event-stream')) {
      // Remove thinking indicator
      document.getElementById(typingId)?.remove();
      
      // Handle streaming response
      const msgId = addChatMessage('assistant', '');
      const messageDiv = document.getElementById(msgId)?.querySelector('[data-message-content]');
      let fullText = '';
      let hasError = false;

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') continue;

            try {
              const parsed = JSON.parse(data);
              
              if (parsed.error && parsed.fallback) {
                // AI failed, show fallback message
                hasError = true;
                break;
              }
              
              if (parsed.content) {
                fullText += parsed.content;
                if (messageDiv) {
                  messageDiv.textContent = fullText;
                  messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }
              }
            } catch (e) {
              // Skip parse errors
            }
          }
        }
        
        if (hasError) break;
      }
      
      if (hasError || !fullText) {
        // Fallback if stream failed
        document.getElementById(msgId)?.remove();
        addChatMessage('assistant', `❌ The AI service is currently unavailable. For "${question}", I encourage you to explore relevant Scripture passages. Try asking about: faith, love, prayer, salvation, Jesus Christ, forgiveness, the Holy Spirit, or spiritual growth.`);
      } else {
        // Add AI source tag
        if (messageDiv && messageDiv.parentElement) {
          const sourceTag = document.createElement('div');
          sourceTag.style.cssText = 'margin-top:8px;font-size:10px;color:var(--purple);font-family:Cinzel,serif;letter-spacing:1px;';
          sourceTag.textContent = '[AI]';
          messageDiv.parentElement.appendChild(sourceTag);
        }
        
        // Save to history
        chatHistory.push(
          { role: 'user', content: question },
          { role: 'assistant', content: fullText }
        );
        
        if (chatHistory.length > 10) {
          chatHistory = chatHistory.slice(-10);
        }
      }
      
    } else {
      // Handle regular JSON response (pattern matching, AI, or fallback)
      const data = await response.json();
      
      document.getElementById(typingId)?.remove();
      addChatMessage('assistant', data.answer);
      
      // Add source tag
      const messages = document.getElementById('chatMessages');
      const lastMsg = messages?.lastElementChild;
      if (lastMsg) {
        const sourceTag = document.createElement('div');
        sourceTag.style.cssText = 'margin-top:8px;font-size:10px;font-family:Cinzel,serif;letter-spacing:1px;';
        
        if (data.source === 'pattern') {
          sourceTag.style.color = 'var(--blue-light)';
          sourceTag.textContent = '[Knowledge Base]';
        } else if (data.source === 'ai') {
          sourceTag.style.color = 'var(--purple)';
          sourceTag.textContent = '[AI]';
        }
        
        if (data.source === 'pattern' || data.source === 'ai') {
          lastMsg.querySelector('[data-message-content]')?.parentElement.appendChild(sourceTag);
        }
      }
      
      chatHistory.push(
        { role: 'user', content: question },
        { role: 'assistant', content: data.answer }
      );
      
      if (chatHistory.length > 10) {
        chatHistory = chatHistory.slice(-10);
      }
    }
    
  } catch (error) {
    console.error('Chat error:', error);
    document.getElementById(typingId)?.remove();
    addChatMessage('assistant', '❌ Sorry, I encountered an error. Please try again.');
  } finally {
    if (sendBtn) {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    }
  }
}

  const msgId = `msg-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

  const msgDiv = document.createElement('div');
  msgDiv.id = msgId;
  msgDiv.style.cssText = `
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    ${isUser ? 'flex-direction: row-reverse;' : ''}
  `;
  
  msgDiv.innerHTML = `
    <div style="
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: ${isUser ? 'linear-gradient(135deg, var(--red), var(--blue))' : 'var(--navy-mid)'};

      justify-content: center;

      flex-shrink: 0;

function promptAdmin() {
  showDlg(`
    <div class="dialog no-print">
      <div class="dialog-title" style="color:var(--gold);">Admin Access</div>
      <div class="dialog-body">Enter the admin password to view usage statistics and all testimony records.</div>
      <div class="fg" style="margin-bottom:18px;">
        <label for="ap">Password</label>
        <input type="password" id="ap" placeholder="Admin password" autocomplete="off"/>
      </div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="checkAdmin()">Enter</button>
        <button class="btn btn-ghost" onclick="closeDlg()">Cancel</button>
      </div>
    </div>
  `);
  setTimeout(() => document.getElementById('ap')?.focus(), 100);

async function checkAdmin() {
  const pass = document.getElementById('ap')?.value.trim();
  if (!pass) return toast('Enter the admin password', true);

  try {
    await api('/admin/login', {
      method: 'POST',
      body: JSON.stringify({ password: pass })
    });
    closeDlg();
    await loadDB();
    const stats = await api('/admin/stats', { method: 'GET', headers: {} });
    STATE.adminStats = stats;
    STATE.view = 'admin';
    render();
    toast('Admin access granted.', false, true);
  } catch (e) {
    toast(e.message || 'Incorrect password', true);
  }
}

function renderAdmin(app) {
  const users = STATE.db.users || {};
  const ul = Object.entries(users);

  const total = ul.length;
  const totalE = ul.reduce((s,[,u]) => s + (u.entries || []).length, 0);
  const month = new Date().toISOString().slice(0,7);
  const thisM = ul.reduce((s,[,u]) => s + (u.entries || []).filter(e => e.iso?.startsWith(month)).length, 0);
  const avg = total ? (totalE / total).toFixed(1) : '0';

  // Calculate growth metrics
  const last30Days = ul.reduce((s,[,u]) => {
    const cutoff = Date.now() - (30 * 24 * 60 * 60 * 1000);
    return s + (u.entries || []).filter(e => new Date(e.iso).getTime() > cutoff).length;
  }, 0);

  const last7Days = ul.reduce((s,[,u]) => {
    const cutoff = Date.now() - (7 * 24 * 60 * 60 * 1000);
    return s + (u.entries || []).filter(e => new Date(e.iso).getTime() > cutoff).length;
  }, 0);

  // Most active user
  const topUser = ul.length > 0 ? ul.reduce((top, [name, u]) => {
    const cnt = (u.entries || []).length;
    return cnt > top.cnt ? {name, cnt} : top;
  }, {name: '—', cnt: 0}) : {name: '—', cnt: 0};

  // Activity by day of week
  const dayActivity = [0,0,0,0,0,0,0];
  ul.forEach(([,u]) => {
    (u.entries || []).forEach(e => {
      const day = new Date(e.iso).getDay();
      dayActivity[day]++;
    });
  });
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Monthly trend (last 6 months)
  const monthlyData = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const monthKey = d.toISOString().slice(0,7);
    const count = ul.reduce((s,[,u]) => s + (u.entries || []).filter(e => e.iso?.startsWith(monthKey)).length, 0);
    monthlyData.push({
      month: d.toLocaleDateString('en-US', {month:'short'}),
      count
    });
  }

  const maxMonthly = Math.max(...monthlyData.map(m => m.count), 1);

  const rows = ul.map(([name,u]) => {
    const entries = u.entries || [];
    
    // Calculate storage space
    let storageBytes = 0;
    entries.forEach(e => {
      // Text (2 bytes per character for UTF-8)
      storageBytes += (e.text || '').length * 2;
      
      // Old base64 images/audio (if they exist)
      if (e.image && e.image.startsWith('data:')) {
        storageBytes += e.image.length * 0.75; // base64 is ~1.33x, so divide by 1.33
      }
      if (e.audio && e.audio.startsWith('data:')) {
        storageBytes += e.audio.length * 0.75;
      }
      
      // New URLs (estimate file sizes: images ~500KB, audio ~2MB)
      if (e.imageUrl) storageBytes += 500 * 1024;
      if (e.audioUrl) storageBytes += 2 * 1024 * 1024;
    });
    
    // Calculate total time spent (time between first and last entry)
    let totalDays = 0;
    if (entries.length > 1) {
      const first = new Date(entries[0].iso).getTime();
      const last = new Date(entries[entries.length - 1].iso).getTime();
      totalDays = Math.floor((last - first) / (1000 * 60 * 60 * 24));
    }
    
    return {
      name,
      cnt: entries.length,
      created: u.created ? new Date(u.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—',
      last: entries.length ? new Date([...entries].reverse()[0].iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—',
      storage: storageBytes,
      storageMB: (storageBytes / 1024 / 1024).toFixed(2),
      days: totalDays
    };
  }).sort((a,b) => b.cnt - a.cnt);

  // Calculate total storage across all users
  const totalStorageMB = rows.reduce((sum, r) => sum + parseFloat(r.storageMB), 0).toFixed(2);

  app.innerHTML = `
    <div class="user-bar no-print">
      <div class="ub-left">
        <div class="avatar" style="background:linear-gradient(135deg,#6b1515,#a02020);font-size:20px;">⚙</div>
        <div>
          <div class="ub-name">Admin Dashboard</div>
          <div class="ub-meta">TWC Testimony Log - Analytics & Insights</div>
        </div>
      </div>
      <button class="btn btn-ghost no-print" onclick="exitAdmin()">← Exit</button>
    </div>

    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit, minmax(140px,1fr));gap:14px;margin-bottom:24px;">
      <div class="stat-card" style="border-left:3px solid var(--info);">
        <span class="stat-num" style="color:var(--info);">${total}</span>
        <span class="stat-lbl">Total Users</span>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--success);">
        <span class="stat-num" style="color:var(--success);">${totalE}</span>
        <span class="stat-lbl">All Testimonies</span>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--purple);">
        <span class="stat-num" style="color:var(--purple);">${totalStorageMB}</span>
        <span class="stat-lbl">Total Storage (MB)</span>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--gold);">
        <span class="stat-num" style="color:var(--gold);">${thisM}</span>
        <span class="stat-lbl">This Month</span>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--warning);">
        <span class="stat-num" style="color:var(--warning);">${last7Days}</span>
        <span class="stat-lbl">Last 7 Days</span>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--ok);">
        <span class="stat-num" style="color:var(--ok);">${avg}</span>
        <span class="stat-lbl">Avg Per User</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;margin-bottom:22px;">
      
      <!-- Monthly Trend Chart -->
      <div class="panel">
        <div class="panel-title">📈 Monthly Trend</div>
        <div style="padding:10px 0;">
          <div style="display:flex;align-items:flex-end;justify-content:space-around;height:160px;gap:8px;">
            ${monthlyData.map(m => {
              const height = maxMonthly > 0 ? (m.count / maxMonthly) * 100 : 0;
              return `
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
                  <div style="font-size:11px;color:var(--gold);font-family:'Cinzel',serif;font-weight:600;">${m.count}</div>
                  <div style="width:100%;background:linear-gradient(180deg, var(--gold), var(--gold-dim));height:${height}%;min-height:${m.count > 0 ? '4px' : '2px'};border-radius:3px 3px 0 0;transition:all .3s;"></div>
                  <div style="font-size:9px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:1px;">${m.month}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- Day of Week Activity -->
      <div class="panel">
        <div class="panel-title">📊 Activity by Day</div>
        <div style="padding:10px 0;">
          ${dayNames.map((day, i) => {
            const count = dayActivity[i];
            const maxDay = Math.max(...dayActivity, 1);
            const width = (count / maxDay) * 100;
            return `
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <div style="min-width:32px;font-size:10px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:1px;">${day}</div>
                <div style="flex:1;background:var(--navy-card);height:24px;border-radius:3px;position:relative;overflow:hidden;">
                  <div style="background:linear-gradient(90deg, var(--gold-dim), var(--gold));width:${width}%;height:100%;transition:all .3s;"></div>
                </div>
                <div style="min-width:28px;text-align:right;font-size:11px;color:var(--gold);font-family:'Cinzel',serif;font-weight:600;">${count}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- Engagement Metrics -->
    <div class="panel" style="margin-bottom:22px;">
      <div class="panel-title">💡 Engagement Insights</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:10px 0;">
        <div style="text-align:center;">
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:'Cinzel',serif;letter-spacing:1.5px;text-transform:uppercase;">Growth Rate</div>
          <div style="font-size:28px;color:var(--gold);font-family:'Cinzel',serif;font-weight:700;">${last30Days > 0 ? '+' + last30Days : '0'}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">entries in 30 days</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:'Cinzel',serif;letter-spacing:1.5px;text-transform:uppercase;">Active Users</div>
          <div style="font-size:28px;color:var(--gold);font-family:'Cinzel',serif;font-weight:700;">${ul.filter(([,u]) => (u.entries||[]).some(e => Date.now() - new Date(e.iso).getTime() < 30*24*60*60*1000)).length}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">posted in 30 days</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:'Cinzel',serif;letter-spacing:1.5px;text-transform:uppercase;">Avg Length</div>
          <div style="font-size:28px;color:var(--gold);font-family:'Cinzel',serif;font-weight:700;">${totalE > 0 ? Math.round(ul.reduce((s,[,u]) => s + (u.entries||[]).reduce((t,e) => t + e.text.length, 0), 0) / totalE) : 0}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">characters per entry</div>
        </div>
      </div>
    </div>

    <!-- Top Contributors -->
    <div class="panel" style="margin-bottom:22px;">
      <div class="panel-title">🏆 Top Contributors</div>
      ${rows.slice(0,5).length === 0 ? '<div class="empty-state"><span class="empty-icon">✦</span>No users yet.</div>' : `
        <div style="padding:10px 0;">
          ${rows.slice(0,5).map((r, idx) => {
            const maxCount = rows[0].cnt;
            const width = maxCount > 0 ? (r.cnt / maxCount) * 100 : 0;
            const medals = ['🥇','🥈','🥉'];
            return `
              <div style="margin-bottom:12px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span style="font-size:16px;">${medals[idx] || '✦'}</span>
                    <span style="color:var(--text);font-size:13px;font-weight:500;">${esc(r.name)}</span>
                  </div>
                  <span style="color:var(--gold);font-family:'Cinzel',serif;font-size:12px;font-weight:700;">${r.cnt} ${r.cnt === 1 ? 'entry' : 'entries'}</span>
                </div>
                <div style="background:var(--navy-card);height:8px;border-radius:4px;overflow:hidden;">
                  <div style="background:linear-gradient(90deg, var(--gold-dim), var(--gold));width:${width}%;height:100%;transition:all .4s;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>

    <!-- All Users Table -->
    <div class="panel">
      <div class="panel-title">✦ All Users</div>
      ${rows.length === 0 ? '<div class="empty-state"><span class="empty-icon">✦</span>No users yet.</div>' : `
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Entries</th><th>Storage</th><th>Time Span</th><th>Joined</th><th>Last Entry</th><th>Actions</th></tr></thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td style="color:var(--text);">${esc(r.name)}</td>
                  <td><span class="e-seq">${r.cnt}</span></td>
                  <td>
                    <div style="display:flex;align-items:center;gap:6px;">
                      <span style="color:${r.storage > 5*1024*1024 ? 'var(--warning)' : 'var(--blue-light)'};font-weight:600;font-size:13px;">${r.storageMB}</span>
                      <span style="color:var(--text-dim);font-size:11px;">MB</span>
                    </div>
                  </td>
                  <td>
                    <span style="color:var(--text-dim);font-size:13px;">
                      ${r.days > 0 ? `${r.days} day${r.days !== 1 ? 's' : ''}` : '—'}
                    </span>
                  </td>
                  <td style="color:var(--text-dim);font-size:13px;">${r.created}</td>

    <div class="panel" style="margin-top:22px;">

      </p>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="dlJson()">⤓ Download JSON</button>
        <button class="btn btn-ghost" onclick="copyJson()">📋 Copy JSON</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:24px;">
      <p style="font-size:12px;color:var(--text-dim);font-style:italic;">"And the Lord added to their number daily those who were being saved." - Acts 2:47</p>
    </div>
  `;
}

function exitAdmin() {
  STATE.view = 'auth';
  STATE.adminStats = null;
  render();
}

function adminView(name) {
  const ud = STATE.db.users?.[name] || { entries: [], created: null };
  const ents = ud.entries || [];
  const preview = ents.length
    ? [...ents].reverse().slice(0,3).map(e => `
        <div style="margin-top:12px;padding:14px 16px;background:var(--navy-card);border-radius:4px;border:1px solid var(--border);">
          <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--blue-light);margin-bottom:7px;">Entry #${e.seq} · ${esc(e.date)} ${esc(e.time)}</div>
          <div style="font-size:14px;color:var(--text);line-height:1.75;white-space:pre-wrap;">${esc(e.text.slice(0,300))}${e.text.length > 300 ? '...' : ''}</div>
        </div>
      `).join('')
    : '<p style="color:var(--text-dim);font-style:italic;margin-top:12px;">No entries.</p>';

  showDlg(`
    <div class="dialog" style="max-width:560px;">
      <div class="dialog-title" style="color:var(--blue-light);">✦ ${esc(name)}</div>
      <div class="dialog-body">
        <strong style="color:var(--text);">${ents.length}</strong> testimon${ents.length === 1 ? 'y' : 'ies'} recorded.
        Joined: ${ud.created ? new Date(ud.created).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : 'Unknown'}.
      </div>
      <div style="max-height:340px;overflow-y:auto;">${preview}</div>
      <div style="margin-top:18px;">
        <button class="btn btn-ghost btn-full" onclick="closeDlg()">Close</button>
      </div>
    </div>
  `);
}

function confirmDeleteUser(userName, entryCount, storageMB) {
  showDlg(`
    <div class="dialog" style="max-width:480px;">
      <div class="dialog-title" style="color:var(--red);">⚠️ Delete User</div>
      <div class="dialog-body">
        <p style="margin-bottom:14px;line-height:1.7;">
          You are about to permanently delete <strong style="color:var(--text);">${esc(userName)}</strong> and all their data:
        </p>
        <ul style="margin:0 0 16px 20px;color:var(--text-dim);line-height:2;">
          <li><strong style="color:var(--text);">${entryCount}</strong> testimon${entryCount === 1 ? 'y' : 'ies'}</li>
          <li><strong style="color:var(--text);">${storageMB} MB</strong> of storage</li>
          <li>All associated images</li>
          <li>All associated audio files</li>
        </ul>
        <p style="color:var(--red-light);font-size:12px;font-style:italic;margin-bottom:16px;">
          This action cannot be undone. Media files will be deleted from GitHub.
        </p>
        <div class="fg">
          <label for="deletePassword">Admin Password (required)</label>
          <input 
            type="password" 
            id="deletePassword" 
            placeholder="Enter admin password to confirm" 
            autocomplete="off"
            onkeypress="if(event.key==='Enter') deleteUser('${escJS(userName)}')"
          />
        </div>
      </div>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn btn-ghost" onclick="closeDlg()" style="flex:1;">Cancel</button>
        <button class="btn btn-danger" onclick="deleteUser('${escJS(userName)}')" style="flex:1;">Delete User</button>
      </div>
    </div>
  `);
  
  // Focus the password field
  setTimeout(() => document.getElementById('deletePassword')?.focus(), 100);
}

async function deleteUser(userName) {
  // Get password from the dialog input field
  const pwdInput = document.getElementById('deletePassword');
  const pwd = pwdInput?.value?.trim();
  
  if (!pwd) {
    toast('Admin password is required', true);
    pwdInput?.focus();
    return;
  }
  
  closeDlg();
  setBusy('app', true, 'Deleting user and media files...');
  
  try {
    const res = await api('/admin/delete-user', {
      method: 'POST',
      body: JSON.stringify({
        userName,
        adminPassword: pwd
      })
    });
    
    await loadDB();
    toast(res.message || 'User deleted successfully', false, true);
    render();
  } catch (e) {
    toast(e.message || 'Delete failed', true);
  } finally {
    setBusy('app', false);
  }
}

function dlJson() {
  const blob = new Blob([JSON.stringify(STATE.db, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TWC_Testimonies_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('JSON downloaded!', false, true);
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(STATE.db, null, 2))
    .then(() => toast('Copied to clipboard!', false, true))
    .catch(() => toast('Copy failed - try Download', true));
}

window.addEventListener('online', () => {
  toast('Connection restored', false, true);
  if (STATE.user) loadDB().then(render);
});
window.addEventListener('offline', () => {
  toast('Offline mode', true);
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDlg();
});

async function boot() {
  try {
    // Show a basic loading state
    render();
    
    try {
      await loadDB();
    } catch (dbError) {
      console.error('Failed to load DB:', dbError);
      // Continue anyway - app can work with cached data
    }
    
    try {
      await restoreSession();
    } catch (sessionError) {
      console.error('Failed to restore session:', sessionError);
      // Continue anyway - user can sign in manually
    }
    
    render();
  } catch (error) {
    console.error('Boot failed:', error);
    // Show error to user
    const app = document.getElementById('app');
    if (app) {
      app.innerHTML = `
        <div class="panel" style="margin-top:40px;">
          <div style="color:var(--danger);text-align:center;padding:20px;">
            <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
            <div style="font-size:16px;margin-bottom:8px;">App Failed to Load</div>
            <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px;">${error.message || 'Unknown error'}</div>
            <button class="btn btn-gold" onclick="location.reload()">Reload Page</button>
          </div>
        </div>
      `;
    }
  }
}

// Add global error handler for mobile debugging
window.addEventListener('error', function(e) {
  console.error('Global error:', e.error, e.message);
});

window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled promise rejection:', e.reason);
});

boot();
</script>
</body>
</html>
