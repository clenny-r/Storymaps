<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Testimony Log | TWC Ministries</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   TWC BRAND PALETTE
   Navy dark:  #0A1628
   Navy mid:   #122040
   Navy panel: #16283A
   Gold main:  #C8972B
   Gold light: #E6B84A
   Gold dim:   #7a5c1a
   White:      #FFFFFF
   Text dim:   #8A9BB5
   ═══════════════════════════════════════════════════ */
:root {
  --navy:        #0A1628;
  --navy-mid:    #122040;
  --navy-panel:  #16283A;
  --navy-card:   #0E1E30;
  --navy-hover:  #1B2F56;
  --gold:        #C8972B;
  --gold-light:  #E6B84A;
  --gold-dim:    #7a5c1a;
  --gold-glow:   rgba(200,151,43,0.15);
  --white:       #FFFFFF;
  --text:        #E2E8F4;
  --text-dim:    #8A9BB5;
  --border:      #1E3050;
  --danger:      #C0392B;
  --danger-bg:   rgba(192,57,43,0.12);
  --radius:      4px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 90% 50% at 50% -10%, rgba(200,151,43,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(18,32,64,0.9) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

.wrapper {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 80px;
  position: relative; z-index: 1;
}

/* ─── HEADER ─── */
.site-header {
  padding: 30px 0 26px;
  text-align: center;
}

.header-logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 14px;
}

.header-logo {
  width: 58px; height: 58px;
  object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(200,151,43,0.45));
}

.header-brand-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 4.5vw, 30px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: 2px;
  line-height: 1.1;
  text-align: left;
}

.header-brand-sub {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 3.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-top: 4px;
  text-align: left;
}

.gold-bar {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 18px 0 14px;
}

.page-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(14px, 2.5vw, 18px);
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.header-verse {
  font-style: italic;
  color: var(--text-dim);
  font-size: 13px;
}

/* ─── PANELS ─── */
.panel {
  background: var(--navy-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px 34px;
  margin-bottom: 22px;
  position: relative;
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 2px;
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─── FORMS ─── */
.fg { margin-bottom: 18px; }

label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

input[type="text"], input[type="password"], textarea {
  width: 100%;
  background: var(--navy-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Lora', serif;
  font-size: 15px;
  padding: 12px 16px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 3px var(--gold-glow);
}
input::placeholder, textarea::placeholder { color: #253650; font-style: italic; }

textarea { min-height: 140px; resize: vertical; line-height: 1.8; }
textarea:disabled { opacity: .5; cursor: not-allowed; }

.char-cnt {
  text-align: right;
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  margin-top: 5px;
}

/* ─── BUTTONS ─── */
.btn {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 12px 24px;
  border: none;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  line-height: 1;
  white-space: nowrap;
}
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

.btn-gold { background: var(--gold); color: var(--navy); font-weight: 700; }
.btn-gold:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 5px 20px rgba(200,151,43,.3); }

.btn-outline { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); }
.btn-outline:hover:not(:disabled) { background: var(--gold-glow); border-color: var(--gold); }

.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-ghost:hover:not(:disabled) { border-color: var(--text-dim); color: var(--text); }

.btn-danger { background: transparent; border: 1px solid rgba(192,57,43,.4); color: #e07060; }
.btn-danger:hover:not(:disabled) { background: var(--danger-bg); border-color: var(--danger); }

.btn-full { width: 100%; justify-content: center; }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

/* ─── USER BAR ─── */
.user-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  padding: 14px 20px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  gap: 14px;
  flex-wrap: wrap;
}
.ub-left { display: flex; align-items: center; gap: 14px; }
.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 17px; color: var(--navy); font-weight: 700; flex-shrink: 0;
}
.ub-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--white); letter-spacing: 1px; }
.ub-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* ─── ENTRY CARDS ─── */
.entries-wrap { display: flex; flex-direction: column; gap: 14px; }

.entry-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  animation: up .3s ease both;
  transition: border-color .2s;
}
.entry-card:hover { border-color: #253a5a; }

@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

.e-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.e-meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

.e-seq {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 2px;
  color: var(--gold);
  background: rgba(200,151,43,.1);
  border: 1px solid var(--gold-dim);
  padding: 3px 10px; border-radius: 20px;
}
.e-date { font-size: 12px; color: var(--text-dim); font-style: italic; }
.e-divider { height: 1px; background: var(--border); margin: 12px 0; }
.e-body { font-size: 15px; line-height: 1.85; color: var(--text); white-space: pre-wrap; word-break: break-word; }

.empty-state {
  text-align: center;
  padding: 44px 20px;
  color: var(--text-dim);
}
.empty-icon { font-size: 28px; display: block; margin-bottom: 14px; opacity: .25; }

/* ─── NOTICE BOX ─── */
.notice {
  background: rgba(200,151,43,.07);
  border: 1px solid var(--gold-dim);
  border-radius: var(--radius);
  padding: 14px 18px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 18px;
}
.notice code {
  background: var(--navy-card);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 12px;
  color: var(--gold);
  font-family: 'Courier New', monospace;
}
.notice strong { color: var(--gold-light); }

/* ─── OVERLAY / DIALOG ─── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,22,40,.88);
  z-index: 900;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  animation: fi .15s ease;
}
@keyframes fi { from { opacity:0; } to { opacity:1; } }

.dialog {
  background: var(--navy-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 36px;
  max-width: 440px; width: 100%;
  animation: di .2s ease;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes di { from { opacity:0; transform: scale(.95) translateY(-10px); } to { opacity:1; transform:none; } }

.dialog-title {
  font-family: 'Cinzel', serif;
  font-size: 13px; letter-spacing: 2px;
  margin-bottom: 12px;
}
.dialog-body { color: var(--text-dim); font-size: 14px; line-height: 1.7; margin-bottom: 22px; }

/* ─── ADMIN STATS ─── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 12px; margin-bottom: 22px; }
.stat-card { background: var(--navy-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; text-align: center; }
.stat-num { font-family: 'Cinzel', serif; font-size: 30px; color: var(--gold); display: block; line-height: 1; margin-bottom: 6px; }
.stat-lbl { font-size: 10px; color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: 1.5px; text-transform: uppercase; }

.admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.admin-table th { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); text-align:left; padding:10px 14px; border-bottom:1px solid var(--border); }
.admin-table td { padding:12px 14px; border-bottom:1px solid rgba(30,48,80,.5); vertical-align: middle; }
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: rgba(27,47,86,.3); }

/* ─── SPINNER ─── */
.spin { display:inline-block; width:16px; height:16px; border:2px solid rgba(200,151,43,.3); border-top-color:var(--gold); border-radius:50%; animation:s .7s linear infinite; vertical-align:middle; }
@keyframes s { to { transform: rotate(360deg); } }

.loading-state { text-align:center; padding:50px 20px; color:var(--text-dim); font-style:italic; font-size:14px; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--gold); color: var(--navy);
  font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
  padding: 12px 28px; border-radius: var(--radius);
  opacity: 0; transition: all .3s ease;
  z-index: 999; pointer-events: none;
  box-shadow: 0 6px 30px rgba(200,151,43,.35);
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
.toast.err  { background: var(--danger); color: #fff; box-shadow: none; }

/* ─── RESPONSIVE ─── */
@media (max-width: 580px) {
  .panel { padding: 22px 16px; }
  .user-bar { flex-direction: column; align-items: flex-start; }
  .btn-row .btn { flex: 1; min-width: 0; justify-content: center; }
}

/* ─── PRINT ─── */
@media print {
  body { background: white; color: #111; }
  .no-print { display: none !important; }
  body::before { display: none; }
  .panel { background: white; border: 1px solid #ccc; break-inside: avoid; }
  .panel::before { display: none; }
  .entry-card { background: white; border: 1px solid #ccc; break-inside: avoid; }
  .e-body { color: #222; }
  .e-date { color: #666; }
  .user-bar { background: #f5f5f5; border: 1px solid #ccc; }
}
</style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-logo-row">
      <img class="header-logo"
           src="https://www.twcministries.net/Pages/church_photos/Image1-transparent.gif"
           alt="TWC Logo"
           onerror="this.style.display='none'"/>
      <div>
        <div class="header-brand-title">TWC Ministries</div>
        <div class="header-brand-sub">Transformational Worship Centre</div>
      </div>
    </div>
    <div class="gold-bar"></div>
    <div class="page-title">Testimony Log</div>
    <div class="header-verse">
      "They triumphed over him by the blood of the Lamb and by the word of their testimony." — Rev 12:11
    </div>
  </header>

  <!-- APP MOUNT -->
  <div id="app">
    <div class="loading-state"><div class="spin"></div><div style="margin-top:16px;">Loading testimony records…</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" style="display:none;"></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIGURATION  ← Edit before deploying
   ═══════════════════════════════════════════════════════ */
const CFG = {
  GITHUB_USER: 'clenmar',
  GITHUB_REPO: 'twcministries',  // your GitHub Pages repo name
  JSON_PATH:   'data/testimonies.json',
  BRANCH:      'main',
  ADMIN_PASS:  'TWCAdmin2025!',  // Change this
};

/* ═══════════════════════════════════════════════════════
   GITHUB API
   ═══════════════════════════════════════════════════════ */
function rawURL() {
  return `https://raw.githubusercontent.com/${CFG.GITHUB_USER}/${CFG.GITHUB_REPO}/${CFG.BRANCH}/${CFG.JSON_PATH}?t=${Date.now()}`;
}
function apiURL() {
  return `https://api.github.com/repos/${CFG.GITHUB_USER}/${CFG.GITHUB_REPO}/contents/${CFG.JSON_PATH}`;
}

let ghToken = '';

async function ghRead() {
  const r = await fetch(rawURL());
  if (r.status === 404) return { users: {} };
  if (!r.ok) throw new Error('Cannot load data (' + r.status + ')');
  return r.json();
}

async function ghWrite(data, msg) {
  if (!ghToken) throw new Error('No GitHub token — read-only mode.');
  // Get current SHA
  const shaR = await fetch(apiURL(), {
    headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github.v3+json' }
  });
  let sha = null;
  if (shaR.ok) sha = (await shaR.json()).sha;
  else if (shaR.status !== 404) throw new Error('GitHub SHA fetch failed.');

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: msg || 'Update testimonies', content, branch: CFG.BRANCH };
  if (sha) body.sha = sha;

  const r = await fetch(apiURL(), {
    method: 'PUT',
    headers: {
      Authorization: `token ${ghToken}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || 'GitHub write error ' + r.status);
  }
}

/* ═══════════════════════════════════════════════════════
   LOCAL CACHE (speeds up loads)
   ═══════════════════════════════════════════════════════ */
const CK = 'twc_v3_cache';
function cSave(d) { try { localStorage.setItem(CK, JSON.stringify({ d, t: Date.now() })); } catch{} }
function cLoad() { try { const r = JSON.parse(localStorage.getItem(CK)||'null'); return r?.d||null; } catch { return null; } }

/* ═══════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════ */
let S = { db: null, user: null, view: 'auth' };

/* ═══════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════ */
let _tt;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3400);
}

/* ═══════════════════════════════════════════════════════
   OVERLAY / DIALOG
   ═══════════════════════════════════════════════════════ */
function showDlg(html) {
  const ol = document.getElementById('overlay');
  ol.innerHTML = html;
  ol.style.display = 'flex';
}
function closeDlg() { document.getElementById('overlay').style.display = 'none'; }

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
async function init() {
  render(); // Show auth screen immediately
  try {
    S.db = await ghRead();
    cSave(S.db);
  } catch(e) {
    S.db = cLoad() || { users: {} };
    if (cLoad()) toast('Using cached data', true);
  }
  // Restore session
  const sess = sessionStorage.getItem('twc_sess');
  if (sess && S.db.users?.[sess]) { S.user = sess; S.view = 'dashboard'; }
  render();
}

/* ═══════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  if (S.view === 'auth')      renderAuth(app);
  else if (S.view === 'dash') renderDash(app);
  else if (S.view === 'admin')renderAdmin(app);
}

/* ─── AUTH ─── */
function renderAuth(app) {
  app.innerHTML = `
    <div class="panel">
      <div class="panel-title">✦ Welcome — Sign In</div>
      <p style="color:var(--text-dim);font-size:14px;margin-bottom:22px;line-height:1.8;font-style:italic;">
        Enter your name to access your personal testimony record. Your entries are saved to the TWC Ministries website and accessible from any device.
      </p>

      <div class="fg">
        <label for="ni">Your Name</label>
        <input type="text" id="ni" placeholder="e.g. Sister Mary Johnson" maxlength="80" autocomplete="name"/>
      </div>

      <div class="notice">
        <strong>GitHub Token Required for Saving</strong><br/>
        To save and sync your entries across devices, enter a GitHub Personal Access Token
        with <code>contents:write</code> scope for the <code>${CFG.GITHUB_REPO}</code> repository.
        Without it you can view existing entries but cannot add new ones.
        <div class="fg" style="margin-top:12px;margin-bottom:0;">
          <label for="ti">GitHub Token <span style="letter-spacing:0;text-transform:none;font-family:'Lora',serif;font-style:italic;">(for saving)</span></label>
          <input type="password" id="ti" placeholder="ghp_…" autocomplete="off"/>
        </div>
      </div>

      <button class="btn btn-gold btn-full" onclick="doSignIn()">Enter the Sanctuary</button>
      <div style="text-align:center;margin-top:14px;">
        <button class="btn btn-ghost" style="font-size:9px;" onclick="promptAdmin()">Admin Access</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:14px;">
      <p style="font-size:13px;color:var(--text-dim);font-style:italic;">"Come to me, all you who are weary and burdened, and I will give you rest." — Matthew 11:28</p>
    </div>
  `;
  const ni = document.getElementById('ni');
  ni.focus();
  ni.addEventListener('keydown', e => { if (e.key==='Enter') doSignIn(); });
}

async function doSignIn() {
  const name = document.getElementById('ni').value.trim();
  if (!name) { toast('Please enter your name', true); return; }
  const tok = document.getElementById('ti')?.value.trim();
  if (tok) ghToken = tok;

  // Refresh data
  try { S.db = await ghRead(); cSave(S.db); } catch(e) { S.db = cLoad() || { users:{} }; }

  const isNew = !S.db.users[name];
  if (isNew) S.db.users[name] = { entries: [], created: new Date().toISOString() };

  S.user = name;
  S.view = 'dash';
  sessionStorage.setItem('twc_sess', name);
  toast(isNew ? 'Record created — welcome!' : `Welcome back, ${name.split(' ')[0]}!`);
  render();
}

/* ─── DASHBOARD ─── */
function renderDash(app) {
  const ud    = S.db.users[S.user] || { entries:[] };
  const ents  = ud.entries || [];
  const cnt   = ents.length;
  const init  = (S.user||'?')[0].toUpperCase();
  const ro    = !ghToken; // read-only

  app.innerHTML = `
    <!-- USER BAR -->
    <div class="user-bar no-print">
      <div class="ub-left">
        <div class="avatar">${esc(init)}</div>
        <div>
          <div class="ub-name">${esc(S.user)}</div>
          <div class="ub-meta" id="ubMeta">${cnt} testimon${cnt===1?'y':'ies'} recorded</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline no-print" onclick="doPrint()">🖨 Print</button>
        <button class="btn btn-outline no-print" onclick="doDownload()">⤓ Download</button>
        <button class="btn btn-ghost no-print" onclick="doSignOut()">Sign Out</button>
      </div>
    </div>

    <!-- NEW ENTRY -->
    <div class="panel no-print">
      <div class="panel-title">✦ Record a New Testimony</div>
      ${ro ? `<div class="notice"><strong>Read-Only Mode</strong> — No GitHub token was provided. You can view your entries but cannot add new ones. Sign out and re-enter with your token to enable saving.</div>` : ''}
      <div class="fg">
        <label for="et">Your Testimony</label>
        <textarea id="et" maxlength="5000" ${ro?'disabled':''} placeholder="Share what the Lord has done — a healing, a breakthrough, an answered prayer…" oninput="updateCnt(this)"></textarea>
        <div class="char-cnt"><span id="cc">0</span> / 5000</div>
      </div>
      <button class="btn btn-gold btn-full" id="subBtn" onclick="submitEntry()" ${ro?'disabled':''}>Record My Testimony</button>
    </div>

    <!-- HISTORY -->
    <div class="panel" id="histPanel">
      <div class="panel-title">
        ✦ Testimony History
        <span style="font-family:'Lora',serif;font-style:italic;color:var(--text-dim);font-size:12px;letter-spacing:0;text-transform:none;" id="histCnt">${cnt} entr${cnt===1?'y':'ies'}</span>
      </div>
      <div id="histBody">${renderEntries(ents)}</div>
    </div>

    <div style="text-align:center;margin-top:8px;">
      <p style="font-size:13px;color:var(--text-dim);font-style:italic;">"Give thanks to the Lord, for He is good; His love endures forever." — Psalm 107:1</p>
    </div>
  `;
}

function renderEntries(entries) {
  if (!entries.length) {
    return `<div class="empty-state"><span class="empty-icon">✦</span>No testimonies recorded yet. Share what God has done!</div>`;
  }
  return `<div class="entries-wrap">${[...entries].reverse().map(e=>`
    <div class="entry-card" id="ec-${e.id}">
      <div class="e-head">
        <div class="e-meta">
          <span class="e-seq">Entry #${e.seq}</span>
          <span class="e-date">${e.date} · ${e.time}</span>
        </div>
        <button class="btn btn-danger no-print" style="padding:5px 12px;font-size:9px;"
                onclick="confirmDel('${e.id}')">✕ Delete</button>
      </div>
      <div class="e-divider"></div>
      <div class="e-body">${esc(e.text)}</div>
    </div>
  `).join('')}</div>`;
}

function updateCnt(ta) { document.getElementById('cc').textContent = ta.value.length; }

function refreshHist() {
  const ud   = S.db.users[S.user] || { entries:[] };
  const ents = ud.entries || [];
  document.getElementById('histBody').innerHTML = renderEntries(ents);
  document.getElementById('ubMeta').textContent = ents.length + ' testimon' + (ents.length===1?'y':'ies') + ' recorded';
  document.getElementById('histCnt').textContent = ents.length + ' entr' + (ents.length===1?'y':'ies');
}

async function submitEntry() {
  const ta = document.getElementById('et');
  const text = ta.value.trim();
  if (!text || text.length < 10) { toast('Please write a bit more', true); return; }

  setBusy('subBtn', true, '<span class="spin"></span> Saving…');
  try {
    S.db = await ghRead();
    const ud = S.db.users[S.user] || { entries:[], created: new Date().toISOString() };
    S.db.users[S.user] = ud;
    const now = new Date();
    ud.entries.push({
      id:   'e' + Date.now(),
      seq:  ud.entries.length + 1,
      date: now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
      time: now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
      iso:  now.toISOString(),
      text,
    });
    ud.lastActive = now.toISOString();
    await ghWrite(S.db, `Testimony: ${S.user}`);
    cSave(S.db);
    ta.value = ''; document.getElementById('cc').textContent = '0';
    toast('Glory to God! Testimony recorded.');
    refreshHist();
  } catch(e) { toast(e.message, true); }
  setBusy('subBtn', false, 'Record My Testimony');
}

/* ─── DELETE ─── */
function confirmDel(id) {
  if (!ghToken) { toast('Read-only mode — cannot delete', true); return; }
  showDlg(`
    <div class="dialog no-print">
      <div class="dialog-title" style="color:#e07060;">⚠ Delete This Entry?</div>
      <div class="dialog-body">This testimony will be permanently removed from your record. This cannot be undone.</div>
      <div class="btn-row">
        <button class="btn btn-danger" onclick="doDel('${id}')">Yes, Delete</button>
        <button class="btn btn-ghost" onclick="closeDlg()">Cancel</button>
      </div>
    </div>
  `);
}

async function doDel(id) {
  closeDlg();
  try {
    S.db = await ghRead();
    const ud = S.db.users[S.user];
    if (!ud) throw new Error('User not found');
    ud.entries = ud.entries.filter(e => e.id !== id);
    ud.entries.forEach((e,i) => e.seq = i+1);
    await ghWrite(S.db, `Delete entry for ${S.user}`);
    cSave(S.db);
    toast('Entry deleted.');
    refreshHist();
  } catch(e) { toast(e.message, true); }
}

/* ─── PRINT / DOWNLOAD ─── */
function doPrint() { window.print(); }

function doDownload() {
  const ud   = S.db.users[S.user] || { entries:[] };
  const ents = ud.entries || [];
  if (!ents.length) { toast('No entries to download yet', true); return; }
  const lines = [
    'TWC MINISTRIES — TESTIMONY LOG',
    'Transformational Worship Centre | twcministries.net',
    '',
    'Name: ' + S.user,
    'Downloaded: ' + new Date().toLocaleString(),
    'Total Entries: ' + ents.length,
    '',
    '"They triumphed over him by the blood of the Lamb',
    ' and by the word of their testimony." — Revelation 12:11',
    '',
    '═'.repeat(64),
  ];
  [...ents].reverse().forEach(e => {
    lines.push('', `ENTRY #${e.seq}`, `Date: ${e.date}`, `Time: ${e.time}`, '', e.text, '', '─'.repeat(64));
  });
  lines.push('', 'To God be the glory, great things He hath done!');
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TWC_Testimony_${S.user.replace(/[^a-z0-9]/gi,'_')}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Downloaded!');
}

function doSignOut() {
  S.user = null; S.view = 'auth';
  sessionStorage.removeItem('twc_sess');
  render();
}

/* ─── ADMIN ─── */
function promptAdmin() {
  showDlg(`
    <div class="dialog no-print">
      <div class="dialog-title" style="color:var(--gold);">Admin Access</div>
      <div class="dialog-body">Enter the admin password to view usage statistics and all testimony records.</div>
      <div class="fg" style="margin-bottom:18px;">
        <label for="ap">Password</label>
        <input type="password" id="ap" placeholder="Admin password"/>
      </div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="checkAdmin()">Enter</button>
        <button class="btn btn-ghost" onclick="closeDlg()">Cancel</button>
      </div>
    </div>
  `);
  setTimeout(()=>{ document.getElementById('ap')?.focus(); },100);
  document.getElementById('ap')?.addEventListener('keydown', e=>{ if(e.key==='Enter') checkAdmin(); });
}

async function checkAdmin() {
  const pass = document.getElementById('ap')?.value.trim();
  if (pass !== CFG.ADMIN_PASS) { toast('Incorrect password', true); return; }
  closeDlg();
  try { S.db = await ghRead(); cSave(S.db); } catch(e) { S.db = cLoad() || { users:{} }; }
  S.view = 'admin'; render();
}

function renderAdmin(app) {
  const users = S.db.users || {};
  const ul    = Object.entries(users);
  const total = ul.length;
  const totalE = ul.reduce((s,[,u])=>s+(u.entries||[]).length, 0);
  const month  = new Date().toISOString().slice(0,7);
  const thisM  = ul.reduce((s,[,u])=>s+(u.entries||[]).filter(e=>e.iso?.startsWith(month)).length, 0);
  const avg    = total ? (totalE/total).toFixed(1) : '0';

  const rows = ul
    .map(([name,u])=>({
      name,
      cnt: (u.entries||[]).length,
      created: u.created ? new Date(u.created).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—',
      last: (u.entries||[]).length ? new Date([...u.entries].reverse()[0].iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—',
    }))
    .sort((a,b)=>b.cnt-a.cnt);

  app.innerHTML = `
    <div class="user-bar no-print">
      <div class="ub-left">
        <div class="avatar" style="background:linear-gradient(135deg,#6b1515,#a02020);font-size:20px;">⚙</div>
        <div>
          <div class="ub-name">Admin Dashboard</div>
          <div class="ub-meta">TWC Testimony Log — Usage Overview</div>
        </div>
      </div>
      <button class="btn btn-ghost no-print" onclick="exitAdmin()">← Exit</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><span class="stat-num">${total}</span><span class="stat-lbl">Users</span></div>
      <div class="stat-card"><span class="stat-num">${totalE}</span><span class="stat-lbl">Entries</span></div>
      <div class="stat-card"><span class="stat-num">${thisM}</span><span class="stat-lbl">This Month</span></div>
      <div class="stat-card"><span class="stat-num">${avg}</span><span class="stat-lbl">Avg / User</span></div>
    </div>

    <div class="panel">
      <div class="panel-title">✦ All Users</div>
      ${rows.length===0 ? '<div class="empty-state"><span class="empty-icon">✦</span>No users yet.</div>' : `
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Entries</th><th>Joined</th><th>Last Entry</th><th></th></tr></thead>
            <tbody>
              ${rows.map(r=>`
                <tr>
                  <td style="color:var(--text);">${esc(r.name)}</td>
                  <td><span class="e-seq">${r.cnt}</span></td>
                  <td style="color:var(--text-dim);font-size:13px;">${r.created}</td>
                  <td style="color:var(--text-dim);font-size:13px;">${r.last}</td>
                  <td><button class="btn btn-ghost" style="padding:6px 12px;font-size:9px;" onclick="adminView('${esc(r.name)}')">View</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `}
    </div>

    <div class="panel">
      <div class="panel-title">✦ JSON Backup</div>
      <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;line-height:1.7;">
        Download or copy the complete database for backup and migration purposes.
      </p>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="dlJson()">⤓ Download JSON</button>
        <button class="btn btn-ghost" onclick="copyJson()">Copy JSON</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:8px;">
      <p style="font-size:12px;color:var(--text-dim);font-style:italic;">"And the Lord added to their number daily those who were being saved." — Acts 2:47</p>
    </div>
  `;
}

function exitAdmin() { S.view = 'auth'; render(); }

function adminView(name) {
  const ud   = S.db.users[name] || { entries:[] };
  const ents = ud.entries || [];
  const preview = ents.length
    ? [...ents].reverse().slice(0,3).map(e=>`
        <div style="margin-top:12px;padding:14px 16px;background:var(--navy-card);border-radius:4px;border:1px solid var(--border);">
          <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold);margin-bottom:7px;">Entry #${e.seq} · ${e.date}</div>
          <div style="font-size:14px;color:var(--text);line-height:1.75;white-space:pre-wrap;">${esc(e.text.slice(0,300))}${e.text.length>300?'…':''}</div>
        </div>`).join('')
    : '<p style="color:var(--text-dim);font-style:italic;margin-top:12px;">No entries.</p>';

  showDlg(`
    <div class="dialog" style="max-width:520px;">
      <div class="dialog-title" style="color:var(--gold);">✦ ${esc(name)}</div>
      <div class="dialog-body">
        <strong style="color:var(--text);">${ents.length}</strong> testimon${ents.length===1?'y':'ies'} recorded.
        Joined: ${ud.created ? new Date(ud.created).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : 'Unknown'}.
      </div>
      <div style="max-height:340px;overflow-y:auto;">${preview}</div>
      <div style="margin-top:18px;">
        <button class="btn btn-ghost btn-full" onclick="closeDlg()">Close</button>
      </div>
    </div>
  `);
}

function dlJson() {
  const blob = new Blob([JSON.stringify(S.db, null,2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TWC_Testimonies_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('JSON downloaded!');
}

function copyJson() {
  navigator.clipboard.writeText(JSON.stringify(S.db, null,2))
    .then(()=>toast('Copied to clipboard!'))
    .catch(()=>toast('Copy failed — try Download', true));
}

/* ─── HELPERS ─── */
function setBusy(id, busy, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = busy;
  btn.innerHTML = label;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── BOOT ─── */
init();
</script>
</body>
</html>
