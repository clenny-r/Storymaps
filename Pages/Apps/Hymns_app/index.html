<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TWC Hymns — Worship Display</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-card:#0f1e38;--navy-light:#162440;
  --gold:#c9a84c;--gold-light:#e0c068;
  --purple:#1e0a45;--purple-light:#2d1560;
  --text:#e8e8e8;--text-dim:#8a99b8;--border:rgba(100,130,180,.18);
  --danger:#c0392b;--blue-light:#6ea8d8;
}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:'Lora',serif}

/* ── SEARCH VIEW ────────────────────────────────── */
.search-wrap{max-width:720px;margin:0 auto;padding:24px 16px 80px}
.header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.logo{height:44px;width:auto}
.header-text h1{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);line-height:1}
.header-text p{font-size:12px;color:var(--text-dim);margin-top:3px}
.search-box{position:relative;margin-bottom:20px}
.search-box input{
  width:100%;padding:14px 16px 14px 46px;
  background:var(--navy-card);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:16px;font-family:'Lora',serif;outline:none;
  transition:border-color .2s
}
.search-box input:focus{border-color:var(--gold)}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:18px}
.result-count{font-size:13px;color:var(--text-dim);margin-bottom:12px}
.hymn-card{
  background:var(--navy-card);border:1px solid var(--border);border-radius:6px;
  padding:16px 18px;margin-bottom:10px;
  transition:border-color .2s,background .2s;
  display:flex;align-items:center;justify-content:space-between;gap:12px
}
.hymn-card:hover{border-color:var(--gold);background:var(--navy-light)}
.hymn-card h3{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:4px}
.hymn-card .meta{font-size:12px;color:var(--text-dim)}
.hymn-card .snippet{font-size:13px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.5}
.card-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.card-play{color:var(--gold);font-size:20px;cursor:pointer;padding:4px}
.card-edit{
  font-size:14px;cursor:pointer;padding:4px 8px;border-radius:4px;
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);
  color:var(--gold);transition:background .15s;display:none
}
.card-edit:hover{background:rgba(201,168,76,.25)}
.card-edit.visible{display:inline-block}
.empty{text-align:center;padding:48px 20px;color:var(--text-dim)}
.empty .icon{font-size:36px;display:block;margin-bottom:12px;opacity:.3}

/* ── ADMIN BAR ──────────────────────────────────── */
.admin-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(10,22,40,.97);border-top:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  max-width:720px;margin:0 auto;
}
.admin-bar-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(10,22,40,.97);border-top:1px solid var(--border);
}
.admin-bar-inner{max-width:720px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.btn-add{
  padding:9px 18px;border-radius:5px;border:1px solid var(--gold);
  background:var(--gold);color:#000;font-family:'Lora',serif;
  font-size:14px;cursor:pointer;font-weight:600;transition:background .15s
}
.btn-add:hover{background:var(--gold-light)}
.admin-status{font-size:12px;color:var(--text-dim)}
.btn-admin-toggle{
  padding:7px 14px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-family:'Lora',serif;
  font-size:13px;cursor:pointer;transition:all .15s
}
.btn-admin-toggle:hover{color:var(--text);border-color:var(--text-dim)}
.btn-admin-toggle.active{border-color:var(--gold);color:var(--gold)}

/* ── SPINNER ─────────────────────────────────────── */
.spinner-wrap{text-align:center;padding:60px 20px;color:var(--text-dim)}
.spinner{
  display:inline-block;width:36px;height:36px;border:3px solid rgba(201,168,76,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;
  margin-bottom:14px
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODAL ───────────────────────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:16px
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--navy-card);border:1px solid var(--border);border-radius:10px;
  width:100%;max-width:600px;max-height:90vh;overflow-y:auto;
  padding:28px 24px
}
.modal h2{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px}
.form-group input,.form-group textarea{
  width:100%;padding:10px 12px;background:var(--navy-light);
  border:1px solid var(--border);border-radius:5px;color:var(--text);
  font-family:'Lora',serif;font-size:14px;outline:none;transition:border-color .2s;resize:vertical
}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stanza-block{
  background:var(--navy);border:1px solid var(--border);border-radius:6px;
  padding:14px;margin-bottom:10px;position:relative
}
.stanza-block .remove-stanza{
  position:absolute;top:10px;right:10px;background:none;border:none;
  color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1
}
.stanza-block .remove-stanza:hover{color:#e07070}
.btn-add-stanza{
  width:100%;padding:9px;border-radius:5px;border:1px dashed var(--border);
  background:transparent;color:var(--text-dim);font-family:'Lora',serif;
  font-size:14px;cursor:pointer;margin-bottom:20px;transition:all .15s
}
.btn-add-stanza:hover{border-color:var(--gold);color:var(--gold)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{
  padding:10px 20px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-family:'Lora',serif;
  font-size:14px;cursor:pointer;transition:all .15s
}
.btn-cancel:hover{color:var(--text);border-color:var(--text-dim)}
.btn-submit{
  padding:10px 22px;border-radius:5px;border:1px solid var(--gold);
  background:var(--gold);color:#000;font-family:'Lora',serif;
  font-size:14px;cursor:pointer;font-weight:600;transition:background .15s
}
.btn-submit:hover{background:var(--gold-light)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-danger-sm{
  padding:10px 18px;border-radius:5px;border:1px solid rgba(192,57,43,.4);
  background:rgba(192,57,43,.1);color:#e07070;font-family:'Lora',serif;
  font-size:14px;cursor:pointer;margin-right:auto;transition:background .15s
}
.btn-danger-sm:hover{background:rgba(192,57,43,.25)}

/* ── TOAST ───────────────────────────────────────── */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;
  background:var(--navy-card);border:1px solid var(--border);border-radius:6px;
  padding:12px 20px;font-size:14px;color:var(--text);
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap
}
.toast.show{opacity:1}
.toast.success{border-color:rgba(76,175,80,.5);color:#81c784}
.toast.error{border-color:rgba(192,57,43,.5);color:#e07070}

/* ── PRESENTATION VIEW ──────────────────────────── */
#presentation{
  display:none;position:fixed;inset:0;z-index:9999;
  flex-direction:column;justify-content:center;align-items:center;
  background:#000;transition:background .4s
}
#presentation.active{display:flex}
.bg-dark-navy  {background:#0a1628!important}
.bg-black      {background:#000000!important}
.bg-purple     {background:linear-gradient(135deg,#0d0520 0%,#1e0a45 100%)!important}
.bg-teal       {background:linear-gradient(135deg,#021520 0%,#073b3e 100%)!important}
.bg-crimson    {background:linear-gradient(135deg,#150505 0%,#3d0a0a 100%)!important}
.bg-forest     {background:linear-gradient(135deg,#050f05 0%,#0a2e14 100%)!important}
.bg-gold       {background:linear-gradient(135deg,#1a1000 0%,#3d2a00 100%)!important}
.bg-custom     {background-size:cover!important;background-position:center!important}
.stanza-area{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  width:100%;padding:40px 6vw;text-align:center;
}
.stanza-label{
  font-family:'Cinzel',serif;font-size:clamp(11px,1.8vw,16px);
  color:rgba(201,168,76,.7);letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px
}
.stanza-text{
  font-family:'Lora',serif;font-size:clamp(22px,4.5vw,62px);
  line-height:1.55;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.9);max-width:1100px
}
.stanza-text .line{display:block}
.hymn-title-bar{
  position:fixed;top:0;left:0;right:0;padding:10px 20px;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10
}
.hymn-title-bar .title{font-family:'Cinzel',serif;font-size:clamp(13px,2vw,18px);color:var(--gold)}
.hymn-title-bar .stanza-indicator{font-size:13px;color:rgba(255,255,255,.55)}
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;padding:14px 20px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:10
}
.nav-bar .nav-group{display:flex;gap:10px;align-items:center}
.btn{
  padding:9px 18px;border-radius:5px;border:1px solid var(--border);
  background:rgba(255,255,255,.07);color:var(--text);font-family:'Lora',serif;
  font-size:14px;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap
}
.btn:hover{background:rgba(255,255,255,.14)}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold-light);border-color:var(--gold-light)}
.btn-ghost{background:transparent;border-color:transparent;color:rgba(255,255,255,.55)}
.btn-ghost:hover{color:#fff;background:rgba(255,255,255,.08)}
.btn-danger{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);color:#e07070}
.btn-danger:hover{background:rgba(192,57,43,.3)}
.progress-dots{display:flex;gap:6px;align-items:center}
.progress-dots span{
  width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s,transform .2s
}
.progress-dots span.active{background:var(--gold);transform:scale(1.3)}
.nav-zone{
  position:fixed;top:60px;bottom:70px;width:18%;z-index:5;cursor:pointer;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s
}
.nav-zone:hover{opacity:1}
.nav-zone.left{left:0;background:linear-gradient(to right,rgba(0,0,0,.25),transparent)}
.nav-zone.right{right:0;background:linear-gradient(to left,rgba(0,0,0,.25),transparent)}
.nav-zone svg{width:40px;height:40px;fill:rgba(255,255,255,.7)}
.bg-drawer{
  position:fixed;bottom:70px;left:0;right:0;z-index:20;
  background:rgba(10,22,40,.97);border-top:1px solid var(--border);
  padding:16px 20px 20px;transform:translateY(100%);transition:transform .3s ease
}
.bg-drawer.open{transform:translateY(0)}
.bg-drawer h3{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:14px}
.bg-grid{display:flex;flex-wrap:wrap;gap:10px}
.bg-swatch{
  width:70px;height:50px;border-radius:5px;cursor:pointer;border:2px solid transparent;
  position:relative;transition:border-color .15s;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;
  font-size:10px;color:rgba(255,255,255,.7);font-family:'Lora',serif
}
.bg-swatch:hover,.bg-swatch.active{border-color:var(--gold)}
.bg-swatch.s-dark-navy{background:#0a1628}
.bg-swatch.s-black{background:#000}
.bg-swatch.s-purple{background:linear-gradient(135deg,#0d0520,#1e0a45)}
.bg-swatch.s-teal{background:linear-gradient(135deg,#021520,#073b3e)}
.bg-swatch.s-crimson{background:linear-gradient(135deg,#150505,#3d0a0a)}
.bg-swatch.s-forest{background:linear-gradient(135deg,#050f05,#0a2e14)}
.bg-swatch.s-gold{background:linear-gradient(135deg,#1a1000,#3d2a00)}
.bg-swatch.s-custom{background:var(--navy-light);border-style:dashed;border-color:var(--text-dim)}
#customBgInput{display:none}
.fade-stanza{animation:fadeStanza .3s ease}
@keyframes fadeStanza{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Search / Browse view -->
<div class="search-wrap" id="searchView">
  <div class="header">
    <img class="logo" src="https://www.twcministries.net/Pages/church_photos/Image1-transparent.gif" alt="TWC" onerror="this.style.display='none'"/>
    <div class="header-text">
      <h1>TWC Hymns</h1>
      <p>Worship Display — search, select, project</p>
    </div>
  </div>
  <div class="search-box">
    <span class="icon">🎵</span>
    <input type="text" id="searchInput" placeholder="Search hymn title or lyric phrase…" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <div class="result-count" id="resultCount"></div>
  <div id="results"></div>
</div>

<!-- Admin bar (always shown at bottom of search view) -->
<div class="admin-bar-wrap" id="adminBar">
  <div class="admin-bar-inner">
    <span class="admin-status" id="adminStatus">🔒 Admin</span>
    <button class="btn-admin-toggle" id="adminToggleBtn" onclick="toggleAdmin()">Unlock Admin</button>
    <button class="btn-add" id="addSongBtn" onclick="openAddModal()" style="display:none">+ Add Song</button>
  </div>
</div>

<!-- Presentation view -->
<div id="presentation">
  <div class="hymn-title-bar">
    <span class="title" id="presTitle"></span>
    <span class="stanza-indicator" id="presIndicator"></span>
  </div>
  <div class="nav-zone left" onclick="prevStanza()">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </div>
  <div class="nav-zone right" onclick="nextStanza()">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </div>
  <div class="stanza-area" id="stanzaArea">
    <div class="stanza-label" id="stanzaLabel"></div>
    <div class="stanza-text" id="stanzaText"></div>
  </div>
  <div class="bg-drawer" id="bgDrawer">
    <h3>🎨 Background</h3>
    <div class="bg-grid">
      <div class="bg-swatch s-dark-navy active" data-bg="dark-navy" onclick="setBg('dark-navy',this)">Navy</div>
      <div class="bg-swatch s-black" data-bg="black" onclick="setBg('black',this)">Black</div>
      <div class="bg-swatch s-purple" data-bg="purple" onclick="setBg('purple',this)">Purple</div>
      <div class="bg-swatch s-teal" data-bg="teal" onclick="setBg('teal',this)">Teal</div>
      <div class="bg-swatch s-crimson" data-bg="crimson" onclick="setBg('crimson',this)">Crimson</div>
      <div class="bg-swatch s-forest" data-bg="forest" onclick="setBg('forest',this)">Forest</div>
      <div class="bg-swatch s-gold" data-bg="gold" onclick="setBg('gold',this)">Gold</div>
      <div class="bg-swatch s-custom" onclick="document.getElementById('customBgInput').click()">📷 Custom</div>
    </div>
    <input type="file" id="customBgInput" accept="image/*" onchange="setCustomBg(this)"/>
  </div>
  <div class="nav-bar">
    <div class="nav-group">
      <button class="btn btn-danger" onclick="closePresentation()">✕ Exit</button>
      <button class="btn btn-ghost" onclick="toggleBgDrawer()">🎨</button>
      <button class="btn btn-ghost" onclick="toggleFullscreen()" id="fsBtn">⛶ Fullscreen</button>
    </div>
    <div class="progress-dots" id="progressDots"></div>
    <div class="nav-group">
      <button class="btn" onclick="prevStanza()">◀ Prev</button>
      <button class="btn btn-gold" onclick="nextStanza()">Next ▶</button>
    </div>
  </div>
</div>

<!-- Add / Edit Song Modal -->
<div class="modal-overlay" id="songModal">
  <div class="modal">
    <h2 id="modalTitle">Add New Hymn</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="fTitle" placeholder="Amazing Grace"/>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="fAuthor" placeholder="John Newton"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Year</label>
        <input type="number" id="fYear" placeholder="1779"/>
      </div>
      <div class="form-group">
        <label>Keywords (comma-separated)</label>
        <input type="text" id="fKeywords" placeholder="grace, saved, lost"/>
      </div>
    </div>
    <div class="form-group">
      <label>Stanzas</label>
      <div id="stanzaList"></div>
      <button class="btn-add-stanza" onclick="addStanzaBlock()">+ Add Stanza</button>
    </div>
    <div class="modal-actions">
      <button class="btn-danger-sm" id="deleteBtn" onclick="deleteSong()" style="display:none">Delete Song</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="submitBtn" onclick="submitSong()">Save Hymn</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://twc-hymns.kd7bgn7q2z.workers.dev';

let songs = [];
let editingId = null;
let isAdmin = false;

const STATE = {
  query: '',
  currentHymn: null,
  currentIdx: 0,
  bg: 'dark-navy',
  customBgUrl: null,
  bgDrawerOpen: false
};

// ── INIT ────────────────────────────────────────────
async function init() {
  showSpinner();
  try {
    const resp = await fetch(`${API_BASE}/api/songs`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    songs = await resp.json();
    renderResults();
    document.getElementById('searchInput').focus();
  } catch (err) {
    document.getElementById('results').innerHTML =
      `<div class="empty"><span class="icon">⚠️</span>Could not load hymns.<br>${esc(err.message)}</div>`;
    document.getElementById('resultCount').textContent = '';
  }
}

function showSpinner() {
  document.getElementById('results').innerHTML =
    `<div class="spinner-wrap"><div class="spinner"></div><div>Loading hymns…</div></div>`;
}

// ── SEARCH ──────────────────────────────────────────
function onSearch(q) {
  STATE.query = q.trim().toLowerCase();
  renderResults();
}

function filterSongs(q) {
  if (!q) return songs;
  return songs.filter(h => {
    if (h.title.toLowerCase().includes(q)) return true;
    if (h.author.toLowerCase().includes(q)) return true;
    if (h.keywords && h.keywords.some(k => k.toLowerCase().includes(q))) return true;
    return h.stanzas && h.stanzas.some(s => s.lines.some(l => l.toLowerCase().includes(q)));
  });
}

function getSnippet(hymn, q) {
  if (!q) return hymn.stanzas[0].lines.slice(0,2).join(' / ');
  for (const s of hymn.stanzas) {
    for (const l of s.lines) {
      if (l.toLowerCase().includes(q)) return '…' + l + '…';
    }
  }
  return hymn.stanzas[0].lines.slice(0,2).join(' / ');
}

function renderResults() {
  const results = filterSongs(STATE.query);
  document.getElementById('resultCount').textContent = STATE.query
    ? `${results.length} result${results.length !== 1 ? 's' : ''} for "${STATE.query}"`
    : `${results.length} hymns`;

  if (results.length === 0) {
    document.getElementById('results').innerHTML =
      `<div class="empty"><span class="icon">🎵</span>No hymns found.<br>Try a different word or phrase.</div>`;
    return;
  }

  document.getElementById('results').innerHTML = results.map(h => `
    <div class="hymn-card">
      <div style="flex:1;cursor:pointer" onclick="openPresentation(${h.id})">
        <h3>${esc(h.title)}</h3>
        <div class="meta">${esc(h.author)} · ${h.year || '—'} · ${h.stanzas.length} stanzas</div>
        ${STATE.query ? `<div class="snippet">${esc(getSnippet(h, STATE.query))}</div>` : ''}
      </div>
      <div class="card-actions">
        <span class="card-edit ${isAdmin ? 'visible' : ''}" onclick="openEditModal(${h.id})">✏️</span>
        <span class="card-play" onclick="openPresentation(${h.id})">▶</span>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ADMIN ───────────────────────────────────────────
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false;
    sessionStorage.removeItem('hymnsAdminKey');
    updateAdminUI();
    return;
  }
  const key = prompt('Enter admin key:');
  if (!key) return;
  sessionStorage.setItem('hymnsAdminKey', key);
  isAdmin = true;
  updateAdminUI();
  showToast('Admin mode unlocked', 'success');
}

function updateAdminUI() {
  document.getElementById('adminStatus').textContent = isAdmin ? '🔓 Admin Active' : '🔒 Admin';
  document.getElementById('adminToggleBtn').textContent = isAdmin ? 'Lock Admin' : 'Unlock Admin';
  document.getElementById('adminToggleBtn').classList.toggle('active', isAdmin);
  document.getElementById('addSongBtn').style.display = isAdmin ? 'inline-block' : 'none';
  renderResults();
}

function getAdminKey() {
  return sessionStorage.getItem('hymnsAdminKey') || '';
}

// ── PRESENTATION ─────────────────────────────────────
function openPresentation(id) {
  const hymn = songs.find(h => h.id === id);
  if (!hymn) return;
  STATE.currentHymn = hymn;
  STATE.currentIdx = 0;
  const pres = document.getElementById('presentation');
  pres.className = 'active bg-' + STATE.bg;
  if (STATE.bg === 'custom' && STATE.customBgUrl) {
    pres.style.backgroundImage = `url(${STATE.customBgUrl})`;
  } else {
    pres.style.backgroundImage = '';
  }
  renderStanza();
  pres.style.display = 'flex';
  document.addEventListener('keydown', onKey);
}

function closePresentation() {
  if (document.fullscreenElement) document.exitFullscreen();
  document.getElementById('presentation').style.display = 'none';
  document.getElementById('bgDrawer').classList.remove('open');
  STATE.bgDrawerOpen = false;
  document.removeEventListener('keydown', onKey);
}

function renderStanza() {
  const hymn = STATE.currentHymn;
  const idx = STATE.currentIdx;
  const stanza = hymn.stanzas[idx];
  document.getElementById('presTitle').textContent = hymn.title;
  document.getElementById('presIndicator').textContent = `${stanza.label}  ·  ${idx + 1} / ${hymn.stanzas.length}`;
  const textEl = document.getElementById('stanzaText');
  textEl.innerHTML = stanza.lines.map(l => `<span class="line">${esc(l)}</span>`).join('');
  textEl.parentElement.classList.remove('fade-stanza');
  void textEl.parentElement.offsetWidth;
  textEl.parentElement.classList.add('fade-stanza');
  document.getElementById('stanzaLabel').textContent = stanza.label;
  renderDots();
}

function renderDots() {
  document.getElementById('progressDots').innerHTML =
    STATE.currentHymn.stanzas.map((_, i) =>
      `<span class="${i === STATE.currentIdx ? 'active' : ''}"></span>`
    ).join('');
}

function nextStanza() {
  if (STATE.currentIdx < STATE.currentHymn.stanzas.length - 1) {
    STATE.currentIdx++;
    renderStanza();
  }
}

function prevStanza() {
  if (STATE.currentIdx > 0) {
    STATE.currentIdx--;
    renderStanza();
  }
}

function onKey(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextStanza(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); prevStanza(); }
  if (e.key === 'Escape')                                                { closePresentation(); }
  if (e.key === 'f' || e.key === 'F')                                    { toggleFullscreen(); }
}

// ── BACKGROUND ───────────────────────────────────────
function toggleBgDrawer() {
  STATE.bgDrawerOpen = !STATE.bgDrawerOpen;
  document.getElementById('bgDrawer').classList.toggle('open', STATE.bgDrawerOpen);
}

function setBg(bg, el) {
  STATE.bg = bg;
  const pres = document.getElementById('presentation');
  ['dark-navy','black','purple','teal','crimson','forest','gold','custom'].forEach(c => pres.classList.remove('bg-'+c));
  pres.classList.add('bg-' + bg);
  pres.style.backgroundImage = '';
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
}

function setCustomBg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    STATE.customBgUrl = e.target.result;
    const pres = document.getElementById('presentation');
    ['dark-navy','black','purple','teal','crimson','forest','gold'].forEach(c => pres.classList.remove('bg-'+c));
    pres.classList.add('bg-custom');
    pres.style.backgroundImage = `url(${e.target.result})`;
    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
    document.querySelector('.bg-swatch.s-custom').classList.add('active');
    STATE.bg = 'custom';
  };
  reader.readAsDataURL(file);
}

// ── FULLSCREEN ───────────────────────────────────────
function toggleFullscreen() {
  const el = document.getElementById('presentation');
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    document.getElementById('fsBtn').textContent = '⛶ Exit Full';
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    document.getElementById('fsBtn').textContent = '⛶ Fullscreen';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('fsBtn').textContent = '⛶ Fullscreen';
});

// ── MODAL ─────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Hymn';
  document.getElementById('fTitle').value = '';
  document.getElementById('fAuthor').value = '';
  document.getElementById('fYear').value = '';
  document.getElementById('fKeywords').value = '';
  document.getElementById('stanzaList').innerHTML = '';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('submitBtn').textContent = 'Save Hymn';
  addStanzaBlock();
  document.getElementById('songModal').classList.add('open');
}

function openEditModal(id) {
  const hymn = songs.find(h => h.id === id);
  if (!hymn) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Hymn';
  document.getElementById('fTitle').value = hymn.title;
  document.getElementById('fAuthor').value = hymn.author || '';
  document.getElementById('fYear').value = hymn.year || '';
  document.getElementById('fKeywords').value = (hymn.keywords || []).join(', ');
  document.getElementById('stanzaList').innerHTML = '';
  (hymn.stanzas || []).forEach(s => addStanzaBlock(s.label, s.lines.join('\n')));
  document.getElementById('deleteBtn').style.display = 'inline-block';
  document.getElementById('submitBtn').textContent = 'Update Hymn';
  document.getElementById('songModal').classList.add('open');
}

function closeModal() {
  document.getElementById('songModal').classList.remove('open');
}

function addStanzaBlock(label = '', lines = '') {
  const list = document.getElementById('stanzaList');
  const div = document.createElement('div');
  div.className = 'stanza-block';
  div.innerHTML = `
    <button class="remove-stanza" onclick="this.parentElement.remove()">×</button>
    <div class="form-group" style="margin-bottom:10px">
      <label>Label</label>
      <input type="text" class="stanza-label-input" placeholder="Verse 1 / Chorus / Bridge" value="${esc(label)}"/>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>Lines (one per line)</label>
      <textarea class="stanza-lines-input" rows="4" placeholder="Amazing grace! how sweet the sound&#10;That saved a wretch like me!">${esc(lines)}</textarea>
    </div>
  `;
  list.appendChild(div);
}

async function submitSong() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }

  const stanzaBlocks = document.querySelectorAll('.stanza-block');
  if (stanzaBlocks.length === 0) { showToast('Add at least one stanza', 'error'); return; }

  const stanzas = Array.from(stanzaBlocks).map(b => ({
    label: b.querySelector('.stanza-label-input').value.trim() || 'Verse',
    lines: b.querySelector('.stanza-lines-input').value.split('\n').map(l => l.trim()).filter(l => l)
  })).filter(s => s.lines.length > 0);

  const body = {
    title,
    author: document.getElementById('fAuthor').value.trim(),
    year: parseInt(document.getElementById('fYear').value) || null,
    keywords: document.getElementById('fKeywords').value.split(',').map(k => k.trim()).filter(k => k),
    stanzas
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    let resp;
    if (editingId) {
      resp = await fetch(`${API_BASE}/api/songs/${editingId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Key': getAdminKey() },
        body: JSON.stringify(body)
      });
    } else {
      resp = await fetch(`${API_BASE}/api/songs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Key': getAdminKey() },
        body: JSON.stringify(body)
      });
    }

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    const saved = await resp.json();
    if (editingId) {
      songs = songs.map(s => s.id === editingId ? saved : s);
      showToast('Hymn updated', 'success');
    } else {
      songs.push(saved);
      showToast('Hymn added', 'success');
    }
    closeModal();
    renderResults();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? 'Update Hymn' : 'Save Hymn';
  }
}

async function deleteSong() {
  if (!editingId) return;
  const hymn = songs.find(h => h.id === editingId);
  if (!confirm(`Delete "${hymn?.title}"? This cannot be undone.`)) return;

  try {
    const resp = await fetch(`${API_BASE}/api/songs/${editingId}`, {
      method: 'DELETE',
      headers: { 'X-Admin-Key': getAdminKey() }
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    songs = songs.filter(s => s.id !== editingId);
    closeModal();
    renderResults();
    showToast('Hymn deleted', 'success');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── TOAST ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── START ─────────────────────────────────────────────
const savedKey = sessionStorage.getItem('hymnsAdminKey');
if (savedKey) { isAdmin = true; updateAdminUI(); }
init();
</script>
</body>
</html>
