<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TWC Hymns — Worship Display</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-card:#0f1e38;--navy-light:#162440;
  --gold:#c9a84c;--gold-light:#e0c068;
  --text:#e8e8e8;--text-dim:#8a99b8;--border:rgba(100,130,180,.18);
  --danger:#c0392b;--blue-light:#6ea8d8;
}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:'Lora',serif}

/* ── SEARCH VIEW ────────────────────────────────── */
.search-wrap{max-width:720px;margin:0 auto;padding:24px 16px 80px}
.header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.logo{height:44px;width:auto}
.header-text h1{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);line-height:1}
.header-text p{font-size:12px;color:var(--text-dim);margin-top:3px}
.search-box{position:relative;margin-bottom:20px}
.search-box input{
  width:100%;padding:14px 16px 14px 46px;
  background:var(--navy-card);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:16px;font-family:'Lora',serif;outline:none;
  transition:border-color .2s
}
.search-box input:focus{border-color:var(--gold)}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:18px}
.result-count{font-size:13px;color:var(--text-dim);margin-bottom:12px}
.hymn-card{
  background:var(--navy-card);border:1px solid var(--border);border-radius:6px;
  padding:16px 18px;margin-bottom:10px;cursor:pointer;
  transition:border-color .2s,background .2s;
  display:flex;align-items:center;justify-content:space-between;gap:12px
}
.hymn-card:hover{border-color:var(--gold);background:var(--navy-light)}
.hymn-card h3{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:4px}
.hymn-card .meta{font-size:12px;color:var(--text-dim)}
.hymn-card .snippet{font-size:13px;color:var(--text-dim);margin-top:6px;font-style:italic;line-height:1.5}
.hymn-card .arrow{color:var(--gold);font-size:20px;flex-shrink:0}
.empty{text-align:center;padding:48px 20px;color:var(--text-dim)}
.empty .icon{font-size:36px;display:block;margin-bottom:12px;opacity:.3}

/* ── PRESENTATION VIEW ──────────────────────────── */
#presentation{
  display:none;position:fixed;inset:0;z-index:9999;
  flex-direction:column;justify-content:center;align-items:center;
  background:#000;
  transition:background .4s
}
#presentation.active{display:flex}

/* Background options */
.bg-dark-navy  {background:#0a1628!important}
.bg-black      {background:#000000!important}
.bg-purple     {background:linear-gradient(135deg,#0d0520 0%,#1e0a45 100%)!important}
.bg-teal       {background:linear-gradient(135deg,#021520 0%,#073b3e 100%)!important}
.bg-crimson    {background:linear-gradient(135deg,#150505 0%,#3d0a0a 100%)!important}
.bg-forest     {background:linear-gradient(135deg,#050f05 0%,#0a2e14 100%)!important}
.bg-gold       {background:linear-gradient(135deg,#1a1000 0%,#3d2a00 100%)!important}
.bg-custom     {background-size:cover!important;background-position:center!important}

/* Stanza display */
.stanza-area{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  width:100%;padding:40px 6vw;text-align:center;
}
.stanza-label{
  font-family:'Cinzel',serif;font-size:clamp(11px,1.8vw,16px);
  color:rgba(201,168,76,.7);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:20px
}
.stanza-text{
  font-family:'Lora',serif;font-size:clamp(22px,4.5vw,62px);
  line-height:1.55;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.9);
  max-width:1100px
}
.stanza-text .line{display:block}
.hymn-title-bar{
  position:fixed;top:0;left:0;right:0;
  padding:10px 20px;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;z-index:10
}
.hymn-title-bar .title{font-family:'Cinzel',serif;font-size:clamp(13px,2vw,18px);color:var(--gold)}
.hymn-title-bar .stanza-indicator{font-size:13px;color:rgba(255,255,255,.55)}
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 20px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:10
}
.nav-bar .nav-group{display:flex;gap:10px;align-items:center}
.btn{
  padding:9px 18px;border-radius:5px;border:1px solid var(--border);
  background:rgba(255,255,255,.07);color:var(--text);font-family:'Lora',serif;
  font-size:14px;cursor:pointer;transition:background .15s,border-color .15s;
  white-space:nowrap
}
.btn:hover{background:rgba(255,255,255,.14)}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold-light);border-color:var(--gold-light)}
.btn-ghost{background:transparent;border-color:transparent;color:rgba(255,255,255,.55)}
.btn-ghost:hover{color:#fff;background:rgba(255,255,255,.08)}
.btn-danger{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);color:#e07070}
.btn-danger:hover{background:rgba(192,57,43,.3)}
.progress-dots{display:flex;gap:6px;align-items:center}
.progress-dots span{
  width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);
  transition:background .2s,transform .2s
}
.progress-dots span.active{background:var(--gold);transform:scale(1.3)}

/* Nav arrows (big click zones) */
.nav-zone{
  position:fixed;top:60px;bottom:70px;width:18%;z-index:5;cursor:pointer;
  display:flex;align-items:center;justify-content:center;opacity:0;
  transition:opacity .2s
}
.nav-zone:hover{opacity:1}
.nav-zone.left{left:0;background:linear-gradient(to right,rgba(0,0,0,.25),transparent)}
.nav-zone.right{right:0;background:linear-gradient(to left,rgba(0,0,0,.25),transparent)}
.nav-zone svg{width:40px;height:40px;fill:rgba(255,255,255,.7)}

/* ── BACKGROUND DRAWER ──────────────────────────── */
.bg-drawer{
  position:fixed;bottom:70px;left:0;right:0;z-index:20;
  background:rgba(10,22,40,.97);border-top:1px solid var(--border);
  padding:16px 20px 20px;
  transform:translateY(100%);transition:transform .3s ease
}
.bg-drawer.open{transform:translateY(0)}
.bg-drawer h3{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:14px}
.bg-grid{display:flex;flex-wrap:wrap;gap:10px}
.bg-swatch{
  width:70px;height:50px;border-radius:5px;cursor:pointer;border:2px solid transparent;
  position:relative;transition:border-color .15s;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;
  font-size:10px;color:rgba(255,255,255,.7);font-family:'Lora',serif
}
.bg-swatch:hover,.bg-swatch.active{border-color:var(--gold)}
.bg-swatch.s-dark-navy{background:#0a1628}
.bg-swatch.s-black{background:#000}
.bg-swatch.s-purple{background:linear-gradient(135deg,#0d0520,#1e0a45)}
.bg-swatch.s-teal{background:linear-gradient(135deg,#021520,#073b3e)}
.bg-swatch.s-crimson{background:linear-gradient(135deg,#150505,#3d0a0a)}
.bg-swatch.s-forest{background:linear-gradient(135deg,#050f05,#0a2e14)}
.bg-swatch.s-gold{background:linear-gradient(135deg,#1a1000,#3d2a00)}
.bg-swatch.s-custom{background:var(--navy-light);border-style:dashed;border-color:var(--text-dim)}
#customBgInput{display:none}

/* ── TRANSITION ──────────────────────────────────── */
.fade-stanza{animation:fadeStanza .3s ease}
@keyframes fadeStanza{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- Search / Browse view -->
<div class="search-wrap" id="searchView">
  <div class="header">
    <img class="logo" src="https://www.twcministries.net/Pages/church_photos/Image1-transparent.gif" alt="TWC" onerror="this.style.display='none'"/>
    <div class="header-text">
      <h1>TWC Hymns</h1>
      <p>Worship Display — search, select, project</p>
    </div>
  </div>
  <div class="search-box">
    <span class="icon">🎵</span>
    <input type="text" id="searchInput" placeholder="Search hymn title or lyric phrase…" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <div class="result-count" id="resultCount"></div>
  <div id="results"></div>
</div>

<!-- Presentation view -->
<div id="presentation">
  <div class="hymn-title-bar">
    <span class="title" id="presTitle"></span>
    <span class="stanza-indicator" id="presIndicator"></span>
  </div>

  <!-- Big click zones for prev/next -->
  <div class="nav-zone left" onclick="prevStanza()">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </div>
  <div class="nav-zone right" onclick="nextStanza()">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </div>

  <div class="stanza-area" id="stanzaArea">
    <div class="stanza-label" id="stanzaLabel"></div>
    <div class="stanza-text" id="stanzaText"></div>
  </div>

  <!-- Background drawer -->
  <div class="bg-drawer" id="bgDrawer">
    <h3>🎨 Background</h3>
    <div class="bg-grid">
      <div class="bg-swatch s-dark-navy active" data-bg="dark-navy" onclick="setBg('dark-navy',this)">Navy</div>
      <div class="bg-swatch s-black" data-bg="black" onclick="setBg('black',this)">Black</div>
      <div class="bg-swatch s-purple" data-bg="purple" onclick="setBg('purple',this)">Purple</div>
      <div class="bg-swatch s-teal" data-bg="teal" onclick="setBg('teal',this)">Teal</div>
      <div class="bg-swatch s-crimson" data-bg="crimson" onclick="setBg('crimson',this)">Crimson</div>
      <div class="bg-swatch s-forest" data-bg="forest" onclick="setBg('forest',this)">Forest</div>
      <div class="bg-swatch s-gold" data-bg="gold" onclick="setBg('gold',this)">Gold</div>
      <div class="bg-swatch s-custom" onclick="document.getElementById('customBgInput').click()">📷 Custom</div>
    </div>
    <input type="file" id="customBgInput" accept="image/*" onchange="setCustomBg(this)"/>
  </div>

  <div class="nav-bar">
    <div class="nav-group">
      <button class="btn btn-danger" onclick="closePresentation()">✕ Exit</button>
      <button class="btn btn-ghost" onclick="toggleBgDrawer()">🎨</button>
      <button class="btn btn-ghost" onclick="toggleFullscreen()" id="fsBtn">⛶ Fullscreen</button>
    </div>
    <div class="progress-dots" id="progressDots"></div>
    <div class="nav-group">
      <button class="btn" onclick="prevStanza()">◀ Prev</button>
      <button class="btn btn-gold" onclick="nextStanza()">Next ▶</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  HYMN DATA  (public domain — pre-1928 texts)
// ══════════════════════════════════════════════════════════════
const HYMNS = [
{
  id:1, title:"Amazing Grace", author:"John Newton", year:1779,
  keywords:["amazing","grace","sweet","sound","saved","wretch","lost","found","blind","see","fear","dangers","toils","snares","ten thousand","years"],
  stanzas:[
    {label:"Verse 1",lines:["Amazing grace! how sweet the sound","That saved a wretch like me!","I once was lost, but now am found,","Was blind, but now I see."]},
    {label:"Verse 2",lines:["'Twas grace that taught my heart to fear,","And grace my fears relieved;","How precious did that grace appear","The hour I first believed."]},
    {label:"Verse 3",lines:["Through many dangers, toils and snares,","I have already come;","'Tis grace hath brought me safe thus far,","And grace will lead me home."]},
    {label:"Verse 4",lines:["The Lord has promised good to me,","His word my hope secures;","He will my shield and portion be,","As long as life endures."]},
    {label:"Verse 5",lines:["When we've been there ten thousand years,","Bright shining as the sun,","We've no less days to sing God's praise","Than when we'd first begun."]}
  ]
},
{
  id:2, title:"How Great Thou Art", author:"Carl Boberg / Stuart Hine", year:1885,
  keywords:["great","thou art","forests","glades","birds","brook","balmly","son","calvary","burden","nail","bore","sinner","crushed","mercy seat","kneel","shout","great"],
  stanzas:[
    {label:"Verse 1",lines:["O Lord my God, when I in awesome wonder","Consider all the worlds Thy hands have made,","I see the stars, I hear the rolling thunder,","Thy power throughout the universe displayed."]},
    {label:"Chorus",lines:["Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!","Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!"]},
    {label:"Verse 2",lines:["When through the woods and forest glades I wander","And hear the birds sing sweetly in the trees,","When I look down from lofty mountain grandeur","And hear the brook and feel the gentle breeze."]},
    {label:"Chorus",lines:["Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!","Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!"]},
    {label:"Verse 3",lines:["And when I think that God, His Son not sparing,","Sent Him to die, I scarce can take it in;","That on the cross, my burden gladly bearing,","He bled and died to take away my sin."]},
    {label:"Chorus",lines:["Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!","Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!"]},
    {label:"Verse 4",lines:["When Christ shall come with shout of acclamation","And take me home, what joy shall fill my heart!","Then I shall bow in humble adoration,","And there proclaim: my God, how great Thou art!"]},
    {label:"Chorus",lines:["Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!","Then sings my soul, my Saviour God, to Thee:","How great Thou art! How great Thou art!"]}
  ]
},
{
  id:3, title:"Great Is Thy Faithfulness", author:"Thomas Chisholm", year:1923,
  keywords:["faithfulness","morning","mercy","new","compassion","fail","shadow","turning","strength","hope","pardon","peace","presence","joy"],
  stanzas:[
    {label:"Verse 1",lines:["Great is Thy faithfulness, O God my Father;","There is no shadow of turning with Thee;","Thou changest not, Thy compassions, they fail not;","As Thou hast been Thou forever wilt be."]},
    {label:"Chorus",lines:["Great is Thy faithfulness! Great is Thy faithfulness!","Morning by morning new mercies I see;","All I have needed Thy hand hath provided—","Great is Thy faithfulness, Lord, unto me!"]},
    {label:"Verse 2",lines:["Summer and winter and springtime and harvest,","Sun, moon and stars in their courses above","Join with all nature in manifold witness","To Thy great faithfulness, mercy and love."]},
    {label:"Chorus",lines:["Great is Thy faithfulness! Great is Thy faithfulness!","Morning by morning new mercies I see;","All I have needed Thy hand hath provided—","Great is Thy faithfulness, Lord, unto me!"]},
    {label:"Verse 3",lines:["Pardon for sin and a peace that endureth,","Thine own dear presence to cheer and to guide;","Strength for today and bright hope for tomorrow,","Blessings all mine, with ten thousand beside!"]},

  ]
},
{
  id:4, title:"Holy, Holy, Holy", author:"Reginald Heber", year:1826,

  stanzas:[
    {label:"Verse 1",lines:["Holy, holy, holy! Lord God Almighty!","Early in the morning our song shall rise to Thee;","Holy, holy, holy! Merciful and mighty!","God in three Persons, blessed Trinity!"]},
    {label:"Verse 2",lines:["Holy, holy, holy! All the saints adore Thee,","Casting down their golden crowns around the glassy sea;","Cherubim and seraphim falling down before Thee,","Who wert, and art, and evermore shalt be."]},
    {label:"Verse 3",lines:["Holy, holy, holy! Though the darkness hide Thee,","Though the eye of sinful man Thy glory may not see,","Only Thou art holy; there is none beside Thee,","Perfect in power, in love and purity."]},

{
  id:5, title:"Blessed Assurance", author:"Fanny Crosby", year:1873,

  ]

{

  stanzas:[
    {label:"Verse 1",lines:["What a friend we have in Jesus,","All our sins and griefs to bear!","What a privilege to carry","Everything to God in prayer!","O what peace we often forfeit,","O what needless pain we bear,","All because we do not carry","Everything to God in prayer!"]},
    {label:"Verse 2",lines:["Have we trials and temptations?","Is there trouble anywhere?","We should never be discouraged—","Take it to the Lord in prayer.","Can we find a friend so faithful","Who will all our sorrows share?","Jesus knows our every weakness;","Take it to the Lord in prayer."]},
    {label:"Verse 3",lines:["Are we weak and heavy laden,","Cumbered with a load of care?","Precious Saviour, still our refuge—","Take it to the Lord in prayer.","Do thy friends despise, forsake thee?","Take it to the Lord in prayer!","In His arms He'll take and shield thee,","Thou wilt find a solace there."]}

{

{
  id:8, title:"Rock of Ages", author:"Augustus Toplady", year:1776,

{
  id:9, title:"A Mighty Fortress Is Our God", author:"Martin Luther", year:1529,

  stanzas:[

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let STATE = {
  query: '',
  currentHymn: null,
  currentIdx: 0,
  bg: 'dark-navy',
  customBgUrl: null,
  bgDrawerOpen: false
};

// ══════════════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════════════
function onSearch(q) {
  STATE.query = q.trim().toLowerCase();
  renderResults();
}

function searchHymns(q) {
  if (!q) return HYMNS;
  return HYMNS.filter(h => {
    if (h.title.toLowerCase().includes(q)) return true;
    if (h.author.toLowerCase().includes(q)) return true;
    if (h.keywords.some(k => k.toLowerCase().includes(q))) return true;
    // search inside stanza lines
    return h.stanzas.some(s => s.lines.some(l => l.toLowerCase().includes(q)));
  });
}

function getSnippet(hymn, q) {
  if (!q) return hymn.stanzas[0].lines.slice(0,2).join(' / ');
  for (const s of hymn.stanzas) {
    for (const l of s.lines) {
      if (l.toLowerCase().includes(q)) {
        return '…' + l + '…';
      }
    }
  }
  return hymn.stanzas[0].lines.slice(0,2).join(' / ');
}

function renderResults() {
  const results = searchHymns(STATE.query);
  const cnt = document.getElementById('resultCount');
  const res = document.getElementById('results');

  cnt.textContent = STATE.query
    ? `${results.length} result${results.length !== 1 ? 's' : ''} for "${STATE.query}"`
    : `${results.length} hymns`;

  if (results.length === 0) {
    res.innerHTML = `<div class="empty"><span class="icon">🎵</span>No hymns found for that search.<br>Try a different word or phrase.</div>`;
    return;
  }

  res.innerHTML = results.map(h => `
    <div class="hymn-card" onclick="openPresentation(${h.id})">
      <div style="flex:1">
        <h3>${h.title}</h3>
        <div class="meta">${h.author} · ${h.year} · ${h.stanzas.length} stanzas</div>
        ${STATE.query ? `<div class="snippet">${esc(getSnippet(h, STATE.query))}</div>` : ''}
      </div>
      <span class="arrow">▶</span>
    </div>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════
//  PRESENTATION
// ══════════════════════════════════════════════════════════════
function openPresentation(id) {
  const hymn = HYMNS.find(h => h.id === id);
  if (!hymn) return;
  STATE.currentHymn = hymn;
  STATE.currentIdx = 0;
  const pres = document.getElementById('presentation');
  pres.className = 'active ' + 'bg-' + STATE.bg;
  if (STATE.bg === 'custom' && STATE.customBgUrl) {
    pres.style.backgroundImage = `url(${STATE.customBgUrl})`;
  } else {
    pres.style.backgroundImage = '';
  }
  renderStanza();
  document.getElementById('presentation').style.display = 'flex';
  document.addEventListener('keydown', onKey);
}

function closePresentation() {
  if (document.fullscreenElement) document.exitFullscreen();
  document.getElementById('presentation').style.display = 'none';
  document.getElementById('bgDrawer').classList.remove('open');
  STATE.bgDrawerOpen = false;
  document.removeEventListener('keydown', onKey);
}

function renderStanza() {
  const hymn = STATE.currentHymn;
  const idx = STATE.currentIdx;
  const stanza = hymn.stanzas[idx];

  document.getElementById('presTitle').textContent = hymn.title;
  document.getElementById('presIndicator').textContent =
    `${stanza.label}  ·  ${idx + 1} / ${hymn.stanzas.length}`;

  const textEl = document.getElementById('stanzaText');
  textEl.innerHTML = stanza.lines.map(l => `<span class="line">${esc(l)}</span>`).join('');
  textEl.parentElement.classList.remove('fade-stanza');
  void textEl.parentElement.offsetWidth; // reflow
  textEl.parentElement.classList.add('fade-stanza');

  document.getElementById('stanzaLabel').textContent = stanza.label;
  renderDots();
}

function renderDots() {
  const hymn = STATE.currentHymn;
  const dots = document.getElementById('progressDots');
  dots.innerHTML = hymn.stanzas.map((_, i) =>
    `<span class="${i === STATE.currentIdx ? 'active' : ''}"></span>`
  ).join('');
}

function nextStanza() {
  if (STATE.currentIdx < STATE.currentHymn.stanzas.length - 1) {
    STATE.currentIdx++;
    renderStanza();
  }
}

function prevStanza() {
  if (STATE.currentIdx > 0) {
    STATE.currentIdx--;
    renderStanza();
  }
}

function onKey(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextStanza(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); prevStanza(); }
  if (e.key === 'Escape')                                                { closePresentation(); }
  if (e.key === 'f' || e.key === 'F')                                    { toggleFullscreen(); }
}

// ══════════════════════════════════════════════════════════════
//  BACKGROUND
// ══════════════════════════════════════════════════════════════
function toggleBgDrawer() {
  STATE.bgDrawerOpen = !STATE.bgDrawerOpen;
  document.getElementById('bgDrawer').classList.toggle('open', STATE.bgDrawerOpen);
}

function setBg(bg, el) {
  STATE.bg = bg;
  const pres = document.getElementById('presentation');
  // Remove all bg classes
  ['dark-navy','black','purple','teal','crimson','forest','gold','custom'].forEach(c => {
    pres.classList.remove('bg-' + c);
  });
  pres.classList.add('bg-' + bg);
  pres.style.backgroundImage = '';
  // Update active swatch
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
}

function setCustomBg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    STATE.customBgUrl = e.target.result;
    const pres = document.getElementById('presentation');
    ['dark-navy','black','purple','teal','crimson','forest','gold'].forEach(c => pres.classList.remove('bg-'+c));
    pres.classList.add('bg-custom');
    pres.style.backgroundImage = `url(${e.target.result})`;
    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
    document.querySelector('.bg-swatch.s-custom').classList.add('active');
    STATE.bg = 'custom';
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════════════════════════
//  FULLSCREEN
// ══════════════════════════════════════════════════════════════
function toggleFullscreen() {
  const el = document.getElementById('presentation');
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen).call(el);
    document.getElementById('fsBtn').textContent = '⛶ Exit Full';
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    document.getElementById('fsBtn').textContent = '⛶ Fullscreen';
  }
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.getElementById('fsBtn').textContent = '⛶ Fullscreen';
  }
});

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
renderResults();
document.getElementById('searchInput').focus();
</script>
