<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>God's Rainbow Drawing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}

body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(160deg,#fff9c4 0%,#ffe0f0 40%,#d0f0ff 100%);
  height:100vh;width:100vw;overflow:hidden;
  display:flex;flex-direction:row;align-items:stretch;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(2px 2px at 10% 15%,#ffb3d9 0%,transparent 100%),
    radial-gradient(3px 3px at 30% 5%,#b3e5fc 0%,transparent 100%),
    radial-gradient(2px 2px at 60% 10%,#c8e6c9 0%,transparent 100%),
    radial-gradient(3px 3px at 80% 20%,#fff9c4 0%,transparent 100%),
    radial-gradient(2px 2px at 50% 25%,#f8bbd0 0%,transparent 100%),
    radial-gradient(2px 2px at 90% 8%,#e1bee7 0%,transparent 100%);
}

/* ── SIDEBAR ── */
#sidebar{
  position:relative;z-index:10;
  width:82px;min-width:72px;
  display:flex;flex-direction:column;align-items:center;
  gap:8px;padding:10px 6px 10px;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(8px);
  border-right:3px solid rgba(255,180,220,0.5);
  box-shadow:4px 0 18px rgba(200,100,160,0.08);
}
#sideTitle{
  font-family:'Fredoka One',cursive;
  font-size:clamp(0.55rem,1.8vw,0.75rem);
  color:#e91e8c;
  text-shadow:1px 1px 0 #fff;
  text-align:center;line-height:1.2;
  letter-spacing:0.5px;
  margin-bottom:2px;
}
#verse{
  font-size:0.5rem;color:#7c5295;font-weight:700;
  writing-mode:vertical-rl;text-orientation:mixed;
  transform:rotate(180deg);
  letter-spacing:0.3px;transition:opacity 0.6s;
  max-height:140px;overflow:hidden;
  text-overflow:ellipsis;
  margin:4px 0;line-height:1.3;
  text-align:center;
}
.sidebar-divider{
  width:60%;height:2px;border-radius:2px;
  background:linear-gradient(90deg,transparent,#ffb3d9,transparent);
  margin:2px 0;
}

/* ── MAIN AREA ── */
#main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── CANVAS ── */
#canvas-wrap{
  position:relative;flex:1;
  display:flex;align-items:center;justify-content:center;
  z-index:5;padding:8px 8px 8px 8px;
}
#drawCanvas{
  border-radius:20px;background:#fffdf8;display:block;
  cursor:crosshair;touch-action:none;width:100%;height:100%;
  box-shadow:0 8px 32px rgba(0,0,0,.12),0 0 0 4px #fff,0 0 0 7px #ffb3d9;
}

/* ── BOTTOM BAR (song HUD only) ── */
#bottomBar{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:4px 10px 6px;gap:8px;
}

/* ── SIDEBAR BUTTONS ── */
.btn{
  font-family:'Fredoka One',cursive;border:none;border-radius:16px;cursor:pointer;
  font-size:clamp(0.55rem,1.5vw,0.75rem);
  padding:8px 4px 6px;
  width:66px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 0 rgba(0,0,0,.15);
  -webkit-tap-highlight-color:transparent;user-select:none;
  line-height:1;
}
.btn .btn-icon{font-size:1.4rem;display:block;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15);}
#clearBtn  {background:linear-gradient(160deg,#ff5252,#c62828);color:#fff;}
#brushBig  {background:linear-gradient(160deg,#81d4fa,#0288d1);color:#fff;}
#brushSmall{background:linear-gradient(160deg,#a5d6a7,#388e3c);color:#fff;}
#eraser    {background:linear-gradient(160deg,#ffe082,#ffa000);color:#fff;}
#musicBtn  {background:linear-gradient(160deg,#ce93d8,#7b1fa2);color:#fff;}
#lockBtn   {background:linear-gradient(160deg,#ef9a9a,#c62828);color:#fff;}

/* ── AFFIRMATION BUBBLE ── */
#affirmation{
  position:fixed;bottom:20px;left:calc(82px + 50%);
  transform:translateX(-50%) scale(0);
  background:linear-gradient(135deg,#fff9c4,#ffe0b2);
  border:3px solid #ffb74d;border-radius:20px;
  padding:9px 18px;font-family:'Fredoka One',cursive;
  font-size:clamp(0.9rem,3.5vw,1.3rem);color:#e65100;text-align:center;
  z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.15);
  pointer-events:none;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;white-space:nowrap;
}
#affirmation.show{transform:translateX(-50%) scale(1);opacity:1;}

/* ── SPEAKING DOTS ── */
#speakingDots{
  display:none;gap:5px;align-items:center;
  position:fixed;bottom:62px;left:calc(82px + 50%);transform:translateX(-50%);z-index:101;
}
#speakingDots.active{display:flex;}
#speakingDots span{
  width:8px;height:8px;border-radius:50%;background:#e91e8c;
  animation:dotBounce .6s infinite alternate;
}
#speakingDots span:nth-child(2){animation-delay:.15s;background:#ff9800;}
#speakingDots span:nth-child(3){animation-delay:.3s;background:#4caf50;}
@keyframes dotBounce{from{transform:translateY(0);opacity:.5;}to{transform:translateY(-6px);opacity:1;}}

/* ── MUSIC PLAYER HUD ── */
#musicHud{
  z-index:300;
  background:rgba(255,255,255,.88);backdrop-filter:blur(6px);
  border:2px solid #ce93d8;border-radius:16px;
  padding:5px 12px;font-family:'Fredoka One',cursive;
  font-size:clamp(0.6rem,1.8vw,0.82rem);color:#6a1b9a;
  display:none;align-items:center;gap:8px;
  box-shadow:0 4px 14px rgba(0,0,0,.1);
}
#musicHud.visible{display:flex;}
#musicHud .note{animation:noteWiggle .5s infinite alternate;}
@keyframes noteWiggle{from{transform:rotate(-8deg);}to{transform:rotate(8deg);}}
#songTitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38vw;}
#nextSongBtn{
  background:none;border:none;cursor:pointer;font-size:1.1rem;
  padding:0;line-height:1;-webkit-tap-highlight-color:transparent;
}

/* ── SPARKLES ── */
.sparkle{
  position:fixed;border-radius:50%;pointer-events:none;
  animation:sparkleAnim .8s ease-out forwards;z-index:200;
}
@keyframes sparkleAnim{0%{transform:scale(1) translateY(0);opacity:1;}100%{transform:scale(0) translateY(-40px);opacity:0;}}

@keyframes colorPop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.pop{animation:colorPop .3s ease;}

/* ── SPLASH / START SCREEN ── */
#splashScreen{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(160deg,#fff9c4 0%,#ffe0f0 40%,#d0f0ff 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
#splashScreen h1{
  font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,6vw,3rem);
  color:#e91e8c;text-shadow:3px 3px 0 #fff,5px 5px 0 #ffd6ec;
  text-align:center;padding:0 20px;
}
#splashScreen p{font-size:clamp(.9rem,3vw,1.2rem);color:#7c5295;font-weight:700;text-align:center;padding:0 24px;}
#startBtn{
  font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,4vw,1.8rem);
  background:linear-gradient(135deg,#ff6eb4,#e91e8c);color:#fff;
  border:none;border-radius:50px;padding:16px 48px;
  box-shadow:0 6px 0 #b0116e;cursor:pointer;animation:btnPulse 1.5s infinite;
}
@keyframes btnPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}

/* ── PIN OVERLAY ── */
#pinOverlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(30,20,60,.92);backdrop-filter:blur(8px);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
}
#pinOverlay.show{display:flex;}
#pinOverlay h2{
  font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,5vw,2.2rem);
  color:#fff;text-align:center;
}
#pinDots{display:flex;gap:14px;}
.pin-dot{
  width:22px;height:22px;border-radius:50%;
  border:3px solid #ce93d8;background:transparent;
  transition:background .15s;
}
.pin-dot.filled{background:#ce93d8;}
#pinPad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px;}
.pin-key{
  font-family:'Fredoka One',cursive;font-size:1.6rem;
  width:68px;height:68px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);color:#fff;cursor:pointer;
  transition:background .1s;-webkit-tap-highlight-color:transparent;
}
.pin-key:active{background:rgba(255,255,255,.35);}
#pinError{color:#ff8a80;font-family:'Fredoka One',cursive;font-size:1rem;min-height:1.4rem;}
#pinOverlay .hint{color:rgba(255,255,255,.5);font-size:.75rem;text-align:center;}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
//  PIN CONFIG  — change PARENT_PIN to whatever you like
// ═══════════════════════════════════════════════════════
const PARENT_PIN = '1234';

// ═══════════════════════════════════════════════════════
//  WEB AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}

function playTone(freq,type,dur,vol=0.14,delay=0){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type;o.frequency.value=freq;
  const t=audioCtx.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur);
}
function playChime(freqs,spacing=.08){freqs.forEach((f,i)=>playTone(f,'sine',.5,.13,i*spacing));}
function playPop(freq=500){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type='sine';
  o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq*.3,audioCtx.currentTime+.12);
  g.gain.setValueAtTime(.18,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.14);
  o.start();o.stop(audioCtx.currentTime+.14);
}
function playButtonClick(){playTone(523,'triangle',.12,.18);playTone(659,'triangle',.12,.14,.07);}
function playClearWhoosh(){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type='sine';
  o.frequency.setValueAtTime(900,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200,audioCtx.currentTime+.22);
  o.frequency.exponentialRampToValueAtTime(1400,audioCtx.currentTime+.44);
  g.gain.setValueAtTime(.18,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.5);
  o.start();o.stop(audioCtx.currentTime+.5);
}
function playSparkleSound(){playChime([880,1046,1318,1568,2093],.055);}

// Crayon scratch
let scratchNode=null;
function startScratch(){
  if(!audioCtx||scratchNode)return;
  const sr=audioCtx.sampleRate;
  const buf=audioCtx.createBuffer(1,Math.floor(sr*.05),sr);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.032;
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
  const filt=audioCtx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=3200;filt.Q.value=.6;
  const gain=audioCtx.createGain();gain.gain.value=.9;
  src.connect(filt);filt.connect(gain);gain.connect(audioCtx.destination);
  src.start();scratchNode=src;
}
function stopScratch(){if(!scratchNode)return;try{scratchNode.stop();}catch(e){}scratchNode=null;}

// ═══════════════════════════════════════════════════════
//  RICH MUSIC ENGINE
//  Uses AudioContext scheduler (not setTimeout) for tight
//  timing, plus: layered oscillators, reverb, vibrato,
//  walking bass, and a simple kick+hihat pattern.
// ═══════════════════════════════════════════════════════
function midiToHz(m){return 440*Math.pow(2,(m-69)/12);}

// ── Reverb convolver ──────────────────────────────────
let reverbNode = null;
function getReverb(){
  if(reverbNode) return reverbNode;
  if(!audioCtx) return null;
  const len = audioCtx.sampleRate * 1.8;
  const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for(let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
  }
  const conv = audioCtx.createConvolver();
  conv.buffer = buf;
  const wet = audioCtx.createGain(); wet.gain.value = 0.22;
  conv.connect(wet); wet.connect(audioCtx.destination);
  reverbNode = conv;
  return conv;
}

// ── Play one melodic note (rich layered tone) ─────────
function playMelodyNote(hz, startTime, dur, vol=0.18){
  if(!audioCtx||hz<=0) return;
  const rev = getReverb();

  // Layer 1: main sine
  const o1=audioCtx.createOscillator(), g1=audioCtx.createGain();
  o1.type='sine'; o1.frequency.value=hz;
  // Layer 2: soft triangle one octave up (shimmer)
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.type='triangle'; o2.frequency.value=hz*2; g2.gain.value=0.18;
  // Layer 3: very soft sub
  const o3=audioCtx.createOscillator(), g3=audioCtx.createGain();
  o3.type='sine'; o3.frequency.value=hz*0.5; g3.gain.value=0.12;
  // Vibrato LFO
  const lfo=audioCtx.createOscillator(), lfoG=audioCtx.createGain();
  lfo.frequency.value=5.2; lfoG.gain.value=hz*0.012;
  lfo.connect(lfoG);
  lfoG.connect(o1.frequency); lfoG.connect(o2.frequency);

  const master=audioCtx.createGain();
  o1.connect(g1); g1.connect(master);
  o2.connect(g2); g2.connect(master);
  o3.connect(g3); g3.connect(master);
  master.connect(audioCtx.destination);
  if(rev) master.connect(rev);

  // ADSR envelope
  const atk=0.04, dec=0.08, sus=vol*0.75, rel=Math.min(0.3,dur*0.35);
  master.gain.setValueAtTime(0, startTime);
  master.gain.linearRampToValueAtTime(vol, startTime+atk);
  master.gain.linearRampToValueAtTime(sus, startTime+atk+dec);
  master.gain.setValueAtTime(sus, startTime+dur-rel);
  master.gain.exponentialRampToValueAtTime(0.0001, startTime+dur);

  [o1,o2,o3,lfo].forEach(o=>{o.start(startTime);o.stop(startTime+dur+0.05);});
}

// ── Bass note ─────────────────────────────────────────
function playBassNote(hz, startTime, dur){
  if(!audioCtx||hz<=0) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='triangle'; o.frequency.value=hz*0.5;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0,startTime);
  g.gain.linearRampToValueAtTime(0.13,startTime+0.03);
  g.gain.exponentialRampToValueAtTime(0.0001,startTime+dur*0.7);
  o.start(startTime); o.stop(startTime+dur);
}

// ── Kick drum ─────────────────────────────────────────
function playKick(t){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(150,t);
  o.frequency.exponentialRampToValueAtTime(30,t+0.15);
  g.gain.setValueAtTime(0.55,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+0.3);
}

// ── Hi-hat ────────────────────────────────────────────
function playHat(t, vol=0.06){
  if(!audioCtx) return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
  const filt=audioCtx.createBiquadFilter();
  filt.type='highpass'; filt.frequency.value=8000;
  src.buffer=buf;
  src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
  src.start(t); src.stop(t+0.08);
}

// ── SONGS ─────────────────────────────────────────────
// Notes: [midiPitch, durationBeats, bassOverride(optional)]
// Rest = midi 0
const SONGS = [
  {
    title:'Joy in My Heart',
    bpm:114, key:60,
    notes:[
      [64,1],[64,.5],[64,.5],[64,1],[62,.5],[60,.5],
      [62,1],[62,.5],[60,.5],[62,2],
      [64,1],[64,.5],[64,.5],[64,1],[62,.5],[60,.5],
      [60,3],[0,1],
      [67,1],[67,.5],[67,.5],[67,1],[65,.5],[64,.5],
      [65,1],[64,.5],[62,.5],[64,2],
      [64,1],[62,.5],[60,.5],[62,1],[64,.5],[62,.5],
      [60,4],
    ],
    bass:[60,55,57,60, 60,55,57,60],
    beats:[1,1,1,1]
  },
  {
    title:'This Little Light of Mine',
    bpm:110, key:60,
    notes:[
      [64,1],[64,1],[64,.5],[62,.5],[64,1.5],[0,.5],
      [67,1],[67,1],[67,.5],[65,.5],[67,1.5],[0,.5],
      [64,1],[64,.5],[62,.5],[64,1],[67,1],
      [69,2],[0,1],
      [72,1],[72,.5],[71,.5],[72,1],[71,.5],[69,.5],
      [67,1],[65,1],[64,1],[62,1],
      [60,4],
    ],
    bass:[60,55,57,60],
    beats:[1,1,1,1]
  },
  {
    title:'Jesus Loves Me',
    bpm:96, key:60,
    notes:[
      [64,1],[64,.5],[67,.5],[69,1.5],[67,.5],
      [64,1.5],[62,.5],[60,2],

// ── Scheduler ─────────────────────────────────────────
let songIndex   = 0;
let songPlaying = false;
let schedId     = null;   // requestAnimationFrame id
let schedPos    = 0;      // position in notes array
let schedTime   = 0;      // AudioContext time for next note
let schedSong   = null;   // reference to current song object
let beatPos     = 0;      // beat counter for drums/bass
let beatTime    = 0;      // AudioContext time for next beat

const LOOK_AHEAD = 0.12;  // schedule this far ahead (seconds)

function startSongScheduler(idx){
  if(schedId) cancelAnimationFrame(schedId);
  reverbNode = null; // reset reverb for new song
  songIndex  = idx;
  schedSong  = SONGS[idx];
  schedPos   = 0;
  schedTime  = audioCtx.currentTime + 0.1;
  beatPos    = 0;
  beatTime   = audioCtx.currentTime + 0.1;
  songPlaying= true;
  document.getElementById('songTitle').textContent = schedSong.title;
  document.getElementById('musicHud').classList.add('visible');
  schedulerTick();
}

function schedulerTick(){
  if(!songPlaying || !audioCtx) return;
  const beatSec = 60 / schedSong.bpm;

  // ── Schedule melody notes ──
  while(schedTime < audioCtx.currentTime + LOOK_AHEAD){
    if(schedPos >= schedSong.notes.length){
      // Loop: restart
      schedPos = 0;
      beatPos  = 0;
    }
    const [midi, beats] = schedSong.notes[schedPos];
    const dur = beats * beatSec;
    if(midi > 0) playMelodyNote(midiToHz(midi), schedTime, dur * 0.92);
    schedTime += dur;
    schedPos++;
  }

  // ── Schedule drums + bass on a separate beat clock ──
  while(beatTime < audioCtx.currentTime + LOOK_AHEAD){
    const bi = beatPos % 4;
    // kick on beats 1 and 3
    if(bi===0||bi===2) playKick(beatTime);
    // hihat every beat
    playHat(beatTime, bi===0||bi===2 ? 0.05 : 0.08);
    // half-beat hihat
    playHat(beatTime + beatSec*0.5, 0.04);
    // bass note from pattern
    const bassNotes = schedSong.bass || [60,55,57,60];
    const bassHz = midiToHz(bassNotes[bi % bassNotes.length]);
    playBassNote(bassHz, beatTime, beatSec);
    beatTime += beatSec;
    beatPos++;
  }

  schedId = requestAnimationFrame(schedulerTick);
}

function stopSong(){
  songPlaying = false;
  if(schedId){ cancelAnimationFrame(schedId); schedId=null; }
  document.getElementById('musicHud').classList.remove('visible');
}

function nextSong(){
  const wasPlaying = songPlaying;
  stopSong();
  songIndex = (songIndex+1) % SONGS.length;
  if(wasPlaying){
    setTimeout(()=>startSongScheduler(songIndex), 80);
  } else {
    document.getElementById('songTitle').textContent = SONGS[songIndex].title;
  }
}

let isSpeaking=false;
const speakQueue=[];
const dots=document.getElementById('speakingDots');
if(window.speechSynthesis){
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices());
}
function getBestVoice(){
  const voices=window.speechSynthesis.getVoices();
  const prefs=['Samantha','Karen','Moira','Tessa','Fiona',
    'Google UK English Female','Microsoft Aria Online (Natural)',
    'Microsoft Jenny Online (Natural)','Microsoft Sonia Online (Natural)',
    'Microsoft Zira','Google US English'];
  for(const n of prefs){const v=voices.find(v=>v.name.includes(n));if(v)return v;}
  return voices.find(v=>v.lang.startsWith('en')&&/female/i.test(v.name))
      ||voices.find(v=>v.lang.startsWith('en-US'))
      ||voices.find(v=>v.lang.startsWith('en'))||null;
}
function speakText(text){
  return new Promise(res=>{
    if(!window.speechSynthesis){res();return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=.86;u.pitch=1.18;u.volume=1;
    const v=getBestVoice();if(v)u.voice=v;
    u.onend=res;u.onerror=res;
    speechSynthesis.speak(u);
  });
}
async function speakAffirmation(sayText){
  if(isSpeaking){speakQueue.push(sayText);return;}
  isSpeaking=true;dots.classList.add('active');
  try{
    let final=sayText;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:80,
          messages:[{role:'user',content:`You are a warm, joyful narrator speaking to a baby or toddler.
Rephrase this affirmation so it sounds like a loving parent saying it out loud — natural, tender, full of warmth. Under 10 words. Return ONLY the rephrased text.

Affirmation: "${sayText}"`}]
        })
      });
      const data=await res.json();
      const r=data?.content?.[0]?.text?.trim();
      if(r&&r.length>2)final=r;
    }catch(e){}
    await speakText(final);
  }finally{
    isSpeaking=false;dots.classList.remove('active');
    if(speakQueue.length>0)speakAffirmation(speakQueue.shift());
  }
}

let colorIndex=0,drawing=false,erasing=false;
let brushSize=28,lastX=0,lastY=0;
let strokeCount=0,affirmTimer=null,lastPopTime=0;

function currentColor(){return erasing?'#fffdf8':colors[colorIndex%colors.length];}
function getPos(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
function startDraw(e){
  e.preventDefault();drawing=true;
  const p=getPos(e);lastX=p.x;lastY=p.y;
  ctx.beginPath();ctx.arc(lastX,lastY,(erasing?brushSize*1.5:brushSize)/2,0,Math.PI*2);
  ctx.fillStyle=currentColor();ctx.fill();
  if(!erasing){startScratch();spawnSparkles(p.x,p.y,currentColor());}
}
function doDraw(e){
  if(!drawing)return;e.preventDefault();
  const p=getPos(e);
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);
  ctx.strokeStyle=currentColor();
  ctx.lineWidth=erasing?brushSize*1.5:brushSize;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
  lastX=p.x;lastY=p.y;
  if(!erasing){
    strokeCount++;
    if(strokeCount%8===0)colorIndex++;
    const now=Date.now();
    if(now-lastPopTime>150){
      lastPopTime=now;
      spawnSparkles(p.x,p.y,currentColor());
      playPop(280+Math.random()*420);
    }
  }
}
function endDraw(e){
  if(!drawing)return;drawing=false;stopScratch();
  if(!erasing){playSparkleSound();showAffirmation();}
}
canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',doDraw);
canvas.addEventListener('mouseup',endDraw);
canvas.addEventListener('mouseleave',endDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});
canvas.addEventListener('touchmove',doDraw,{passive:false});
canvas.addEventListener('touchend',endDraw);

function spawnSparkles(cx,cy,color){
  const rect=canvas.getBoundingClientRect();
  const ax=cx+rect.left,ay=cy+rect.top;
  for(let i=0;i<4;i++){
    const s=document.createElement('div');s.className='sparkle';
    const sz=5+Math.random()*10;
    s.style.cssText=`width:${sz}px;height:${sz}px;background:${color};left:${ax+(Math.random()-.5)*44}px;top:${ay+(Math.random()-.5)*44}px;`;
    document.body.appendChild(s);setTimeout(()=>s.remove(),850);
  }
}

const affDiv=document.getElementById('affirmation');
function showAffirmation(){
  if(affirmTimer)return;
  const aff=affirmations[Math.floor(Math.random()*affirmations.length)];
  affDiv.textContent=aff.show;affDiv.classList.add('show');
  speakAffirmation(aff.say);
  affirmTimer=setTimeout(()=>{affDiv.classList.remove('show');affirmTimer=null;},3200);
}

function pop(id){
  const el=document.getElementById(id);
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),300);
}

//  LOCK / FULLSCREEN + PIN
// ═══════════════════════════════════════════════════════
let locked=false;
let pinEntry='';

function enterFullscreen(){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}
function exitFullscreen(){
  if(document.exitFullscreen)document.exitFullscreen();
  else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
}

document.getElementById('lockBtn').addEventListener('click',()=>{
  ensureAudio();playButtonClick();
  if(!locked){
    locked=true;
    enterFullscreen();
    document.getElementById('lockBtn').innerHTML='<span class="btn-icon">🔓</span>Unlock';
    history.pushState(null,null,location.href);
  } else {
    showPinOverlay();
  }
});

// Trap back-button while locked
window.addEventListener('popstate',()=>{
  if(locked) history.pushState(null,null,location.href);
});

function showPinOverlay(){
  pinEntry='';updatePinDots();
  document.getElementById('pinError').textContent='';
  document.getElementById('pinOverlay').classList.add('show');
}
function hidePinOverlay(){
  document.getElementById('pinOverlay').classList.remove('show');
}
function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);
  }
}

document.querySelectorAll('.pin-key').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const n=btn.dataset.n;
    if(n==='cancel'){hidePinOverlay();return;}
    if(n==='back'){pinEntry=pinEntry.slice(0,-1);updatePinDots();return;}
    if(pinEntry.length>=4)return;
    pinEntry+=n;updatePinDots();
    if(pinEntry.length===4){
      if(pinEntry===PARENT_PIN){
        hidePinOverlay();
        locked=false;
        exitFullscreen();
        document.getElementById('lockBtn').innerHTML='<span class="btn-icon">🔒</span>Lock';
        playChime([523,659,784],0.08);
      }else{
        document.getElementById('pinError').textContent='Wrong PIN, try again!';
        pinEntry='';updatePinDots();
        playTone(200,'sawtooth',.3,.15);
      }
    }
  });
});
