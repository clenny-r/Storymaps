<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Family Budget — TWC Ministries</title>
  <link rel="icon" type="image/x-icon" href="https://www.twcministries.net/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0e0d1f;--bg2:#13122b;--bg3:#1a1836;--bg4:#211f42;
      --purple:#6b3db5;--crimson:#c0213c;--gold:#e8b84b;
      --green:#22c55e;--green-dim:rgba(34,197,94,.15);
      --red:#f43f5e;--red-dim:rgba(244,63,94,.15);
      --teal:#2dd4bf;--teal-dim:rgba(45,212,191,.12);
      --border:rgba(255,255,255,.08);
      --text-muted:rgba(255,255,255,.45);
      --font-d:'Cormorant Garamond',Georgia,serif;
      --font-b:'DM Sans',sans-serif;
      --grad:linear-gradient(135deg,#1e2a6e,#6b3db5,#c0213c);
      --r:12px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
    button{cursor:pointer;font-family:inherit;border:none;outline:none}
    input,select,textarea{font-family:inherit;outline:none}

    /* ── SCREENS ─────────────────────────────────────────────────── */
    .screen{display:none;min-height:100vh;flex-direction:column}
    .screen.active{display:flex}

    /* ═══════════════════════════════════════════════════════════
       LOGIN SCREEN
    ═══════════════════════════════════════════════════════════ */
    #loginScreen{
      align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 0%,rgba(107,61,181,.25) 0%,transparent 60%),var(--bg);
      padding:2rem;
    }
    .login-logo{font-family:var(--font-d);font-size:3.2rem;font-weight:700;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-align:center;line-height:1;margin-bottom:.3rem}
    .login-sub{font-size:.72rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
      color:var(--text-muted);text-align:center;margin-bottom:2.5rem}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      padding:2.5rem 2rem;width:100%;max-width:380px;display:flex;flex-direction:column;gap:1.25rem}
    .login-card h2{font-family:var(--font-d);font-size:1.6rem;font-weight:600;text-align:center}
    .field{display:flex;flex-direction:column;gap:.5rem}
    .field label{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
    .field input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
      padding:.85rem 1rem;color:#fff;font-size:.95rem;transition:border-color .2s}
    .field input:focus{border-color:var(--purple)}
    .btn-primary{padding:.9rem;border-radius:10px;font-size:.85rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;background:var(--grad);color:#fff;transition:opacity .2s,transform .2s}
    .btn-primary:hover{opacity:.85;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.45;transform:none;cursor:not-allowed}
    .login-err{font-size:.82rem;color:var(--red);text-align:center;min-height:1.2em}

    /* ═══════════════════════════════════════════════════════════
       SHARED HEADER
    ═══════════════════════════════════════════════════════════ */
    .app-header{
      background:rgba(13,12,28,.92);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:.9rem 1.25rem;display:flex;align-items:center;gap:.75rem;
      position:sticky;top:0;z-index:100;flex-shrink:0;
    }
    .header-brand{font-family:var(--font-d);font-size:1.4rem;font-weight:700;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-sub{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
      color:var(--text-muted);display:block}
    .header-title-wrap{flex:1;min-width:0}
    .header-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .icon-btn{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);
      transition:background .2s,color .2s;flex-shrink:0}
    .icon-btn:hover{background:var(--bg4);color:#fff}
    .icon-btn svg{width:16px;height:16px}
    .admin-btn{background:rgba(232,184,75,.12);border-color:rgba(232,184,75,.25);color:var(--gold)}
    .admin-btn:hover{background:rgba(232,184,75,.22)}
    .back-btn{background:var(--bg3);border-color:var(--border);color:rgba(255,255,255,.7)}

    /* ═══════════════════════════════════════════════════════════
       BUDGET LIST SCREEN
    ═══════════════════════════════════════════════════════════ */
    #budgetListScreen{background:var(--bg)}

    .budgets-body{flex:1;overflow-y:auto;padding:1rem 1rem 6rem}

    /* create budget inline form */
    .create-budget-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      padding:1.25rem 1.25rem 1.25rem;margin-bottom:1.25rem;
    }
    .create-budget-card h3{font-family:var(--font-d);font-size:1.25rem;font-weight:600;margin-bottom:.9rem}
    .create-row{display:flex;gap:.65rem}
    .create-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
      padding:.75rem 1rem;color:#fff;font-size:.9rem;transition:border-color .2s}
    .create-row input:focus{border-color:var(--purple)}
    .btn-create{padding:.75rem 1.2rem;border-radius:8px;background:var(--grad);color:#fff;
      font-size:.8rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      white-space:nowrap;transition:opacity .2s}
    .btn-create:hover{opacity:.88}

    /* budget card grid */
    .budget-grid{display:flex;flex-direction:column;gap:.75rem}

    .budget-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;
      position:relative;
    }
    .budget-card:hover{border-color:rgba(107,61,181,.4);transform:translateY(-2px);
      box-shadow:0 16px 48px rgba(0,0,0,.4)}
    .budget-card-accent{height:3px;width:100%}
    .budget-card-body{padding:1rem 1.1rem .9rem}
    .budget-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:.65rem}
    .budget-card-name{font-family:var(--font-d);font-size:1.35rem;font-weight:700;line-height:1.15;word-break:break-word}
    .budget-card-meta{font-size:.7rem;color:var(--text-muted);margin-top:.2rem}
    .budget-card-actions{display:flex;gap:.4rem;flex-shrink:0}
    .card-act-btn{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);
      transition:all .18s;flex-shrink:0}
    .card-act-btn:hover{background:var(--bg4);color:#fff;border-color:rgba(255,255,255,.2)}
    .card-act-btn.del:hover{background:var(--red-dim);border-color:rgba(244,63,94,.3);color:var(--red)}
    .card-act-btn svg{width:13px;height:13px}

    /* mini summary inside budget card */
    .budget-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
    .bstat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;text-align:center}
    .bstat-label{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.45;margin-bottom:.2rem}
    .bstat-val{font-family:var(--font-d);font-size:1rem;font-weight:700;line-height:1}
    .bstat-val.green{color:var(--green)}
    .bstat-val.red{color:var(--red)}
    .bstat-val.pos{color:var(--green)}
    .bstat-val.neg{color:var(--red)}

    .budget-empty{text-align:center;padding:3rem 2rem;opacity:.45}
    .budget-empty p{font-size:.9rem;margin-top:.5rem}

    /* inline rename input */
    .budget-card-name.editing{background:var(--bg4);border:1px solid var(--purple);border-radius:6px;
      padding:.15rem .5rem;color:#fff;font-family:var(--font-d);font-size:1.35rem;font-weight:700;
      width:100%;outline:none}

    /* ═══════════════════════════════════════════════════════════
       ENTRIES SCREEN (app screen)
    ═══════════════════════════════════════════════════════════ */
    #appScreen{background:var(--bg)}

    /* ── SUMMARY BAR ─────────────────────────────────────────── */
    .summary-bar{
      display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;
      padding:.75rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);
    }
    .sum-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:.65rem .85rem;text-align:center}
    .sum-label{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.5;margin-bottom:.25rem}
    .sum-value{font-family:var(--font-d);font-size:1.2rem;font-weight:700;line-height:1}
    .sum-income .sum-value{color:var(--green)}
    .sum-expense .sum-value{color:var(--red)}
    .sum-paid .sum-value{color:var(--teal)}
    .sum-balance.positive .sum-value{color:var(--green)}
    .sum-balance.negative .sum-value{color:var(--red)}

    /* ── TOOLBAR ─────────────────────────────────────────────── */
    .toolbar{
      display:flex;align-items:center;gap:.6rem;
      padding:.6rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);
      overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;
    }
    .toolbar::-webkit-scrollbar{display:none}
    .filter-chip{
      flex-shrink:0;padding:.38rem .9rem;border-radius:20px;font-size:.72rem;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;background:var(--bg3);border:1px solid var(--border);
      color:rgba(255,255,255,.6);transition:all .2s;white-space:nowrap
    }
    .filter-chip.active{color:#fff;border-color:var(--purple);background:rgba(107,61,181,.25)}
    .filter-chip.income.active{border-color:var(--green);background:var(--green-dim);color:var(--green)}
    .filter-chip.expense.active{border-color:var(--red);background:var(--red-dim);color:var(--red)}
    .add-btn{
      flex-shrink:0;display:flex;align-items:center;gap:.45rem;padding:.45rem 1rem;
      border-radius:8px;background:var(--grad);color:#fff;font-size:.78rem;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;transition:opacity .2s,transform .2s
    }
    .add-btn:hover{opacity:.88;transform:translateY(-1px)}
    .add-btn svg{width:14px;height:14px}
    .reorder-btn{
      flex-shrink:0;display:flex;align-items:center;gap:.4rem;padding:.45rem .85rem;
      border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:rgba(255,255,255,.6);
      font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      white-space:nowrap;transition:all .2s
    }
    .reorder-btn:hover{background:var(--bg4);color:#fff}
    .reorder-btn.active{background:rgba(107,61,181,.25);border-color:rgba(107,61,181,.5);color:#fff}
    .reorder-btn svg{width:14px;height:14px}
    .toolbar-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 .1rem}

    /* ── REORDER MODE ─────────────────────────────────────────── */
    .entry-item.dragging{opacity:.4;border-style:dashed}
    .entry-item.drag-over{border-color:var(--purple);box-shadow:0 0 0 2px rgba(107,61,181,.4)}
    .drag-handle{
      display:none;align-items:center;justify-content:center;padding:.5rem .55rem;
      cursor:grab;color:rgba(255,255,255,.3);border-right:1px solid var(--border);flex-shrink:0;touch-action:none;
    }
    .drag-handle:active{cursor:grabbing}
    .drag-handle svg{width:16px;height:16px}
    body.reorder-mode .drag-handle{display:flex}
    body.reorder-mode .entry-actions{display:none}
    body.reorder-mode .entry-item{
      cursor:grab;
      user-select:none;-webkit-user-select:none;
      touch-action:none;
    }
    body.reorder-mode .entry-item.dragging{cursor:grabbing;opacity:.45;border-style:dashed}

    /* ── ENTRIES LIST ─────────────────────────────────────────── */
    .entries-wrap{flex:1;overflow-y:auto;padding:.75rem 1rem 7rem}
    .entry-item{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      margin-bottom:.6rem;overflow:hidden;transition:border-color .2s,opacity .2s;
      display:flex;align-items:stretch;
    }
    .entry-item.income-row{border-left:3px solid var(--green)}
    .entry-item.expense-row{border-left:3px solid var(--red)}
    .entry-item.paid-row{opacity:.65}
    .entry-item.paid-row .entry-name{text-decoration:line-through;color:var(--text-muted)}
    .entry-item.paid-row .entry-amount{text-decoration:line-through}
    .entry-main{flex:1;padding:.8rem 1rem;display:flex;flex-direction:column;gap:.3rem;min-width:0}
    .entry-top{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
    .entry-name{font-size:.93rem;font-weight:600;flex:1;min-width:0;word-break:break-word}
    .entry-amount{font-family:var(--font-d);font-size:1.15rem;font-weight:700;white-space:nowrap}
    .entry-item.income-row .entry-amount{color:var(--green)}
    .entry-item.expense-row .entry-amount{color:var(--red)}
    .entry-meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .entry-date{font-size:.72rem;color:var(--text-muted)}
    .entry-by{font-size:.72rem;color:var(--text-muted)}
    .entry-type-badge{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      padding:.2rem .55rem;border-radius:20px}
    .badge-income{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.25)}
    .badge-expense{background:var(--red-dim);color:var(--red);border:1px solid rgba(244,63,94,.25)}
    .badge-paid{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(45,212,191,.2)}
    .running-bal{font-size:.72rem;font-weight:700;margin-left:auto;white-space:nowrap}
    .running-bal.pos{color:var(--green)}
    .running-bal.neg{color:var(--red)}
    .entry-actions{display:flex;flex-direction:column;justify-content:center;gap:.3rem;padding:.5rem .65rem;border-left:1px solid var(--border)}
    .entry-act-btn{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .18s;font-size:.75rem}
    .entry-act-btn:hover{background:var(--bg4);color:#fff;border-color:rgba(255,255,255,.2)}
    .entry-act-btn.pay-btn.paid{background:var(--teal-dim);border-color:rgba(45,212,191,.3);color:var(--teal)}
    .entry-act-btn.del-btn:hover{background:var(--red-dim);border-color:rgba(244,63,94,.3);color:var(--red)}
    .empty-state{text-align:center;padding:4rem 2rem;opacity:.5}
    .empty-state p{font-size:.9rem;margin-top:.5rem}

    /* ── ADD / EDIT PANEL ─────────────────────────────────────── */
    .panel-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
      z-index:200;display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s
    }
    .panel-overlay.open{opacity:1;pointer-events:auto}
    .panel{
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;
      width:100%;max-width:560px;padding:1.5rem 1.25rem 2rem;
      transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)
    }
    .panel-overlay.open .panel{transform:translateY(0)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
    .panel-title{font-family:var(--font-d);font-size:1.4rem;font-weight:600}
    .close-btn{width:32px;height:32px;border-radius:8px;background:var(--bg4);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6)}
    .close-btn:hover{color:#fff}
    .panel-fields{display:flex;flex-direction:column;gap:.9rem}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .type-btn{padding:.7rem;border-radius:8px;font-size:.8rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;background:var(--bg3);border:1px solid var(--border);
      color:rgba(255,255,255,.55);transition:all .2s}
    .type-btn.income.active{background:var(--green-dim);border-color:rgba(34,197,94,.4);color:var(--green)}
    .type-btn.expense.active{background:var(--red-dim);border-color:rgba(244,63,94,.4);color:var(--red)}
    .who-row{display:flex;flex-wrap:wrap;gap:.5rem}
    .who-btn{padding:.42rem .9rem;border-radius:20px;font-size:.77rem;font-weight:600;
      background:var(--bg3);border:1px solid var(--border);color:rgba(255,255,255,.6);transition:all .2s}
    .who-btn.active{background:rgba(107,61,181,.3);border-color:rgba(107,61,181,.6);color:#fff}
    .panel-actions{display:flex;gap:.75rem;margin-top:1.25rem}
    .btn-save{flex:1;padding:.9rem;border-radius:10px;font-size:.85rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;background:var(--grad);color:#fff;transition:opacity .2s}
    .btn-save:hover{opacity:.88}
    .btn-cancel{padding:.9rem 1.4rem;border-radius:10px;font-size:.85rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;background:var(--bg3);border:1px solid var(--border);color:rgba(255,255,255,.7)}
    .btn-cancel:hover{background:var(--bg4)}

    /* ── ADMIN PANEL ──────────────────────────────────────────── */
    .admin-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
      z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;
      opacity:0;pointer-events:none;transition:opacity .25s
    }
    .admin-overlay.open{opacity:1;pointer-events:auto}
    .admin-panel{
      background:var(--bg2);border:1px solid rgba(232,184,75,.2);border-radius:var(--r);
      width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:1.5rem;
      transform:scale(.95);transition:transform .25s
    }
    .admin-overlay.open .admin-panel{transform:scale(1)}
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .admin-title{font-family:var(--font-d);font-size:1.6rem;font-weight:700;color:var(--gold)}
    .admin-section{margin-bottom:1.5rem}
    .admin-section h3{font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
      color:rgba(232,184,75,.7);margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:1px solid rgba(232,184,75,.15)}
    .family-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
    .family-info{flex:1;min-width:0}
    .family-name{font-weight:600;font-size:.92rem}
    .family-meta{font-size:.73rem;color:var(--text-muted);margin-top:.15rem}
    .family-pass{font-size:.7rem;font-family:monospace;color:rgba(232,184,75,.7);margin-top:.15rem}
    .del-family-btn{padding:.4rem .75rem;border-radius:7px;font-size:.72rem;font-weight:700;
      background:var(--red-dim);border:1px solid rgba(244,63,94,.25);color:var(--red);transition:all .2s}
    .del-family-btn:hover{background:rgba(244,63,94,.25)}
    .admin-form{display:flex;flex-direction:column;gap:.8rem}
    .admin-form .field input{background:var(--bg4)}
    .btn-gold{padding:.85rem;border-radius:10px;font-size:.82rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;background:linear-gradient(90deg,#d4a017,#e8b84b);color:#0e0d1f;transition:opacity .2s}
    .btn-gold:hover{opacity:.88}
    .admin-msg{font-size:.82rem;text-align:center;min-height:1.2em;color:var(--teal)}

    /* ── TOAST ────────────────────────────────────────────────── */
    #toast{
      position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(40px);
      background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:.7rem 1.4rem;font-size:.85rem;font-weight:600;z-index:999;
      opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── LOADING ──────────────────────────────────────────────── */
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.15);
      border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-overlay{
      position:fixed;inset:0;background:rgba(14,13,31,.7);backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;z-index:500;
      opacity:0;pointer-events:none;transition:opacity .2s
    }
    .loading-overlay.show{opacity:1;pointer-events:auto}

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media(max-width:480px){
      .summary-bar{grid-template-columns:repeat(2,1fr)}
      .sum-value{font-size:1rem}
      .row2{grid-template-columns:1fr}
      .budget-stats{grid-template-columns:repeat(3,1fr)}
    }
    @media(min-width:768px){
      .panel-overlay{align-items:center}
      .panel{border-radius:var(--r);transform:scale(.94);max-height:90vh;overflow-y:auto}
      .panel-overlay.open .panel{transform:scale(1)}
      .budget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
      .budgets-body{max-width:860px;margin:0 auto;width:100%}
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-logo">Budget</div>
  <div class="login-sub">TWC Family App</div>
  <div class="login-card">
    <h2>Sign In</h2>
    <div class="field">
      <label>Family Password</label>
      <input type="password" id="loginPass" placeholder="Enter your family password" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="loginBtn">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     BUDGET LIST SCREEN
═══════════════════════════════════════════════════════════ -->
<div id="budgetListScreen" class="screen">

  <div class="app-header">
    <div class="header-title-wrap">
      <div class="header-brand" id="blHeaderBrand">Family Budget</div>
      <span class="header-sub" id="blHeaderSub"></span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="blRefreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="icon-btn admin-btn" id="blAdminBtn" title="Admin" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
      </button>
      <button class="icon-btn" id="blLogoutBtn" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="budgets-body">

    <!-- Create budget -->
    <div class="create-budget-card">
      <h3>New Budget</h3>
      <div class="create-row">
        <input type="text" id="newBudgetName" placeholder="e.g. September Budget, Vacation, Christmas…">
        <button class="btn-create" id="createBudgetBtn">+ Create</button>
      </div>
    </div>

    <!-- Budget list -->
    <div class="budget-grid" id="budgetGrid">
      <div class="budget-empty" id="budgetEmpty">
        <div style="font-size:2.5rem">📂</div>
        <p>No budgets yet. Create one above to get started.</p>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     ENTRIES SCREEN
═══════════════════════════════════════════════════════════ -->
<div id="appScreen" class="screen">

  <div class="app-header">
    <button class="icon-btn back-btn" id="backBtn" title="Back to budgets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-title-wrap">
      <div class="header-brand" id="headerBrand">Budget</div>
      <span class="header-sub" id="headerSub"></span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="icon-btn admin-btn" id="adminBtn" title="Admin" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
      </button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="sum-card sum-income"><div class="sum-label">Income</div><div class="sum-value" id="sumIncome">$0</div></div>
    <div class="sum-card sum-expense"><div class="sum-label">Expenses</div><div class="sum-value" id="sumExpense">$0</div></div>
    <div class="sum-card sum-paid"><div class="sum-label">Paid</div><div class="sum-value" id="sumPaid">$0</div></div>
    <div class="sum-card sum-balance" id="sumBalanceCard"><div class="sum-label">Balance</div><div class="sum-value" id="sumBalance">$0</div></div>
  </div>

  <div class="toolbar">
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add
    </button>
    <button class="reorder-btn" id="reorderBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Reorder
    </button>
    <div class="toolbar-divider"></div>
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip income" data-filter="income">Income</button>
    <button class="filter-chip expense" data-filter="expense">Expenses</button>
    <button class="filter-chip" data-filter="unpaid">Unpaid</button>
    <button class="filter-chip" data-filter="paid">Paid</button>
  </div>

  <div class="entries-wrap" id="entriesList">
    <div class="empty-state" id="emptyState">
      <div style="font-size:2.5rem">💰</div>
      <p>No entries yet. Tap + Add to get started.</p>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════
     ADD / EDIT ENTRY PANEL
═══════════════════════════════════════════════════════════ -->
<div class="panel-overlay" id="entryPanel">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">Add Entry</div>
      <button class="close-btn" id="closePanelBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

    <div class="panel-fields">

        <label>Type</label>

          <button class="type-btn expense" id="typeExpense">⬇ Expense</button>

      <div class="row2">
        <div class="field"><label>Description</label><input type="text" id="entryName" placeholder="e.g. Groceries"></div>
        <div class="field"><label>Amount ($)</label><input type="number" id="entryAmount" placeholder="0.00" min="0" step="0.01"></div>
      </div>

</div>

<!-- ═══════════════════════════════════════════════════════════
     ADMIN PANEL
═══════════════════════════════════════════════════════════ -->
<div class="admin-overlay" id="adminPanel">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">⚙ Admin</div>
      <button class="close-btn" id="closeAdminBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="admin-section">
      <h3>Families</h3>
      <div id="familyList"><div class="spinner"></div></div>
    </div>
    <div class="admin-section">
      <h3>Register New Family</h3>
      <div class="admin-form">
        <div class="field"><label>Family Name</label><input type="text" id="newFamName" placeholder="e.g. Smith Family"></div>
        <div class="field"><label>Password</label><input type="text" id="newFamPass" placeholder="e.g. smith 2026"></div>
        <div class="field"><label>Members (comma-separated)</label><input type="text" id="newFamMembers" placeholder="e.g. John, Jane"></div>
        <button class="btn-gold" id="createFamBtn">Create Family</button>
        <div class="admin-msg" id="adminMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const WORKER = 'https://twc-family-budget.kd7bgn7q2z.workers.dev';

  // ── State ──────────────────────────────────────────────────────────────────
  let token           = '';
  let roomName        = '';
  let members         = [];
  let isAdmin         = false;
  let allBudgets      = [];    // [{id, name, income, expense, balance, entryCount}]
  let allEntries      = [];
  let currentBudgetId   = null;
  let currentBudgetName = '';
  let currentFilter   = 'all';
  let editingId       = null;
  let panelType       = 'expense';
  let panelPaid       = false;
  let panelWho        = '';
  let reorderMode     = false;
  let dragSrcId       = null;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmt(n) {
    const abs = Math.abs(n);
    const s = abs >= 1000
      ? abs.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})
      : abs.toFixed(2);
    return (n < 0 ? '-' : '') + '$' + s;
  }
  function showToast(msg, ms = 2200) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }
  function loading(on) {
    document.getElementById('loadingOverlay').classList.toggle('show', on);
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(WORKER + path, opts);
    return res.json();
  }

  // ── Screens ────────────────────────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── LOGIN ──────────────────────────────────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const pass = document.getElementById('loginPass').value.trim();
    if (!pass) return;
    loading(true);
    document.getElementById('loginErr').textContent = '';
    token = pass;
    try {
      const data = await api('GET', '/api/budgets');
      if (data.error) {
        document.getElementById('loginErr').textContent = 'Invalid password. Try again.';
        token = '';
        loading(false);
        return;
      }
      roomName   = data.name;
      members    = data.members || [];
      isAdmin    = data.isAdmin || false;
      allBudgets = data.budgets || [];
      initBudgetList();
      showScreen('budgetListScreen');
      loading(false);
    } catch (e) {
      document.getElementById('loginErr').textContent = 'Network error. Try again.';
      token = '';
      loading(false);
    }
  }

  // ── BUDGET LIST SCREEN ────────────────────────────────────────────────────
  function initBudgetList() {
    document.getElementById('blHeaderBrand').textContent = roomName || 'Family Budget';
    document.getElementById('blHeaderSub').textContent   = isAdmin ? '★ Admin' : '';
    document.getElementById('blAdminBtn').style.display  = isAdmin ? 'flex' : 'none';
    renderBudgetList();
    buildWhoButtons();
  }

  function renderBudgetList() {
    const grid  = document.getElementById('budgetGrid');
    const empty = document.getElementById('budgetEmpty');
    grid.querySelectorAll('.budget-card').forEach(el => el.remove());

    if (allBudgets.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    // Accent colours — cycle through a palette
    const accents = [
      'linear-gradient(90deg,#1e2a6e,#6b3db5)',
      'linear-gradient(90deg,#6b3db5,#c0213c)',
      'linear-gradient(90deg,#0d6b4f,#2dd4bf)',
      'linear-gradient(90deg,#b45309,#e8b84b)',
      'linear-gradient(90deg,#1e4a6e,#2dd4bf)',
      'linear-gradient(90deg,#6b2a6e,#c0213c)',
    ];

    allBudgets.forEach((b, i) => {
      const accent = accents[i % accents.length];
      const balClass = b.balance >= 0 ? 'pos' : 'neg';
      const card = document.createElement('div');
      card.className = 'budget-card';
      card.dataset.id = b.id;
      card.innerHTML = `
        <div class="budget-card-accent" style="background:${accent}"></div>
        <div class="budget-card-body">
          <div class="budget-card-top">
            <div>
              <div class="budget-card-name" id="bname_${b.id}">${escHtml(b.name)}</div>
              <div class="budget-card-meta">${b.entryCount} item${b.entryCount !== 1 ? 's' : ''}</div>
            </div>
            <div class="budget-card-actions">
              <button class="card-act-btn rename-btn" title="Rename">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="card-act-btn del" title="Delete budget">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
              </button>
            </div>
          </div>
          <div class="budget-stats">
            <div class="bstat"><div class="bstat-label">Income</div><div class="bstat-val green">${fmt(b.income)}</div></div>
            <div class="bstat"><div class="bstat-label">Expenses</div><div class="bstat-val red">${fmt(b.expense)}</div></div>
            <div class="bstat"><div class="bstat-label">Balance</div><div class="bstat-val ${balClass}">${fmt(b.balance)}</div></div>
          </div>
        </div>
      `;

      // Click card body (not buttons) to open
      card.querySelector('.budget-card-body').addEventListener('click', e => {
        if (e.target.closest('.card-act-btn')) return;
        openBudget(b.id, b.name);
      });
      card.querySelector('.budget-card-accent').addEventListener('click', () => openBudget(b.id, b.name));

      card.querySelector('.rename-btn').addEventListener('click', e => {
        e.stopPropagation();
        startRename(b.id, b.name, card);
      });
      card.querySelector('.del').addEventListener('click', e => {
        e.stopPropagation();
        deleteBudget(b.id, b.name);
      });

      grid.appendChild(card);
    });
  }

  // Create budget
  document.getElementById('createBudgetBtn').addEventListener('click', createBudget);
  document.getElementById('newBudgetName').addEventListener('keydown', e => { if (e.key === 'Enter') createBudget(); });

  async function createBudget() {
    const name = document.getElementById('newBudgetName').value.trim();
    if (!name) return showToast('⚠ Enter a budget name');
    loading(true);
    try {
      const res = await api('POST', '/api/budgets', { name });
      if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
      document.getElementById('newBudgetName').value = '';
      // Reload budget list
      const data = await api('GET', '/api/budgets');
      if (!data.error) { allBudgets = data.budgets || []; renderBudgetList(); }
      showToast('✓ Budget created');
    } catch (e) {
      showToast('Network error');
    }
    loading(false);
  }

  async function deleteBudget(id, name) {
    if (!confirm(`Delete "${name}" and all its entries? This cannot be undone.`)) return;
    loading(true);
    try {
      const res = await api('DELETE', `/api/budgets/${id}`);
      if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
      allBudgets = allBudgets.filter(b => b.id !== id);
      renderBudgetList();
      showToast('Deleted');
    } catch (e) {
      showToast('Network error');
    }
    loading(false);
  }

  // Inline rename: replace the name div with an input
  function startRename(id, currentName, card) {
    const nameEl = card.querySelector('.budget-card-name');
    const input  = document.createElement('input');
    input.className = 'budget-card-name editing';
    input.value = currentName;
    nameEl.replaceWith(input);
    input.focus();
    input.select();

    async function commitRename() {
      const newName = input.value.trim();
      if (!newName || newName === currentName) { renderBudgetList(); return; }
      loading(true);
      try {
        const res = await api('PUT', `/api/budgets/${id}`, { name: newName });
        if (res.error) { showToast('⚠ ' + res.error); }
        else {
          const b = allBudgets.find(b => b.id === id);
          if (b) b.name = newName;
          showToast('✓ Renamed');
        }
      } catch(e) { showToast('Network error'); }
      renderBudgetList();
      loading(false);
    }

    input.addEventListener('blur', commitRename);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { renderBudgetList(); }
    });
  }

  // Budget list refresh
  document.getElementById('blRefreshBtn').addEventListener('click', async () => {
    loading(true);
    try {
      const data = await api('GET', '/api/budgets');
      if (!data.error) { allBudgets = data.budgets || []; renderBudgetList(); }
    } catch(e) {}
    loading(false);
  });

  // Budget list logout
  document.getElementById('blLogoutBtn').addEventListener('click', () => {
    token = ''; roomName = ''; members = []; isAdmin = false; allBudgets = [];
    document.getElementById('loginPass').value = '';
    document.getElementById('loginErr').textContent = '';
    showScreen('loginScreen');
  });

  // Budget list admin button
  document.getElementById('blAdminBtn').addEventListener('click', openAdmin);

  // ── OPEN BUDGET (go to entries screen) ────────────────────────────────────
  async function openBudget(id, name) {
    loading(true);
    currentBudgetId   = id;
    currentBudgetName = name;
    try {
      const data = await api('GET', `/api/entries/${id}`);
      if (data.error) { showToast('⚠ ' + data.error); loading(false); return; }
      allEntries = data.entries || [];
      document.getElementById('headerBrand').textContent = data.budgetName || name;
      document.getElementById('headerSub').textContent   = roomName;
      document.getElementById('adminBtn').style.display  = isAdmin ? 'flex' : 'none';
      currentFilter = 'all';
      document.querySelectorAll('.filter-chip[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
      if (reorderMode) toggleReorderMode();
      renderEntries();
      showScreen('appScreen');
    } catch (e) {
      showToast('Network error');
    }
    loading(false);
  }

  // Back button
  document.getElementById('backBtn').addEventListener('click', async () => {
    showScreen('budgetListScreen');
    // Refresh budget totals
    loading(true);
    try {
      const data = await api('GET', '/api/budgets');
      if (!data.error) { allBudgets = data.budgets || []; renderBudgetList(); }
    } catch(e) {}
    loading(false);
  });

  // Refresh entries
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    if (!currentBudgetId) return;
    loading(true);
    try {
      const data = await api('GET', `/api/entries/${currentBudgetId}`);
      if (!data.error) { allEntries = data.entries || []; renderEntries(); }
    } catch(e) {}
    loading(false);
  });

  // Admin button (entries screen)
  document.getElementById('adminBtn').addEventListener('click', openAdmin);

  // ── FILTERS ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-chip[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderEntries();
    });
  });

  // ── RENDER ENTRIES ─────────────────────────────────────────────────────────
  function renderEntries() {
    const sorted = [...allEntries].sort((a, b) => {
      const ao = a.order ?? 0;
      const bo = b.order ?? 0;
      if (ao !== bo) return ao - bo;
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return 0;
    });
    let runBal = 0;
    const withBal = sorted.map(e => {
      runBal += e.type === 'income' ? e.amount : -e.amount;
      return { ...e, runBal };
    });

    // Summary
    let totalIncome = 0, totalExpense = 0, totalPaid = 0;
    allEntries.forEach(e => {
      if (e.type === 'income') totalIncome += e.amount;
      else totalExpense += e.amount;
      if (e.paid) totalPaid += e.amount;
    });
    const balance = totalIncome - totalExpense;
    document.getElementById('sumIncome').textContent  = fmt(totalIncome);
    document.getElementById('sumExpense').textContent = fmt(totalExpense);
    document.getElementById('sumPaid').textContent    = fmt(totalPaid);
    document.getElementById('sumBalance').textContent = fmt(balance);
    const bc = document.getElementById('sumBalanceCard');
    bc.classList.toggle('positive', balance >= 0);
    bc.classList.toggle('negative', balance < 0);

    // Filter
    let filtered = withBal;
    if (currentFilter === 'income')  filtered = withBal.filter(e => e.type === 'income');
    if (currentFilter === 'expense') filtered = withBal.filter(e => e.type === 'expense');
    if (currentFilter === 'paid')    filtered = withBal.filter(e => e.paid);
    if (currentFilter === 'unpaid')  filtered = withBal.filter(e => !e.paid);

    const list  = document.getElementById('entriesList');
    const empty = document.getElementById('emptyState');
    list.querySelectorAll('.entry-item').forEach(el => el.remove());

    if (filtered.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    const display = [...filtered]; // oldest first → new entries appear at bottom
    display.forEach(entry => {
      const el = document.createElement('div');
      el.className = `entry-item ${entry.type}-row${entry.paid ? ' paid-row' : ''}`;
      el.dataset.id = entry.id;
      const dateStr  = entry.date ? new Date(entry.date + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
      const balClass = entry.runBal >= 0 ? 'pos' : 'neg';

      el.innerHTML = `
        <div class="drag-handle" title="Drag to reorder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="9" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
        </div>
        <div class="entry-main">
          <div class="entry-top">
            <span class="entry-name">${escHtml(entry.name)}</span>
            <span class="entry-amount">${entry.type === 'income' ? '+' : '-'}${fmt(entry.amount)}</span>
          </div>
          <div class="entry-meta">
            <span class="entry-type-badge badge-${entry.type}">${entry.type}</span>
            ${entry.paid ? '<span class="entry-type-badge badge-paid">paid</span>' : ''}
            <span class="entry-date">${dateStr}</span>
            ${entry.addedBy ? `<span class="entry-by">· ${escHtml(entry.addedBy)}</span>` : ''}
            <span class="running-bal ${balClass}" title="Running balance">= ${fmt(entry.runBal)}</span>
          </div>
        </div>
        <div class="entry-actions">
          <button class="entry-act-btn pay-btn${entry.paid ? ' paid' : ''}" title="${entry.paid ? 'Mark unpaid' : 'Mark paid'}">${entry.paid ? '✓' : '○'}</button>
          <button class="entry-act-btn edit-btn" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="entry-act-btn dup-btn" title="Duplicate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="entry-act-btn del-btn" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      `;
      if (reorderMode) el.draggable = true;
      el.querySelector('.pay-btn').addEventListener('click', () => togglePaid(entry.id, !entry.paid));
      el.querySelector('.edit-btn').addEventListener('click', () => openEdit(entry.id));
      el.querySelector('.dup-btn').addEventListener('click', () => duplicateEntry(entry.id));
      el.querySelector('.del-btn').addEventListener('click', () => deleteEntry(entry.id, entry.name));
      setupDragHandlers(el, entry.id);
      list.appendChild(el);
    });
  }

  // ── RECALC RUNNING BALANCES IN-PLACE (after drag reorder) ─────────────────
  function recalcRunningBalances() {
    const list = document.getElementById('entriesList');
    if (!list) return;
    let runBal = 0;
    list.querySelectorAll('.entry-item').forEach(el => {
      const id = parseInt(el.dataset.id);
      const entry = allEntries.find(e => e.id === id);
      if (!entry) return;
      runBal += entry.type === 'income' ? entry.amount : -entry.amount;
      entry.runBal = runBal;
      const badge = el.querySelector('.running-bal');
      if (badge) {
        badge.textContent = '= ' + fmt(runBal);
        badge.className = 'running-bal ' + (runBal >= 0 ? 'pos' : 'neg');
      }
    });
  }

  // ── TOGGLE PAID ────────────────────────────────────────────────────────────
  async function togglePaid(id, paid) {
    const entry = allEntries.find(e => e.id === id);
    if (!entry) return;
    entry.paid = paid;
    renderEntries();
    try {
      const res = await api('PUT', `/api/entries/${currentBudgetId}/${id}`, { paid });
      if (res.error) showToast('⚠ ' + res.error);
      else showToast(paid ? '✓ Marked paid' : 'Marked unpaid');
    } catch(e) {
      entry.paid = !paid; renderEntries(); showToast('Network error');
    }
  }

  // ── DELETE ENTRY ───────────────────────────────────────────────────────────
  async function deleteEntry(id, name) {
    if (!confirm(`Delete "${name}"?`)) return;
    loading(true);
    try {
      const res = await api('DELETE', `/api/entries/${currentBudgetId}/${id}`);
      if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
      allEntries = allEntries.filter(e => e.id !== id);
      renderEntries();
      showToast('Deleted');
    } catch(e) { showToast('Network error'); }
    loading(false);
  }

  // ── DUPLICATE ENTRY ────────────────────────────────────────────────────────
  async function duplicateEntry(id) {
    const src = allEntries.find(e => e.id === id);
    if (!src) return;
    loading(true);
    try {
      const payload = {
        name: 'Copy of ' + src.name, amount: src.amount, type: src.type,
        paid: false, date: new Date().toISOString().slice(0, 10),
        addedBy: src.addedBy || (members[0] || ''),
      };
      const res = await api('POST', `/api/entries/${currentBudgetId}`, payload);
      if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
      allEntries.push(res.entry);
      renderEntries();
      showToast('✓ Entry duplicated');
    } catch(e) { showToast('Network error'); }
    loading(false);
  }

  // ── REORDER MODE ───────────────────────────────────────────────────────────
  document.getElementById('reorderBtn').addEventListener('click', toggleReorderMode);
  function toggleReorderMode() {
    reorderMode = !reorderMode;
    document.body.classList.toggle('reorder-mode', reorderMode);
    // Immediately set/clear draggable on every row so there's no mousedown delay
    document.querySelectorAll('.entry-item').forEach(el => { el.draggable = reorderMode; });
    const btn = document.getElementById('reorderBtn');
    btn.classList.toggle('active', reorderMode);
    if (reorderMode) {
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg> Done`;
    } else {
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg> Reorder`;
    }
  }

  // ── DRAG HANDLERS ──────────────────────────────────────────────────────────
  function setupDragHandlers(el, id) {
    const handle = el.querySelector('.drag-handle');

    // ── Mouse drag ──────────────────────────────────────────────────────────
    // draggable=true is set by toggleReorderMode / renderEntries, not here
    el.addEventListener('dragstart', e => {
      if (!reorderMode) { e.preventDefault(); return; }
      dragSrcId = id;
      setTimeout(() => el.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.entry-item.drag-over').forEach(r => r.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      if (!reorderMode || dragSrcId === id) return;
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.entry-item.drag-over').forEach(r => r.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', async e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (!reorderMode || dragSrcId === null || dragSrcId === id) return;
      await applyReorder(dragSrcId, id);
      dragSrcId = null;
    });

    // ── Touch drag (via the handle) ─────────────────────────────────────────
    if (!handle) return;
    handle.addEventListener('touchstart', e => {
      if (!reorderMode) return;
      dragSrcId = id;
      el.classList.add('dragging');
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!reorderMode) return;
      e.preventDefault(); // stop page scroll while dragging
      const y = e.touches[0].clientY;
      const items = [...document.querySelectorAll('.entry-item')];
      const over = items.find(item => {
        const r = item.getBoundingClientRect();
        return y >= r.top && y <= r.bottom && item !== el;
      });
      document.querySelectorAll('.entry-item.drag-over').forEach(r => r.classList.remove('drag-over'));
      if (over) over.classList.add('drag-over');
    }, { passive: false });

    handle.addEventListener('touchend', async e => {
      if (!reorderMode) return;
      el.classList.remove('dragging');
      const y = e.changedTouches[0].clientY;
      const items = [...document.querySelectorAll('.entry-item')];
      const over = items.find(item => {
        const r = item.getBoundingClientRect();
        return y >= r.top && y <= r.bottom && item !== el;
      });
      document.querySelectorAll('.entry-item.drag-over').forEach(r => r.classList.remove('drag-over'));
      if (over) {
        const targetId = parseInt(over.dataset.id, 10);
        await applyReorder(dragSrcId, targetId);
      }
      dragSrcId = null;
    });
  }

  async function applyReorder(srcId, destId) {
    const list  = document.getElementById('entriesList');
    const items = [...list.querySelectorAll('.entry-item')];
    const si    = items.findIndex(i => parseInt(i.dataset.id) === srcId);
    const di    = items.findIndex(i => parseInt(i.dataset.id) === destId);
    if (si === -1 || di === -1) return;
    if (si < di) list.insertBefore(items[si], items[di].nextSibling);
    else         list.insertBefore(items[si], items[di]);
    const newOrder = [...list.querySelectorAll('.entry-item')].map((el, i) => ({ id: parseInt(el.dataset.id), order: i }));
    newOrder.forEach(({ id, order }) => { const entry = allEntries.find(e => e.id === id); if (entry) entry.order = order; });
    recalcRunningBalances();
    try {
      const res = await api('PUT', `/api/entries/${currentBudgetId}/0`, { reorder: newOrder });
      if (res.error) { showToast('⚠ Reorder failed'); renderEntries(); }
    } catch(e) { showToast('Network error'); renderEntries(); }
  }

  // ── ADD / EDIT PANEL ───────────────────────────────────────────────────────
  document.getElementById('addBtn').addEventListener('click', openAdd);
  document.getElementById('closePanelBtn').addEventListener('click', closePanel);
  document.getElementById('cancelPanelBtn').addEventListener('click', closePanel);
  document.getElementById('savePanelBtn').addEventListener('click', saveEntry);
  document.getElementById('typeIncome').addEventListener('click', () => setPanelType('income'));
  document.getElementById('typeExpense').addEventListener('click', () => setPanelType('expense'));
  document.getElementById('paidToggle').addEventListener('click', () => {
    panelPaid = !panelPaid;
    document.getElementById('paidToggle').textContent = panelPaid ? '☑ Paid' : '☐ Unpaid';
    document.getElementById('paidToggle').classList.toggle('active', panelPaid);
  });
  document.getElementById('entryPanel').addEventListener('click', e => {
    if (e.target === document.getElementById('entryPanel')) closePanel();
  });

  function setPanelType(t) {
    panelType = t;
    document.getElementById('typeIncome').classList.toggle('active', t === 'income');
    document.getElementById('typeExpense').classList.toggle('active', t === 'expense');
  }

  function buildWhoButtons() {
    const row = document.getElementById('whoRow');
    row.innerHTML = '';
    members.forEach((m, i) => {
      const btn = document.createElement('button');
      btn.className = 'who-btn' + (i === 0 ? ' active' : '');
      btn.textContent = m; btn.dataset.name = m;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); panelWho = m;
      });
      row.appendChild(btn);
    });
    panelWho = members[0] || '';
  }

  function openAdd() {
    editingId = null;
    document.getElementById('panelTitle').textContent    = 'Add Entry';
    document.getElementById('entryName').value           = '';
    document.getElementById('entryAmount').value         = '';
    document.getElementById('entryDate').value           = new Date().toISOString().slice(0, 10);
    panelPaid = false; setPanelType('expense');
    document.getElementById('paidToggle').textContent    = '☐ Unpaid';
    document.getElementById('paidToggle').classList.remove('active');
    document.querySelectorAll('.who-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
    panelWho = members[0] || '';
    document.getElementById('entryPanel').classList.add('open');
    setTimeout(() => document.getElementById('entryName').focus(), 350);
  }

  function openEdit(id) {
    const entry = allEntries.find(e => e.id === id);
    if (!entry) return;
    editingId = id;
    document.getElementById('panelTitle').textContent  = 'Edit Entry';
    document.getElementById('entryName').value         = entry.name;
    document.getElementById('entryAmount').value       = entry.amount;
    document.getElementById('entryDate').value         = entry.date || '';
    panelPaid = entry.paid; setPanelType(entry.type);
    document.getElementById('paidToggle').textContent  = panelPaid ? '☑ Paid' : '☐ Unpaid';
    document.getElementById('paidToggle').classList.toggle('active', panelPaid);
    panelWho = entry.addedBy || (members[0] || '');
    document.querySelectorAll('.who-btn').forEach(b => b.classList.toggle('active', b.dataset.name === panelWho));
    document.getElementById('entryPanel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('entryPanel').classList.remove('open');
    editingId = null;
  }

  async function saveEntry() {
    const name   = document.getElementById('entryName').value.trim();
    const amount = parseFloat(document.getElementById('entryAmount').value);
    const date   = document.getElementById('entryDate').value;
    if (!name)                      return showToast('⚠ Description required');
    if (isNaN(amount) || amount < 0) return showToast('⚠ Enter a valid amount');

    const payload = { name, amount, type: panelType, paid: panelPaid, date, addedBy: panelWho };
    loading(true); closePanel();
    try {
      if (editingId) {
        const res = await api('PUT', `/api/entries/${currentBudgetId}/${editingId}`, payload);
        if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
        const idx = allEntries.findIndex(e => e.id === editingId);
        if (idx >= 0) allEntries[idx] = { ...allEntries[idx], ...payload };
        showToast('✓ Entry updated');
      } else {
        const res = await api('POST', `/api/entries/${currentBudgetId}`, payload);
        if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
        allEntries.push(res.entry);
        showToast('✓ Entry added');
      }
      renderEntries();
    } catch(e) { showToast('Network error'); }
    loading(false);
  }

  // ── ADMIN PANEL ────────────────────────────────────────────────────────────
  document.getElementById('closeAdminBtn').addEventListener('click', closeAdmin);
  document.getElementById('adminPanel').addEventListener('click', e => { if (e.target === document.getElementById('adminPanel')) closeAdmin(); });

  function openAdmin() { document.getElementById('adminPanel').classList.add('open'); loadFamilyList(); }
  function closeAdmin() { document.getElementById('adminPanel').classList.remove('open'); document.getElementById('adminMsg').textContent = ''; }

  async function loadFamilyList() {
    const list = document.getElementById('familyList');
    list.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await api('GET', '/api/admin/rooms');
      if (data.error) { list.innerHTML = `<p style="color:var(--red);font-size:.82rem">${data.error}</p>`; return; }
      if (!data.rooms || data.rooms.length === 0) { list.innerHTML = '<p style="opacity:.5;font-size:.82rem">No families yet.</p>'; return; }
      list.innerHTML = '';
      data.rooms.forEach(r => {
        const item = document.createElement('div');
        item.className = 'family-item';
        item.innerHTML = `
          <div class="family-info">
            <div class="family-name">${escHtml(r.name)}</div>
            <div class="family-meta">${r.members.join(', ')} · ${r.budgetCount} budget${r.budgetCount !== 1 ? 's' : ''}</div>
            <div class="family-pass">🔑 ${escHtml(r.password)}</div>
          </div>
          ${r.password !== token ? `<button class="del-family-btn" data-pass="${escHtml(r.password)}">Delete</button>` : '<span style="font-size:.72rem;opacity:.4">Your room</span>'}
        `;
        const delBtn = item.querySelector('.del-family-btn');
        if (delBtn) delBtn.addEventListener('click', () => deleteFamily(r.password, r.name));
        list.appendChild(item);
      });
    } catch(e) { list.innerHTML = '<p style="color:var(--red);font-size:.82rem">Network error</p>'; }
  }

  async function deleteFamily(pass, name) {
    if (!confirm(`Delete "${name}" and all its data?`)) return;
    loading(true);
    try {
      const res = await api('DELETE', '/api/admin/rooms', { password: pass });
      if (res.error) { showToast('⚠ ' + res.error); loading(false); return; }
      showToast(`Deleted ${name}`); loadFamilyList();
    } catch(e) { showToast('Network error'); }
    loading(false);
  }

  document.getElementById('createFamBtn').addEventListener('click', async () => {
    const name    = document.getElementById('newFamName').value.trim();
    const pass    = document.getElementById('newFamPass').value.trim();
    const membStr = document.getElementById('newFamMembers').value.trim();
    const mems    = membStr.split(',').map(m => m.trim()).filter(Boolean);
    const msg     = document.getElementById('adminMsg');
    msg.textContent = ''; msg.style.color = 'var(--teal)';
    if (!name || !pass || mems.length === 0) { msg.textContent = 'All fields required.'; msg.style.color = 'var(--red)'; return; }
    loading(true);
    try {
      const res = await api('POST', '/api/admin/rooms', { name, password: pass, members: mems });
      if (res.error) { msg.textContent = res.error; msg.style.color = 'var(--red)'; loading(false); return; }
      msg.textContent = `✓ Created "${name}"`;
      document.getElementById('newFamName').value = '';
      document.getElementById('newFamPass').value = '';
      document.getElementById('newFamMembers').value = '';
      loadFamilyList();
    } catch(e) { msg.textContent = 'Network error'; msg.style.color = 'var(--red)'; }
    loading(false);
  });
</script>
</body>
</html>
