<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>God Loves You!</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a1628;
    font-family: 'Fredoka One', 'Comic Sans MS', cursive;
  }

  /* ── BACKGROUND ── */
  #bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #1a3a6b 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, #2a1060 0%, transparent 55%),
      radial-gradient(ellipse at 60% 10%, #0d3050 0%, transparent 40%),
      #050e20;
    transition: background 0.6s ease;
    z-index: 0;
  }

  .star {
    position: absolute; border-radius: 50%;
    background: white; opacity: 0;
    animation: twinkle 3s infinite;
    z-index: 1;
  }
  @keyframes twinkle {
    0%,100%{opacity:0;transform:scale(0.4);}
    50%{opacity:0.9;transform:scale(1);}
  }

  /* ── GAME AREA ── */
  #game {
    width: 100vw; height: 100vh;
    position: relative; overflow: hidden;
  }

  /* ── TOP MESSAGE BANNER ── */
  #affirmation-banner {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 50;
    pointer-events: none;
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 18px;
    gap: 4px;
  }

  #affirmation-text {
    font-size: clamp(1.4rem, 5vw, 3.2rem);
    color: #fff9e0;
    text-shadow: 0 0 30px #ffd06688, 0 3px 10px rgba(0,0,0,0.6);
    letter-spacing: 1px;
    text-align: center;
    padding: 0 16px;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.4s, transform 0.4s;
    max-width: 95vw;
    line-height: 1.2;
  }
  #affirmation-text.show {
    opacity: 1; transform: translateY(0);
  }

  /* ── LETTER DISPLAY ── */
  #letter-display {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 60;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #letter-display.show { opacity: 1; }

  .letter-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
    border: 3px solid rgba(255,255,255,0.35);
    border-radius: 28px;
    padding: 18px 36px 14px;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes cardPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .letter-big {
    font-size: clamp(5rem, 18vw, 11rem);
    line-height: 1;
    text-shadow: 0 6px 24px rgba(0,0,0,0.4);
    display: block;
  }
  .letter-word {
    font-size: clamp(1.2rem, 4.5vw, 2.8rem);
    color: rgba(255,255,255,0.9);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
  }
  .letter-emoji {
    font-size: clamp(2rem, 7vw, 4rem);
    display: block;
    margin-top: 2px;
  }

  /* ── BLOBS ── */
  .blob {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    display: flex; align-items: center; justify-content: center;
    will-change: transform;
    filter: drop-shadow(0 10px 28px rgba(0,0,0,0.45));
    animation: float linear infinite;
    z-index: 10;
    cursor: pointer;
  }
  .blob::before {
    content: '';
    position: absolute;
    width: 32%; height: 26%;
    top: 10%; left: 18%;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
  }
  .blob-letter {
    font-size: 40%;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 3px 10px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 1;
    position: relative;
  }
  .eye {
    width: 16%; height: 20%;
    background: white; border-radius: 50%;
    position: absolute; top: 26%;
    display: flex; align-items: center; justify-content: center;
  }
  .eye.left  { left: 22%; }
  .eye.right { right: 22%; }
  .pupil { width: 52%; height: 52%; background: #111; border-radius: 50%; }
  .smile {
    position: absolute; bottom: 22%; left: 50%;
    transform: translateX(-50%);
    width: 38%; height: 20%;
    border-bottom: 4px solid rgba(255,255,255,0.75);
    border-radius: 0 0 50px 50px;
  }
  .blob.squished { animation: squish 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes squish {
    0%  {transform:translate(-50%,-50%) scale(1);}
    20% {transform:translate(-50%,-50%) scaleX(1.65) scaleY(0.45);}
    50% {transform:translate(-50%,-50%) scaleX(0.75) scaleY(1.5);}
    75% {transform:translate(-50%,-50%) scaleX(1.12) scaleY(0.92);}
    100%{transform:translate(-50%,-50%) scale(1);}
  }
  @keyframes float {
    0%  {margin-top:0;}
    50% {margin-top:-16px;}
    100%{margin-top:0;}
  }

  /* ── PARTICLES ── */
  .particle {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: pop 0.7s ease-out forwards; z-index: 30;
  }
  @keyframes pop {
    0%  {transform:translate(0,0) scale(1);opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
  }
  .star-particle {
    position: absolute; pointer-events: none;
    animation: starPop 0.9s ease-out forwards; z-index: 30;
    font-size: 1.6rem;
  }
  @keyframes starPop {
    0%  {transform:translate(0,0) scale(1) rotate(0deg);opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(0) rotate(360deg);opacity:0;}
  }

  /* ── EMOJI FLOAT ── */
  .emoji-pop {
    position: absolute; pointer-events: none;
    font-size: clamp(2.5rem, 10vw, 6rem);
    animation: emojiFloat 1.3s ease-out forwards; z-index: 40;
    transform: translate(-50%,-50%);
  }
  @keyframes emojiFloat {
    0%  {opacity:1;transform:translate(-50%,-50%) scale(0.4);}
    35% {opacity:1;transform:translate(-50%,-90%) scale(1.4);}
    100%{opacity:0;transform:translate(-50%,-190%) scale(0.7);}
  }

  /* ── RIPPLE ── */
  .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.25); pointer-events: none;
    transform: translate(-50%,-50%) scale(0);
    animation: rippleOut 0.7s ease-out forwards; z-index: 5;
  }
  @keyframes rippleOut { to{transform:translate(-50%,-50%) scale(5);opacity:0;} }

  /* ── SCORE ── */
  #score-display {
    position: absolute; top: 18px; right: 20px;
    font-size: clamp(1.4rem, 4.5vw, 2.5rem);
    color: #ffd066;
    text-shadow: 0 3px 12px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 50;
  }

  /* ── CONTROLS ── */
  #fs-btn {
    position: absolute; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(255,255,255,0.13);
    border: 2px solid rgba(255,255,255,0.28);
    color: white; border-radius: 50px;
    padding: 10px 22px; font-size: 1rem;
    font-family: inherit; cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s, opacity 0.5s;
  }
  #fs-btn:active{background:rgba(255,255,255,0.28);}

  #exit-btn {
    position: absolute; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(255,80,80,0.15);
    border: 2px solid rgba(255,120,120,0.35);
    color: #ffaaaa; border-radius: 50px;
    padding: 10px 22px; font-size: 1rem;
    font-family: inherit; cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s, opacity 0.5s;
    display: none;
  }
  #exit-btn:active{background:rgba(255,80,80,0.35);}

  /* ── PIN OVERLAY ── */
  #pin-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(5,14,32,0.96);
    backdrop-filter: blur(16px);
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  #pin-overlay.visible { display: flex; }
  #pin-title {
    font-size: clamp(1.4rem,5vw,2.4rem);
    color: #fff9e0;
    text-shadow: 0 0 20px #ffd06688;
    letter-spacing: 2px;
  }
  #pin-dots {
    display: flex; gap: 16px; margin-bottom: 4px;
  }
  .pin-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.4);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .pin-dot.filled {
    background: #ffd066;
    border-color: #ffd066;
    box-shadow: 0 0 12px #ffd066aa;
  }
  .pin-dot.error {
    background: #ff3b5c;
    border-color: #ff3b5c;
    box-shadow: 0 0 12px #ff3b5caa;
  }
  #pin-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: min(320px, 85vw);
  }
  .pin-key {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 18px;
    font-size: clamp(1.6rem,6vw,2.6rem);
    font-family: inherit;
    padding: 18px 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    text-align: center;
    touch-action: manipulation;
  }
  .pin-key:active { background: rgba(255,255,255,0.28); transform: scale(0.93); }
  .pin-key.del { font-size: clamp(1.2rem,4vw,1.8rem); }
  .pin-key.cancel-key {
    background: rgba(255,60,90,0.18);
    border-color: rgba(255,60,90,0.35);
    color: #ff8fa3;
    font-size: clamp(1rem,3.5vw,1.5rem);
  }
  #pin-shake { animation: pinShake 0.4s ease; }
  @keyframes pinShake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-10px);}
    40%{transform:translateX(10px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
  }
  #sound-btn {
    position: absolute; top: 18px; left: 20px; z-index: 100;
    font-size: 2rem; cursor: pointer;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }

  /* ── MODE TOGGLE ── */
  #mode-btn {
    position: absolute; bottom: 20px; left: 20px; z-index: 100;
    background: rgba(255,200,80,0.2);
    border: 2px solid rgba(255,200,80,0.5);
    color: #ffd066; border-radius: 50px;
    padding: 10px 22px; font-size: 1rem;
    font-family: inherit; cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
  }
  #mode-btn:active{background:rgba(255,200,80,0.35);}

  /* ── PIN OVERLAY ── */
  #pin-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(5,10,30,0.92);
    backdrop-filter: blur(16px);
    align-items: center; justify-content: center;
  }
  #pin-box {
    background: linear-gradient(145deg, rgba(30,50,100,0.95), rgba(20,10,60,0.95));
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 32px;
    padding: 36px 32px 28px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    min-width: 300px;
  }
  #pin-title {
    font-size: 2rem; color: #ffd066;
    text-shadow: 0 0 20px #ffd06688;
    margin-bottom: 6px;
  }
  #pin-subtitle {
    font-size: 1rem; color: rgba(255,255,255,0.5);
    margin-bottom: 24px; letter-spacing: 2px; text-transform: uppercase;
  }
  #pin-dots {
    display: flex; gap: 16px; justify-content: center;
    margin-bottom: 10px;
  }
  .pin-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: transparent;
    transition: background 0.2s, border-color 0.2s;
  }
  .pin-dot.filled {
    background: #ffd066;
    border-color: #ffd066;
    box-shadow: 0 0 12px #ffd06699;
  }
  #pin-msg {
    font-size: 0.95rem; color: #ff6b6b;
    min-height: 1.4em; margin-bottom: 18px;
    letter-spacing: 1px;
  }
  #pin-keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-top: 8px;
  }
  .pin-key {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px; color: white;
    font-family: inherit; font-size: 1.6rem;
    padding: 14px 0; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .pin-key:active {
    background: rgba(255,208,102,0.3);
    border-color: #ffd066;
    transform: scale(0.93);
  }
  .pin-cancel { color: #ff6b6b; border-color: rgba(255,107,107,0.4); }
  .pin-back   { color: #aac8ff; }
  @keyframes pinShake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-10px);}
    40%{transform:translateX(10px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
  }

  /* ── CROSS SHIMMER decoration ── */
  .cross-bg {
    position: absolute;
    opacity: 0.04;
    font-size: 25vw;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
    z-index: 0;
    animation: crossPulse 6s ease-in-out infinite;
  }
  @keyframes crossPulse {
    0%,100%{opacity:0.03;transform:translate(-50%,-50%) scale(1);}
    50%{opacity:0.07;transform:translate(-50%,-50%) scale(1.08);}
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
<div id="game">
  <div id="bg"></div>
  <div class="cross-bg">✝</div>

  <div id="affirmation-banner">
    <div id="affirmation-text"></div>
  </div>

  <div id="letter-display">
    <div class="letter-card" id="letter-card"></div>
  </div>

  <div id="score-display">⭐ 0</div>

  <div id="sound-btn" onclick="toggleSound()">🔊</div>
  <button id="mode-btn" onclick="toggleMode()">🔤 Letters</button>
  <button id="fs-btn" onclick="goFullscreen()">⛶ Full Screen</button>
  <button id="exit-btn" onclick="showPinOverlay()">🔒 Exit</button>

  <!-- Parent PIN overlay to exit fullscreen -->
  <div id="pin-overlay">
    <div id="pin-box">
      <div id="pin-title">🔒 Parent PIN</div>
      <div id="pin-subtitle">Enter code to exit</div>
      <div id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div id="pin-msg"></div>
      <div id="pin-keypad">
        <button class="pin-key" onclick="pinPress('1')">1</button>
        <button class="pin-key" onclick="pinPress('2')">2</button>
        <button class="pin-key" onclick="pinPress('3')">3</button>
        <button class="pin-key" onclick="pinPress('4')">4</button>
        <button class="pin-key" onclick="pinPress('5')">5</button>
        <button class="pin-key" onclick="pinPress('6')">6</button>
        <button class="pin-key" onclick="pinPress('7')">7</button>
        <button class="pin-key" onclick="pinPress('8')">8</button>
        <button class="pin-key" onclick="pinPress('9')">9</button>
        <button class="pin-key pin-cancel" onclick="hidePinOverlay()">✕</button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key pin-back" onclick="pinClear()">⌫</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const AFFIRMATIONS = [
  { text: "Jesus loves you! ❤️",         emoji: "✝️" },
  { text: "God made you wonderful!",      emoji: "🌟" },
  { text: "You are God's treasure!",      emoji: "👑" },
  { text: "God's joy fills your heart!",  emoji: "😊" },
  { text: "You are fearfully & wonderfully made!", emoji: "🌈" },
  { text: "God has great plans for you!", emoji: "📖" },
  { text: "Angels watch over you!",       emoji: "😇" },
  { text: "God's love never ends!",       emoji: "♾️" },
  { text: "You are blessed!",             emoji: "🙏" },
  { text: "Jesus calls you beloved!",     emoji: "💛" },
  { text: "God sings over you with joy!", emoji: "🎵" },
  { text: "You are the light of the world!", emoji: "💡" },
  { text: "God holds you in His hands!",  emoji: "🤲" },
  { text: "You are wonderfully loved!",   emoji: "💝" },
  { text: "Be strong — God is with you!", emoji: "🛡️" },
];

const LETTERS = [
  { l:"A", word:"Angel",   emoji:"😇" },
  { l:"B", word:"Blessed", emoji:"🙏" },
  { l:"C", word:"Cross",   emoji:"✝️" },
  { l:"D", word:"Dove",    emoji:"🕊️" },
  { l:"E", word:"Emmanuel",emoji:"⭐" },
  { l:"F", word:"Faith",   emoji:"🌟" },
  { l:"G", word:"Grace",   emoji:"💛" },
  { l:"H", word:"Hope",    emoji:"🌈" },
  { l:"I", word:"Image",   emoji:"👑" },
  { l:"J", word:"Jesus",   emoji:"❤️" },
  { l:"K", word:"Kind",    emoji:"😊" },
  { l:"L", word:"Love",    emoji:"💝" },
  { l:"M", word:"Miracle", emoji:"🌺" },
  { l:"N", word:"New",     emoji:"🌱" },
  { l:"O", word:"Open",    emoji:"📖" },
  { l:"P", word:"Peace",   emoji:"🕊️" },
  { l:"Q", word:"Quiet",   emoji:"🌙" },
  { l:"R", word:"Rest",    emoji:"☁️" },
  { l:"S", word:"Savior",  emoji:"🌟" },
  { l:"T", word:"Truth",   emoji:"💡" },
  { l:"U", word:"United",  emoji:"🤝" },
  { l:"V", word:"Victory", emoji:"🏆" },
  { l:"W", word:"Wonderful",emoji:"✨" },
  { l:"X", word:"Excellent",emoji:"👏" },
  { l:"Y", word:"You",     emoji:"😊" },
  { l:"Z", word:"Zeal",    emoji:"🔥" },
];

const COLORS = [
  { bg:"#ff3b5c", sh:"#a5001c", tc:"#ff8fa3" },
  { bg:"#ff7c2a", sh:"#a54400", tc:"#ffb07a" },
  { bg:"#ffe03a", sh:"#a58c00", tc:"#fff08a" },
  { bg:"#3de87a", sh:"#008c38", tc:"#90ffb8" },
  { bg:"#3ab8ff", sh:"#005fa5", tc:"#9adeff" },
  { bg:"#b86bff", sh:"#5a00a5", tc:"#d8a8ff" },
  { bg:"#ff70d4", sh:"#a5006a", tc:"#ffb8ea" },
  { bg:"#2ef5d0", sh:"#009c7a", tc:"#90fff0" },
  { bg:"#ff9f45", sh:"#a55000", tc:"#ffc88a" },
  { bg:"#6af0ff", sh:"#006a7a", tc:"#b0faff" },
];

const SACRED_EMOJIS = ["✝️","🕊️","⭐","🌟","😇","💛","🙏","❤️","🌈","👑","💝","✨"];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let score = 0;
let soundOn = true;
let mode = "bible"; // "bible" | "letters"
let letterIndex = 0;
let affirmIndex = 0;
let soundCtx = null;
let cardTimeout = null;
let affirmTimeout = null;
const LETTER_SHOW_MS = 2800;

// ════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════
function getCtx() {
  if (!soundCtx) soundCtx = new (window.AudioContext || window.webkitAudioContext)();
  return soundCtx;
}
function playNote(freq, type="sine", dur=0.5, vol=0.35) {
  if (!soundOn) return;
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*1.4, ctx.currentTime+0.12);
    o.frequency.exponentialRampToValueAtTime(freq*0.75, ctx.currentTime+dur);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  } catch(e){}
}
function playChime(colorIdx) {
  const scale = [261,294,330,349,392,440,494,523,587,659];
  playNote(scale[colorIdx % scale.length], "sine", 0.5);
  setTimeout(() => playNote(scale[(colorIdx+2) % scale.length]*1.5, "sine", 0.4, 0.2), 120);
}
function playLetterSound(letterObj) {
  // cheerful ascending arpeggio
  [0,4,7,12].forEach((semi,i) => {
    setTimeout(() => {
      const freq = 330 * Math.pow(2, semi/12);
      playNote(freq, "triangle", 0.35, 0.25);
    }, i * 100);
  });
}
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
}

// ════════════════════════════════════════════
//  MODE
// ════════════════════════════════════════════
function toggleMode() {

  const btn = document.getElementById('mode-btn');

// ════════════════════════════════════════════
//  FULLSCREEN  +  PIN-PROTECTED EXIT
// ════════════════════════════════════════════
const PARENT_PIN = '1234';
let pinBuffer = '';
let pinTimeout = null;

function goFullscreen() {
  const el = document.documentElement;
  (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || (()=>{})).call(el);
  setTimeout(() => {
    document.getElementById('fs-btn').style.display = 'none';
    document.getElementById('exit-btn').style.display = 'block';
  }, 900);
}

function showPinOverlay() {
  pinBuffer = '';
  // reset dots
  const dots = document.getElementById('pin-dots');
  dots.innerHTML = '<div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>';
  document.getElementById('pin-msg').textContent = '';
  document.getElementById('pin-overlay').style.display = 'flex';
}
function hidePinOverlay() {
  document.getElementById('pin-overlay').style.display = 'none';
  pinBuffer = '';
}
function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  // update dots
  const dots = document.getElementById('pin-dots');
  dots.innerHTML = '';
  for (let i=0;i<4;i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
    dots.appendChild(d);
  }
  if (pinBuffer.length === 4) {
    if (pinBuffer === PARENT_PIN) {
      hidePinOverlay();
      exitFullscreen();
    } else {
      document.getElementById('pin-msg').textContent = 'Try again';
      document.getElementById('pin-dots').style.animation = 'pinShake 0.4s';
      setTimeout(() => {
        pinBuffer = '';
        document.getElementById('pin-dots').innerHTML = '<div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>';
        document.getElementById('pin-dots').style.animation = '';
        document.getElementById('pin-msg').textContent = '';
      }, 800);
    }
  }
}
function pinClear() {
  pinBuffer = pinBuffer.slice(0,-1);
  const dots = document.getElementById('pin-dots');
  dots.innerHTML = '';
  for (let i=0;i<4;i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
    dots.appendChild(d);
  }
}
function exitFullscreen() {
  (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || (()=>{})).call(document);
}

// intercept Escape and physical back while in fullscreen
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.getElementById('fs-btn').style.display = 'block';
    document.getElementById('exit-btn').style.display = 'none';
    hidePinOverlay();
  }
});

// catch Escape key — show PIN instead of exiting
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.fullscreenElement) {
    e.preventDefault();
    showPinOverlay();
    return;
  }
  if (['F5','F11','F4'].includes(e.key) || (e.ctrlKey&&['r','w','t','n','l'].includes(e.key.toLowerCase()))) e.preventDefault();
});

// ════════════════════════════════════════════
//  STARS BG
// ════════════════════════════════════════════
function buildStars() {
  const g = document.getElementById('game');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*4+1.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${2+Math.random()*3}s;`;
    g.appendChild(s);
  }
}

// ════════════════════════════════════════════
//  BLOB
// ════════════════════════════════════════════
function makeBlob() {
  const game = document.getElementById('game');
  const col  = COLORS[Math.floor(Math.random()*COLORS.length)];
  const colIdx = COLORS.indexOf(col);
  const minSz = Math.min(window.innerWidth, window.innerHeight);
  const sz = minSz * (0.14 + Math.random()*0.16);
  const margin = sz*0.65;
  const x = margin + Math.random()*(window.innerWidth - margin*2);
  const y = margin + Math.random()*(window.innerHeight - margin*2 - 80);

  const blob = document.createElement('div');
  blob.className = 'blob';

  // Assign a letter for letter mode
  const letterObj = LETTERS[Math.floor(Math.random()*LETTERS.length)];
  blob.dataset.colorIdx = colIdx;
  blob.dataset.letter = letterObj.l;

  blob.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:${x}px;top:${y}px;
    background: radial-gradient(circle at 32% 30%, ${lighten(col.bg)}, ${col.bg} 55%, ${col.sh});
    box-shadow: 0 ${sz*0.08}px ${sz*0.28}px ${col.sh}99, inset 0 -${sz*0.05}px ${sz*0.1}px rgba(0,0,0,0.18);
    animation-duration:${2.2+Math.random()*2.5}s;
    animation-delay:${Math.random()*2}s;
  `;

  // Eyes + smile
  ['left','right'].forEach(side => {
    const e = document.createElement('div');
    e.className = `eye ${side}`;
    e.innerHTML = '<div class="pupil"></div>';
    blob.appendChild(e);
  });
  const sm = document.createElement('div'); sm.className='smile'; blob.appendChild(sm);

  // Letter label
  const lbl = document.createElement('div'); lbl.className='blob-letter';
  lbl.textContent = mode === "letters" ? letterObj.l : "";
  blob.appendChild(lbl);

  // Events
  const handler = e => { e.preventDefault(); e.stopPropagation();
    const t = e.touches?e.touches[0]:e;
    onSquish(blob, col, colIdx, t.clientX, t.clientY);
  };
  blob.addEventListener('touchstart', handler, {passive:false});
  blob.addEventListener('mousedown', handler);

  game.appendChild(blob);
  driftBlob(blob, x, y, sz);
}

function lighten(hex) {
  const n=parseInt(hex.slice(1),16);
  return `rgb(${Math.min(255,(n>>16)+90)},${Math.min(255,((n>>8)&0xff)+90)},${Math.min(255,(n&0xff)+90)})`;
}

function driftBlob(blob, sx, sy, sz) {
  let x=sx, y=sy;
  let vx=(Math.random()-0.5)*0.7, vy=(Math.random()-0.5)*0.7;
  const mg = sz*0.58;
  function step() {
    if (!blob.isConnected) return;
    x+=vx; y+=vy;
    const maxX = window.innerWidth-mg, maxY = window.innerHeight-mg-70;
    if (x<mg||x>maxX){vx*=-1;x=Math.max(mg,Math.min(maxX,x));}
    if (y<mg||y>maxY){vy*=-1;y=Math.max(mg,Math.min(maxY,y));}
    blob.style.left=x+'px'; blob.style.top=y+'px';
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ════════════════════════════════════════════
//  SQUISH
// ════════════════════════════════════════════
function onSquish(blob, col, colIdx, cx, cy) {
  if (blob.dataset.squishing) return;
  blob.dataset.squishing = '1';
  blob.classList.add('squished');
  blob.addEventListener('animationend', () => {
    blob.classList.remove('squished');
    delete blob.dataset.squishing;
  }, {once:true});

  score++;
  document.getElementById('score-display').textContent = `⭐ ${score}`;

  spawnRipple(cx, cy);
  spawnParticles(cx, cy, col.bg);
  spawnEmoji(cx, cy);
  flashBg(col.bg);
  playChime(colIdx);

  if (mode === "bible") {
    showAffirmation();
  } else {
    const letterObj = LETTERS.find(l => l.l === blob.dataset.letter) || LETTERS[Math.floor(Math.random()*LETTERS.length)];
    showLetterCard(letterObj, col.tc || "#fff");
    playLetterSound(letterObj);
  }

  // Replenish blobs
  if (document.querySelectorAll('.blob').length < 5) {
    setTimeout(makeBlob, 350);
  }
}

// ════════════════════════════════════════════
//  AFFIRMATION
// ════════════════════════════════════════════
function showAffirmation() {
  const a = AFFIRMATIONS[affirmIndex % AFFIRMATIONS.length];
  affirmIndex++;
  const el = document.getElementById('affirmation-text');
  el.textContent = a.text;
  el.classList.add('show');
  clearTimeout(affirmTimeout);
  affirmTimeout = setTimeout(() => el.classList.remove('show'), 3200);

  // Speak it aloud — pass raw text, speakText strips emoji internally
  speakText(a.text);
}

// ════════════════════════════════════════════
//  LETTER CARD
// ════════════════════════════════════════════
function showLetterCard(lObj, color) {
  const card = document.getElementById('letter-card');
  card.innerHTML = `
    <span class="letter-big" style="color:${color}">${lObj.l}</span>
    <span class="letter-word">${lObj.word}</span>
    <span class="letter-emoji">${lObj.emoji}</span>
  `;
  // Re-trigger animation
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';

  const disp = document.getElementById('letter-display');
  disp.classList.add('show');
  clearTimeout(cardTimeout);
  cardTimeout = setTimeout(() => disp.classList.remove('show'), LETTER_SHOW_MS);

  speakText(`${lObj.l} is for ${lObj.word}`);
}

// ════════════════════════════════════════════
//  SPEECH SYNTHESIS  — female voice, gesture-safe
// ════════════════════════════════════════════
let femaleVoice = null;

function pickFemaleVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  const femaleNames = [
    'Samantha','Karen','Moira','Tessa','Veena','Victoria',
    'Allison','Ava','Susan','Zira','Fiona','Nicky',
    'Google US English','Microsoft Zira','Microsoft Susan',
    'Microsoft Jenny','Microsoft Aria','Google UK English Female',
    'Alice','Anna','Joana','Luciana','Sara'
  ];
  for (const name of femaleNames) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  const byLabel = voices.find(v => /female/i.test(v.name));
  if (byLabel) return byLabel;
  return voices.find(v => v.lang.startsWith('en')) || voices[0];
}

function speakText(text) {
  if (!soundOn) return;
  const synth = window.speechSynthesis;
  if (!synth) return;

  // Strip emoji so TTS reads cleanly
  const clean = text.replace(/[^\x00-\x7F\u00C0-\u024F\u0027]/g, '').replace(/\s+/g,' ').trim();
  if (!clean) return;

  // Must call synchronously inside user gesture — NO setTimeout wrapper
  synth.cancel();

  if (!femaleVoice) femaleVoice = pickFemaleVoice();

  const utt = new SpeechSynthesisUtterance(clean);
  utt.rate   = 0.85;
  utt.pitch  = 1.2;
  utt.volume = 1;
  utt.lang   = 'en-US';
  if (femaleVoice) utt.voice = femaleVoice;

  synth.speak(utt);

  // iOS Safari pauses after ~15s in background — keep it alive
  const keepAlive = setInterval(() => {
    if (!synth.speaking) { clearInterval(keepAlive); return; }
    synth.pause(); synth.resume();
  }, 10000);
  utt.onend = () => clearInterval(keepAlive);
  utt.onerror = () => clearInterval(keepAlive);
}

// ════════════════════════════════════════════
//  VISUAL FX
// ════════════════════════════════════════════
function flashBg(color) {
  const bg = document.getElementById('bg');
  bg.style.background = `radial-gradient(ellipse at 50% 50%, ${color}44, transparent 65%), radial-gradient(ellipse at 20% 20%, #1a3a6b, transparent 55%), #050e20`;
  setTimeout(() => {
    bg.style.background = `radial-gradient(ellipse at 20% 20%, #1a3a6b 0%, transparent 55%), radial-gradient(ellipse at 80% 80%, #2a1060 0%, transparent 55%), #050e20`;
  }, 450);
}

function spawnParticles(cx, cy, color) {
  const game = document.getElementById('game');
  for (let i=0; i<16; i++) {
    const isStar = i < 5;
    const p = document.createElement('div');
    p.className = isStar ? 'star-particle' : 'particle';
    const angle = (Math.PI*2*i/16)+(Math.random()-0.5)*0.5;
    const dist = 55+Math.random()*90;
    const tx = Math.cos(angle)*dist, ty = Math.sin(angle)*dist;
    if (isStar) {
      p.textContent = SACRED_EMOJIS[Math.floor(Math.random()*SACRED_EMOJIS.length)];
      p.style.cssText=`left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;`;
    } else {
      const sz = 7+Math.random()*14;
      p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${color};box-shadow:0 0 ${sz}px ${color};--tx:${tx}px;--ty:${ty}px;`;
    }
    game.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

function spawnEmoji(cx, cy) {
  const game = document.getElementById('game');
  const em = document.createElement('div');
  em.className = 'emoji-pop';
  em.textContent = SACRED_EMOJIS[Math.floor(Math.random()*SACRED_EMOJIS.length)];
  em.style.left = cx+'px'; em.style.top = cy+'px';
  game.appendChild(em);
  em.addEventListener('animationend', () => em.remove());
}

function spawnRipple(cx, cy) {
  const game = document.getElementById('game');
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText=`left:${cx}px;top:${cy}px;width:80px;height:80px;`;
  game.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

// ════════════════════════════════════════════
//  PREVENT ALL BROWSER ESCAPE HATCHES
// ════════════════════════════════════════════
document.addEventListener('contextmenu',   e=>e.preventDefault());
document.addEventListener('touchmove',     e=>e.preventDefault(),{passive:false});
document.addEventListener('gesturestart',  e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('gestureend',    e=>e.preventDefault());
let lastTap=0;
document.addEventListener('touchend', e => {
  const now=Date.now(); if(now-lastTap<300) e.preventDefault(); lastTap=now;
});
// block keyboard shortcuts that could navigate away
document.addEventListener('keydown', e => {
  if (['F5','Escape','F11','F4'].includes(e.key) || (e.ctrlKey&&['r','w','t','n','l'].includes(e.key.toLowerCase()))) e.preventDefault();
});

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
buildStars();
for (let i=0;i<4;i++) setTimeout(makeBlob, i*180);

// Preload voices as early as possible
if (window.speechSynthesis) {
  const tryLoad = () => {
    const v = window.speechSynthesis.getVoices();
    if (v.length && !femaleVoice) femaleVoice = pickFemaleVoice();
  };
  tryLoad();
  window.speechSynthesis.onvoiceschanged = tryLoad;
}

// Show a "tap to start" overlay so that the very first touch
// both unlocks AudioContext AND primes speechSynthesis on iOS.
// Without this, iOS silently blocks all audio/speech.
(function() {
  const overlay = document.createElement('div');
  overlay.id = 'start-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:99998;
    background:rgba(5,14,32,0.88);
    backdrop-filter:blur(8px);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:18px;cursor:pointer;
  `;
  overlay.innerHTML = `
    <div style="font-size:clamp(3rem,15vw,7rem);animation:starPop 1.2s ease-in-out infinite alternate">✝️</div>
    <div style="font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,6vw,3rem);color:#fff9e0;text-shadow:0 0 30px #ffd06688;text-align:center;padding:0 24px">God Loves You!</div>
    <div style="font-family:'Fredoka One',cursive;font-size:clamp(1rem,4vw,1.8rem);color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase">Tap anywhere to start</div>
  `;
  document.getElementById('game').appendChild(overlay);

  function startApp() {
    overlay.remove();
    // Unlock AudioContext
    try { getCtx().resume(); } catch(e){}
    // Prime speechSynthesis with a silent utterance — MUST be in gesture handler
    if (window.speechSynthesis) {
      if (!femaleVoice) femaleVoice = pickFemaleVoice();
      const primer = new SpeechSynthesisUtterance(' ');
      primer.volume = 0;
      if (femaleVoice) primer.voice = femaleVoice;
      window.speechSynthesis.speak(primer);
    }
  }

  overlay.addEventListener('touchstart', startApp, {once:true, passive:true});
  overlay.addEventListener('mousedown',  startApp, {once:true});
})();
</script>
